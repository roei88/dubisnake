     updateHud(). */
  .hud-bar-track {
    width: min(clamp(40px, 9vmin, 64px), calc(var(--cell-px, 16px) * 3.5));
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .hud-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    background: linear-gradient(90deg, #22d3ee, #06b6d4);
  }
  /* Level pips: 3 stacked 4x4px dots, DOM order top-to-bottom is pip3/pip2/
     pip1 per spec, lit state is JS-driven (level >= n), see updateHud(). */
  .hud-pips {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .hud-pip {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .hud-pip.is-lit { background: #f59e0b; }
  .hud-divider {
    width: 1px;
    height: calc(var(--avatar-px, 64px) * 0.6);
    flex-shrink: 0;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1), transparent);
  }
  /* Always-visible avatar HUD element (menu/playing/paused/dead/won - never
     gated to "after first play"). A genuine flex item of #hud (NOT
     position:absolute), placed LAST in DOM source order, after .hud-stats -
     under dir="rtl" row flex the last DOM child lands at the physical LEFT
     edge, and under dir="ltr" it lands at the physical RIGHT edge, so the
     avatar mirrors sides with the language exactly like every other
     direction-dependent piece of this file (see applyLanguage()) with zero
     extra JS: pure flex + DOM order. Do not reorder these two children or
     switch #hud to justify-content:flex-start/flex-end without re-deriving
     this. */
  #avatarHud {
    width: var(--avatar-px, 36px);
    height: var(--avatar-px, 36px);
    flex-shrink: 0;
    box-sizing: border-box; /* keep the 3px border inside --avatar-px, not added on top */
    border-radius: 50%;
    border: 3px solid #22d3ee;
    /* small dark chip behind the image so it doesn't float directly against
       the light HUD text */
    background: #1c1815;
    box-shadow:
      0 0 12px rgba(34,211,238,0.3),
      0 0 24px rgba(34,211,238,0.1),
      inset 0 0 0 3px rgba(0,0,0,0.35);
    overflow: hidden;
    pointer-events: none;
  }
  #avatarHud img {
    width: 100%;
    height: 100%;
    /* head-N.png are confirmed 512x512 square with content filling to the
       image edges (no transparent margin - checked via PIL getbbox() before
       implementation), so object-fit:cover is safe: it will not crop into
       transparent padding. */
    object-fit: cover;
    display: block;
  }
  /* flex-shrink:0 is load-bearing: #boardWrap has overflow:hidden, and per
     the flex spec an overflow:hidden item's automatic min-height becomes 0
     (instead of its content size), so without this the flex column in #wrap
     was free to squeeze #boardWrap (and the canvas/overlay/level-flash-card
     inside it) shorter than its actual content on cramped viewports, instead
     of #wrap's own overflow-y:auto kicking in as intended. That clipped the
     live canvas, the level-up head photo/blurb, and the overlay text at
     exactly the sizes resizeCanvas() had computed for --board-px. Pinning
     flex-shrink:0 here forces the *intended* fallback (scroll) instead of
     silent clipping in the rare cases the board still can't fully fit. */
  #boardWrap {
    flex-shrink: 0;
    /* 3D "recessed screen" framing. Everything here is box-shadow/radius
       only - zero layout participation, so it cannot feed back into
       measureReservePx()/resizeCanvas() (the recurring sizing-budget bug
       class in this file). The outer ring shadows form the raised bezel
       frame; the matching inner shadows live on #boardBezel (an absolute,
       pointer-events:none overlay) because INSET shadows on this element
       would paint underneath the canvas child. */
    border-radius: 14px;
    box-shadow:
      0 0 0 3px #3a3128,
      0 0 0 5px #57492f,
      0 3px 0 5px rgba(0, 0, 0, 0.35),
      0 14px 30px rgba(0, 0, 0, 0.40);
  }
  #boardBezel {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none; /* MUST stay - it covers the canvas, and swipes have to fall through to it */
    box-shadow:
      inset 0 5px 12px rgba(20, 26, 8, 0.38),
      inset 0 -3px 8px rgba(255, 255, 250, 0.30),
      inset 3px 0 8px rgba(20, 26, 8, 0.18),
      inset -3px 0 8px rgba(20, 26, 8, 0.18);
  }
  canvas {
    background: transparent; /* board tone comes from render()'s translucent fill */
    /* no own border-radius: #boardWrap's overflow:hidden + 14px radius does
       the corner clipping - a smaller radius here would leave notches */
    touch-action: none;
    display: block;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: rgba(10, 8, 7, 0.82);
    border-radius: 10px;
    padding: 20px;
    box-sizing: border-box;
    /* QA fix: the dead/won content stack (splash image + h1 + 2 stat lines +
       instructions + button) can be taller than #boardWrap on cramped/
       landscape viewports even after every child's own board-px-based clamp
       below - #boardWrap's own overflow:hidden then clips it, and since
       #overlay used to be vertically centered via justify-content:center,
       there was no way to scroll to the clipped part: #wrap's outer
       overflow-y:auto only moves the whole (already internally-clipped)
       #boardWrap block, it can't reveal more of #overlay's own clipped
       content. Verified live at a real 568x326 viewport: #boardWrap
       bottom~306-308px, #playBtn bottom~324.7-334.3px - ~60% of the "שחק שוב"
       button (its entire label) invisible and untappable, at scrollTop 0,
       with nothing to trigger a fix. Making #overlay itself the scrollable
       box (its own overflow-y:auto, independent of #boardWrap's) means any
       remaining overflow is always reachable by a normal scroll-down
       gesture - see .overlayInner below for how vertical centering still
       works in the common (non-overflowing) case. */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #overlay.hidden { display: none; }
  /* Centers vertically via margin:auto instead of justify-content:center on
     #overlay. This is the standard fix for "can't scroll to see overflowing
     centered flex content": auto margins consume any extra space when there
     is room (identical visual result to justify-content:center in the
     everyday case), but resolve to 0 - not negative - when there isn't,
     which is exactly flex-start: content starts flush at the top of #overlay
     and any overflow lands entirely at the bottom, inside the normal
     scroll-down direction #overlay's own overflow-y:auto (above) now
     provides. justify-content:center could not be scrolled past on the
     "before" side in any browser, which is exactly what made the button
     unreachable at 568x326 (see #overlay comment). */
  .overlayInner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: min(10px, calc(var(--board-px, 300px) * 0.03));
    margin: auto 0;
  }
  /* h1/p/.stat below are each clamped with the same min(vmin-clamp,
     --board-px-derived) pattern already used by #levelFlashCard's children
     (see the comment on #levelFlashCard). Without this, text sized purely
     from vmin ignores how narrow the *actual* #boardWrap container (which
     clips via overflow:hidden) can get once resizeCanvas() has to shrink the
     board below what vmin assumed (small/landscape viewports) - confirmed
     clipping the "dubisnake" <h1> (rendered ~181px wide inside a 104px-wide
     container) before this fix. */
  #overlay h1 {
    margin: 0;
    font-size: min(clamp(28px, 7vmin, 46px), calc(var(--board-px, 300px) * 0.16));
    color: #ffd27a;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  #overlay p {
    margin: 2px 0;
    font-size: min(clamp(13px, 2.6vmin, 16px), calc(var(--board-px, 300px) * 0.055));
    max-width: min(32ch, calc(var(--board-px, 300px) * 0.88));
    line-height: 1.4;
    color: #e8dcc8;
  }
  #overlay .stat { font-size: min(clamp(15px, 3vmin, 20px), calc(var(--board-px, 300px) * 0.065)); color: #fff; }
  /* The menu screen's one-line tagline (not the retry-instruction <p> on the
     dead/won/paused screens, which stay on the plain #overlay p rule above) -
     bigger and bolder than body copy, in the cyan accent already used for
     the HUD/avatar ring, for a punchier "cool" read rather than plain
     instructional text. Same board-px-clamp pattern as its siblings so it
     still shrinks correctly on small/landscape viewports (see the comment
     above #overlay h1). */
  #overlay .tagline {
    margin: 4px 0;
    font-size: min(clamp(20px, 4.4vmin, 30px), calc(var(--board-px, 300px) * 0.1));
    font-weight: 800;
    letter-spacing: 0.02em;
    color: #00e5ff;
    text-shadow: 0 2px 10px rgba(0,229,255,0.35);
  }
  /* Menu-only "how to play" demo loop, replacing the old written controls
     line: a hand glyph swipes out along each of the four directions in
     turn, the matching cartoon arrow lights up, and a mini snake rotates
     to face that way - the pattern mobile games use on first launch.
     Deliberately pure CSS keyframes: no JS, no timers, no rAF, so it can
     neither interact with the fixed-timestep game loop nor add work to it,
     and nothing needs teardown when the overlay's innerHTML is rebuilt
     (language switch / state change). Sizes all derive from --board-px
     (already published by resizeCanvas()) so it scales with the board
     instead of introducing a new fixed-px block into the overlay stack. */
  .howto {
    --ht-stage: min(146px, calc(var(--board-px, 300px) * 0.44));
    --ht-travel: calc(var(--ht-stage) * 0.30);
    --ht-nudge: calc(var(--ht-stage) * 0.055);
    --ht-keydrop: calc(var(--ht-stage) * 0.028);
    position: relative;
    width: var(--ht-stage);
    height: var(--ht-stage);
    flex: none;
  }
  /* Base centering for every child; the arrows then override with their own
     offset transforms. Keyframes below re-declare the full transform
     (including this translate) because animating `transform` replaces it. */
  .howto > * { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  .htArrow {
    font-size: calc(var(--ht-stage) * 0.22);
    line-height: 1;
    color: #00e5ff;
    text-shadow: 0 0 8px rgba(0,229,255,0.45);
    opacity: 0.16;
    animation: htArrowPulse 8s linear infinite;
  }
  /* 8s loop = four 2s phases. Each arrow runs the SAME keyframe (lit during
     its first quarter) offset by a negative delay, so exactly one is lit at
     a time, in the order right -> down -> left -> up. */
  .htRight { transform: translate(calc(-50% + var(--ht-stage) * 0.38), -50%); animation-delay: 0s; }
  .htDown  { transform: translate(-50%, calc(-50% + var(--ht-stage) * 0.38)); animation-delay: -6s; }
  .htLeft  { transform: translate(calc(-50% - var(--ht-stage) * 0.38), -50%); animation-delay: -4s; }
  .htUp    { transform: translate(-50%, calc(-50% - var(--ht-stage) * 0.38)); animation-delay: -2s; }
  @keyframes htArrowPulse {
    0%   { opacity: 0.16; }
    6%   { opacity: 1; }
    20%  { opacity: 1; }
    26%  { opacity: 0.16; }
    100% { opacity: 0.16; }
  }
  .htSnake {
    display: flex;
    align-items: center;
    gap: calc(var(--ht-stage) * 0.02);
    animation: htSnakeTurn 8s linear infinite;
  }
  .htSnake i {
    display: block;
    border-radius: 50%;
    background: #00e676;
    border: 1px solid #00693e;
  }
  .htSnake i:nth-child(1) { width: calc(var(--ht-stage)*0.10); height: calc(var(--ht-stage)*0.10); opacity: 0.55; }
  .htSnake i:nth-child(2) { width: calc(var(--ht-stage)*0.125); height: calc(var(--ht-stage)*0.125); opacity: 0.8; }
  .htSnake i:nth-child(3) { width: calc(var(--ht-stage)*0.155); height: calc(var(--ht-stage)*0.155); background: #ffd166; border-color: #7a5a12; }
  /* Near-instant snaps between phases (the 1% ramps), matching how the real
     snake turns on a grid rather than sweeping around. */
  /* The rotate comes BEFORE the nudge, so translateX always moves the snake
     along the direction it is currently facing - one small "step" per phase,
     timed to land with the arrow/keycap lighting up. */
  @keyframes htSnakeTurn {
    0%,   3%   { transform: translate(-50%, -50%) rotate(0deg)   translateX(0); }
    9%,  20%   { transform: translate(-50%, -50%) rotate(0deg)   translateX(var(--ht-nudge)); }
    24%        { transform: translate(-50%, -50%) rotate(0deg)   translateX(0); }
    25%, 28%   { transform: translate(-50%, -50%) rotate(90deg)  translateX(0); }
    34%, 45%   { transform: translate(-50%, -50%) rotate(90deg)  translateX(var(--ht-nudge)); }
    49%        { transform: translate(-50%, -50%) rotate(90deg)  translateX(0); }
    50%, 53%   { transform: translate(-50%, -50%) rotate(180deg) translateX(0); }
    59%, 70%   { transform: translate(-50%, -50%) rotate(180deg) translateX(var(--ht-nudge)); }
    74%        { transform: translate(-50%, -50%) rotate(180deg) translateX(0); }
    75%, 78%   { transform: translate(-50%, -50%) rotate(270deg) translateX(0); }
    84%, 95%   { transform: translate(-50%, -50%) rotate(270deg) translateX(var(--ht-nudge)); }
    99%, 100%  { transform: translate(-50%, -50%) rotate(270deg) translateX(0); }
  }
  .htHand {
    font-size: calc(var(--ht-stage) * 0.30);
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.55));
    animation: htHandSwipe 8s ease-in-out infinite;
  }
  @keyframes htHandSwipe {
    0%   { transform: translate(-50%, -50%); opacity: 0; }
    4%   { transform: translate(-50%, -50%); opacity: 1; }
    20%  { transform: translate(calc(-50% + var(--ht-travel)), -50%); opacity: 1; }
    24%  { transform: translate(calc(-50% + var(--ht-travel)), -50%); opacity: 0; }
    25%  { transform: translate(-50%, -50%); opacity: 0; }
    29%  { transform: translate(-50%, -50%); opacity: 1; }
    45%  { transform: translate(-50%, calc(-50% + var(--ht-travel))); opacity: 1; }
    49%  { transform: translate(-50%, calc(-50% + var(--ht-travel))); opacity: 0; }
    50%  { transform: translate(-50%, -50%); opacity: 0; }
    54%  { transform: translate(-50%, -50%); opacity: 1; }
    70%  { transform: translate(calc(-50% - var(--ht-travel)), -50%); opacity: 1; }
    74%  { transform: translate(calc(-50% - var(--ht-travel)), -50%); opacity: 0; }
    75%  { transform: translate(-50%, -50%); opacity: 0; }
    79%  { transform: translate(-50%, -50%); opacity: 1; }
    95%  { transform: translate(-50%, calc(-50% - var(--ht-travel))); opacity: 1; }
    99%  { transform: translate(-50%, calc(-50% - var(--ht-travel))); opacity: 0; }
    100% { transform: translate(-50%, -50%); opacity: 0; }
  }
  /* Desktop variant of the same demo: a cartoon arrow-key cluster in the
     real inverted-T layout, each keycap pressing down and lighting up in
     the same right/down/left/up order while the mini snake turns to match.
     Which variant is shown is decided purely by the pointer media query
     below - CSS, not JS - so it also follows a mouse being docked or
     undocked at runtime with no page reload. */
  .howtoKeys .htSnake { top: 24%; }
  .htKeys {
    top: 70%;
    display: grid;
    grid-template-columns: repeat(3, auto);
    grid-template-rows: repeat(2, auto);
    gap: calc(var(--ht-stage) * 0.03);
  }
  .htKey {
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(var(--ht-stage) * 0.24);
    height: calc(var(--ht-stage) * 0.24);
    font-size: calc(var(--ht-stage) * 0.15);
    font-weight: 700;
    line-height: 1;
    border-radius: calc(var(--ht-stage) * 0.05);
    border: 2px solid #4a6b3a;
    background: #22301a;
    color: #cfe8c0;
    box-shadow: 0 var(--ht-keydrop) 0 #0d1408, 0 0 0 rgba(0,229,255,0);
    animation: htKeyPress 8s linear infinite;
  }
  /* Inverted-T, i.e. how the keys physically sit on a keyboard. */
  .htkUp    { grid-column: 2; grid-row: 1; animation-delay: -2s; }
  .htkLeft  { grid-column: 1; grid-row: 2; animation-delay: -4s; }
  .htkDown  { grid-column: 2; grid-row: 2; animation-delay: -6s; }
  .htkRight { grid-column: 3; grid-row: 2; animation-delay: 0s; }
  /* Solid colours (not gradients) so every animated property interpolates
     reliably; the keycap "presses" by dropping onto its own shadow. */
  @keyframes htKeyPress {
    0%, 4%     { transform: translateY(0) scale(1); background: #22301a; color: #cfe8c0;
                 border-color: #4a6b3a;
                 box-shadow: 0 var(--ht-keydrop) 0 #0d1408, 0 0 0 rgba(0,229,255,0); }
    9%, 20%    { transform: translateY(var(--ht-keydrop)) scale(0.95); background: #00e5ff; color: #05242a;
                 border-color: #7ff4ff;
                 box-shadow: 0 0 0 #0d1408, 0 0 calc(var(--ht-stage) * 0.09) rgba(0,229,255,0.75); }
    26%, 100%  { transform: translateY(0) scale(1); background: #22301a; color: #cfe8c0;
                 border-color: #4a6b3a;
                 box-shadow: 0 var(--ht-keydrop) 0 #0d1408, 0 0 0 rgba(0,229,255,0); }
  }
  /* Touch devices get the swipe demo, everything else the key cluster. */
  .howtoTouch { display: none; }
  @media (pointer: coarse) {
    .howtoTouch { display: block; }
    .howtoKeys { display: none; }
  }
  /* Motion-sensitive users still get the meaning: all four arrows lit and
     the hand parked in the middle, just held still. */
  @media (prefers-reduced-motion: reduce) {
    .htArrow, .htSnake, .htHand, .htKey { animation: none; }
    .htArrow { opacity: 0.9; }
    /* Parked off-centre so the still hand doesn't sit on top of the mini
       snake (they only overlap for an instant mid-animation). */
    .htHand {
      opacity: 1;
      transform: translate(calc(-50% + var(--ht-travel) * 0.55), calc(-50% + var(--ht-travel) * 0.55));
    }
  }
  /* Very short viewports (landscape phones): drop the demo entirely rather
     than push the Play button into #overlay's scroll region. */
  @media (max-height: 460px) {
    .howto { display: none; }
  }
  #playBtn {
    /* QA fix: same board-px-based shrink pattern as the rest of #overlay's
       children (see comment above #overlay h1 and .splashPic) - these three
       were previously fixed px regardless of how small the board got, which
       contributed to the dead/won overlay overflowing #boardWrap. */
    margin-top: min(8px, calc(var(--board-px, 300px) * 0.025));
    padding: min(12px, calc(var(--board-px, 300px) * 0.035)) min(34px, calc(var(--board-px, 300px) * 0.1));
    font-size: min(clamp(16px, 3.2vmin, 20px), calc(var(--board-px, 300px) * 0.075));
    font-weight: 700;
    /* QA fix: unlike its sibling overlay buttons (#levelOkBtn, #mobileHelpClose),
       this had no floor and was entirely board-px-relative, so it shrank below
       the 44px touch-target minimum on ordinary small/landscape viewports
       (e.g. 568x320, 667x375, 896x414, even 320x568 portrait). Give it the
       same explicit floor the others already have - buttons are border-box
       by default (UA stylesheet), so this bounds the actual tappable box,
       not just the content area. */
    min-height: 44px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff3d81, #c9006b);
    color: #2a0714;
    box-shadow: 0 6px 16px rgba(201,0,107,0.4);
    cursor: pointer;
    touch-action: none;
  }
  #playBtn:active { transform: translateY(1px); }
  #playBtn:disabled { opacity: 0.55; cursor: default; }
  /* Level banner: a retro arcade "LEVEL n" screen shown at the start of
     every level (including level 1). Unlike the old auto-timing-out flash
     card this one is BLOCKING - it sets state to "levelbanner", which the
     fixed-timestep loop treats as not-playing, so the snake holds still
     until OK is pressed. The monsters in play at this level are shown at
     exactly 2x2 board cells each, in a row, and carry the meaning on their
     own: the only text is the level number. */
  #levelFlash {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    border-radius: 10px;
    overflow: hidden;
    background: rgba(7, 10, 5, 0.86);
    z-index: 6;
  }
  /* pointer-events flips to auto only while shown, so the hidden banner can
     never swallow a swipe/tap meant for the board underneath. */
  #levelFlash.show { opacity: 1; pointer-events: auto; }
  #levelFlashCard {
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Every size below is the smaller of a vmin-based value and a
       --board-px-derived one, the same pattern the rest of this file uses,
       so the card shrinks with the real container instead of clipping
       against #boardWrap's overflow:hidden on small/landscape boards. */
    /* Stretched to a fixed share of the board rather than hugging its
       contents, so it reads as a proper level *screen*. Both width and the
       ceiling are board-relative and box-sizing is border-box (below), so the
       card scales with whatever device is playing and can never spill past
       #boardWrap - the row of three monsters at 2x2 cells each comes to
       ~0.67 of the board, against ~0.80 of usable width inside the padding,
       so it always has slack. */
    width: calc(var(--board-px, 300px) * 0.92);
    max-width: 96%;
    gap: min(18px, calc(var(--board-px, 300px) * 0.05));
    padding: min(26px, calc(var(--board-px, 300px) * 0.07)) min(22px, calc(var(--board-px, 300px) * 0.06));
    border-radius: min(20px, calc(var(--board-px, 300px) * 0.05));
    background: linear-gradient(180deg, #18200f 0%, #0a0e06 100%);
    border: 3px solid #00e5ff; /* recoloured per level from JS (level tint) */
    text-align: center;
    box-sizing: border-box;
  }
  #levelFlashTitle {
    font-size: min(clamp(19px, 4.8vmin, 34px), calc(var(--board-px, 300px) * 0.1));
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ffd166;
    text-shadow: 0 0 10px rgba(255,209,102,0.5), 0 2px 0 #6d4f10;
  }
  #levelMonsters {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: min(10px, calc(var(--board-px, 300px) * 0.026));
  }
  /* Exactly 2x2 board cells per monster, as specified. Three of them plus
     gaps and the card's padding comes to ~0.82 of the board's width (the
     board is 9 cells across), so the row still fits inside the card's
     max-width above without wrapping or shrinking. */
  #levelMonsters img {
    width: calc(var(--cell-px, 40px) * 2);
    height: calc(var(--cell-px, 40px) * 2);
    object-fit: contain;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
  }
  #levelOkBtn {
    min-height: 44px;
    padding: 0 min(38px, calc(var(--board-px, 300px) * 0.11));
    font-size: min(clamp(15px, 3.4vmin, 21px), calc(var(--board-px, 300px) * 0.062));
    font-weight: 800;
    letter-spacing: 0.14em;
    font-family: inherit;
    border: 2px solid #06343a;
    border-radius: 999px;
    background: linear-gradient(180deg, #00e5ff, #00a3b8);
    color: #05242a;
    cursor: pointer;
    touch-action: none;
  }
  #levelOkBtn:active { filter: brightness(0.88); }
  .splashPic {
    /* QA fix: unlike #overlay's h1/p/.stat (which already min() against
       --board-px, see the comment above #overlay h1), this used to be
       vmin-only, so on a small/landscape board it did not shrink to match
       the actual (clipped-down) #boardWrap container - one of the
       contributors to the dead/won overlay overflowing #boardWrap's box
       (see #overlay comment). Now capped the same way as its siblings. */
    width: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));
    height: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));

  }
  /* On-screen D-pad intentionally removed per spec - touch devices use
     swipe-on-canvas only now (see the mobileHelp popup below for the
     swipe-direction hint shown to touch users). Removing it also means
     #wrap always has exactly 3 flex children (hud/boardWrap/footer), so
     measureReservePx()/resizeCanvas() no longer need a coarse-pointer
     branch for a 4th child's reserved height. */
  #footer {
    font-size: clamp(10px, 2vmin, 12px);
    color: #8a7c6b;
    flex-shrink: 0; /* see #hud comment: never let flex compress this below its text */
  }
  /* Language toggle: deliberately position:fixed to the physical viewport
     corner, OUTSIDE #wrap's normal flow entirely - not a flex child of #hud,
     not measured by measureReservePx(). This file has twice already broken
     the board's no-scroll/sizing budget by adding something into #wrap's
     flow that fed back into resizeCanvas()'s size calculations (the avatar
     HUD chip, then its own sizing loop); a fixed-position element outside
     #wrap can never do that. "right" is a physical (not logical/dir-aware)
     CSS property, so this stays in the SAME physical corner whether the
     current language is he (rtl) or en (ltr) - it doesn't jump to the other
     side every time you toggle it. */
  #langToggle {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: max(10px, env(safe-area-inset-right));
    z-index: 20;
    min-height: 44px;
    padding: 0 16px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    background: rgba(28,22,19,0.78);
    color: #f2e9dd;
    font-size: 13px;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    cursor: pointer;
    touch-action: none;
  }
  #langToggle:active { background: rgba(0,229,255,0.35); }

  /* Mobile-only "how to play" hint: fixed/full-viewport, outside #wrap's
     flow (same reasoning as #langToggle above) so it can never feed back
     into resizeCanvas()'s size budget. Shown once (first visit, gated by
     localStorage) only on coarse-pointer devices - see maybeShowMobileHelp()
     in the script below. Deliberately icon-first/text-minimal per spec:
     the arrow+hand glyph cross conveys "swipe any direction" faster than
     a sentence would. */
  #mobileHelp {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(11,8,6,0.62);
    padding: 20px;
    box-sizing: border-box;
    touch-action: none;
  }
  #mobileHelp.show { display: flex; }
  #mobileHelpCard {
    width: 100%;
    max-width: 260px;
    text-align: center;
    background: linear-gradient(165deg, #241d18, #14100e 70%);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 20px;
    padding: 22px 20px 18px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.55);
  }
  #mobileHelpArrows {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);

  }
  .mh-cell {
    display: flex;
    align-items: center;
    justify-content: center;

    text-shadow: 0 0 10px rgba(0,229,255,0.5);
  }
  .mh-hand { font-size: 34px; color: #f2e9dd; text-shadow: none; }
  .mh-up { grid-column: 2; grid-row: 1; }
  .mh-left { grid-column: 1; grid-row: 2; }
  .mh-right { grid-column: 3; grid-row: 2; }
  .mh-down { grid-column: 2; grid-row: 3; }
  #mobileHelpText {
    margin: 0 0 16px;
    font-size: 13px;
    font-weight: 600;
    color: #cbb89a;
  }
  #mobileHelpClose {
    min-width: 44px;
    min-height: 44px;
    padding: 0 26px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff2e63, #c81854);
    color: #fff;

</style>

<body>

        <!-- dir="ltr" is load-bearing: .htSnake is a flex row, and flex rows

<!-- dir="ltr" is deliberate and load-bearing here for the same reason it

     dir="rtl" (like flex row does), which would swap the physical
     left/right arrow positions even though only in-page *text* is meant

     comment) so it's never measured by measureReservePx(). -->

<script>
(function () {
  "use strict";

  // ---------- constants ----------
  // GRID_N was 19 (720px board => ~38px cells), then cut to 13 (~55px cells)
  // for readability. Per the Product-approved grid/avatar/palette spec, it is
  // now cut again to 9: a ~30.8% reduction from 13 (the closest odd integer
  // to the requested ~35%; 8 would be 38.5% but breaks the odd/center-cell
  // invariant this comment is about). It's odd so Math.floor(GRID_N/2) still
  // gives a true center cell for the snake's start position (unchanged spawn
  // logic), and on the same 720px board it gives ~80px cells - large, clearly
  // readable head/body circles, at the cost of a smaller grid to navigate.
  var GRID_N = 9;                 // fixed logical grid, both axes
  // Endpoints scaled twice on request: first by 1.3x (160->208, 70->91) for
  // the "30% slower" pass, then doubled (208->416, 91->182) for the "50%
  // slower" pass - halving speed means doubling the per-cell interval.
  // STEP_DECAY (the relative per-level ramp) stays untouched both times:
  // it's a ratio, not an absolute speed, so scaling only the endpoints
  // already slows every level in the curve by the same proportion.
  var BASE_STEP_MS = 416;         // level 1 step interval
  var MIN_STEP_MS = 182;          // floor
  var STEP_DECAY = 0.92;          // ~8% faster per level
  var POPCORN_PER_LEVEL = 5;
  // Chasers move at a fraction of the snake's step rate rather than a fixed
  // "every Nth step" toggle, so the cadence is tunable to non-integer ratios.
  // 0.5 (the old chaserTick 0/1 toggle) was "every 2 steps"; 0.4 is one
  // chaser move per 2.5 snake steps - 20% fewer chaser moves - per the
  // level-flow rework (small board = chasers too close to react to).
  var CHASER_MOVE_RATE = 0.4;     // chaser moves per snake step
  var COUNTDOWN_MS = 3000;        // "get ready" freeze before each level's play
  var SWIPE_THRESHOLD = 35;       // px
  var HI_KEY = "dubisnake_hi";

  var DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 }
  };

  // ---------- DOM ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var wrap = document.getElementById("wrap");
  var boardWrapEl = document.getElementById("boardWrap");
  var hudScore = document.getElementById("scoreVal");
  var hudLevel = document.getElementById("levelVal");
  var hudHi = document.getElementById("hiVal");
  var scoreBarFill = document.getElementById("scoreBarFill");
  var levelPip1 = document.getElementById("levelPip1");
  var levelPip2 = document.getElementById("levelPip2");
  var levelPip3 = document.getElementById("levelPip3");
  var avatarHudImg = document.getElementById("avatarHudImg");
  var overlay = document.getElementById("overlay");
  var playBtn = document.getElementById("playBtn");
  var levelFlash = document.getElementById("levelFlash");
  var levelFlashCard = document.getElementById("levelFlashCard");
  var levelFlashTitle = document.getElementById("levelFlashTitle");
  var levelMonsters = document.getElementById("levelMonsters");
  var levelOkBtn = document.getElementById("levelOkBtn");
  var langToggleBtn = document.getElementById("langToggle");
  var scoreLabelEl = document.getElementById("scoreLabel");
  var levelLabelEl = document.getElementById("levelLabel");
  var hiLabelEl = document.getElementById("hiLabel");
  var mobileHelp = document.getElementById("mobileHelp");
  var mobileHelpText = document.getElementById("mobileHelpText");
  var mobileHelpClose = document.getElementById("mobileHelpClose");
  var MOBILE_HELP_SEEN_KEY = "dubisnake_mobilehelp_seen";

  // ---------- i18n: every visible string, keyed by language, switchable at
  // runtime with no page reload. The "dubisnake" brand name is intentionally
  // NOT in here - it's a proper noun/brand and stays as-is in both
  // languages, matching the existing convention for "WASD"-style keycap
  // labels elsewhere in this file (now moot, see KEY_DIR below - arrow keys
  // only, WASD removed as a movement input per spec). ----------
  var STRINGS = {
    he: {
      dir: "rtl",
      metaDescription: "Customized retro snake game.",
      scoreLabel: "ניקוד",
      levelLabel: "רמה",
      hiLabel: "שיא",
      footerHi: "השיא נשמר מקומית במכשיר",
      footerHiFail: "השיא לא נשמר הפעם (האחסון אינו זמין)",
      // Brand name gets a Hebrew form specifically in Hebrew mode (English
      // mode keeps the Latin "dubisnake" - see brandTitle below).
      brandTitle: "דוביסנייק",
      // Deliberately just the one punchy line now (was a full mechanics
      // explainer) - rendered bigger/bolder via the .tagline class, not the
      // plain #overlay p style; the controls line below is unchanged.
      menuInstructions: "אכלו את הפופקורן!",
      mobileHelpText: "החליקו כדי לזוז",
      loadingBtn: "טוען…",
      playBtn: "שחק",
      playAgainBtn: "שחק שוב",
      deadTitle: "המשחק נגמר",
      wonTitle: "ניצחת!",
      scoreStat: function (n) { return "ניקוד: " + n; },
      hiStat: function (n) { return "שיא: " + n; },
      wonBoardFull: function (n) { return "הלוח מלא - ניקוד: " + n; },
      deadRetry: "הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לנסות שוב.",
      wonRetry: "הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לשחק שוב.",
      pausedTitle: "מושהה",
      pausedResume: "רווח / הקישו המשך כדי להמשיך.",
      resumeBtn: "המשך",
      levelFlashLabel: function (n) { return "רמה " + n; },
      // Retro opening-scene overlay text (Task C) - pulsing, drawn on the
      // board canvas itself (see renderPressAnyKey()), not uppercased (this
      // isn't a HUD label - see the Hebrew-not-uppercased note on hud-label
      // above, which doesn't apply here anyway since Hebrew has no case).
      pressAnyKey: "הקישו על מקש כלשהו",
      toggleLabel: "English",
      toggleAria: "Switch to English"
    },
    en: {
      dir: "ltr",
      metaDescription: "Customized retro snake game.",
      scoreLabel: "Score",
      levelLabel: "Level",
      hiLabel: "Best",
      footerHi: "High score saved locally on this device",
      footerHiFail: "High score not saved this time (storage unavailable)",
      // English keeps the Latin brand name as-is.
      brandTitle: "dubisnake",
      // Matches the simplified Hebrew tagline - see the "he" entry above.
      menuInstructions: "Eat the popcorn!",
      mobileHelpText: "Swipe to move",
      loadingBtn: "Loading…",
      playBtn: "Play",
      playAgainBtn: "Play Again",
      deadTitle: "Game Over",
      wonTitle: "You Win!",
      scoreStat: function (n) { return "Score: " + n; },
      hiStat: function (n) { return "High score: " + n; },
      wonBoardFull: function (n) { return "Board full - score: " + n; },
      deadRetry: "Tap Play, press Enter, or tap the board to try again.",
      wonRetry: "Tap Play, press Enter, or tap the board to play again.",
      pausedTitle: "Paused",
      pausedResume: "Space / tap Resume to continue.",
      resumeBtn: "Resume",
      levelFlashLabel: function (n) { return "Level " + n; },
      // Retro opening-scene overlay text (Task C) - pulsing, drawn on the
      // board canvas itself (see renderPressAnyKey()).
      pressAnyKey: "PRESS ANY KEY",
      toggleLabel: "עברית",
      toggleAria: "עבור לעברית"
    }
  };
  var LANG_KEY = "dubisnake_lang";
  var currentLang = "he";
  try {
    var storedLang = localStorage.getItem(LANG_KEY);
    if (storedLang === "he" || storedLang === "en") currentLang = storedLang;
  } catch (e) { /* private mode / storage disabled - default stands */ }

  function S() { return STRINGS[currentLang]; }

  // ---------- image preload with colored-circle fallback ----------
  // No getImageData is used anywhere so this stays file:// safe.
  var ASSET_LIST = [
    { key: "head1", src: "./assets/head-1.png", fallback: "#e0a458" },
    { key: "head2", src: "./assets/head-2.png", fallback: "#c97b63" },
    { key: "head3", src: "./assets/head-3.png", fallback: "#a56a9e" },
    { key: "food", src: "./assets/food.png", fallback: "#ffd166" },
    { key: "splash", src: "./assets/splash.png", fallback: "#ffcf6b" },
    { key: "ghost1", src: "./assets/ghost-1.png", fallback: "#ff4b3a" },
    { key: "ghost2", src: "./assets/ghost-2.png", fallback: "#ff7bd5" },
    { key: "ghost3", src: "./assets/ghost-3.png", fallback: "#3ed6e0" }
  ];
  // Loads the image set and keeps a colored-circle canvas fallback per key,
  // so a failed / absent / stalled image can never blank a sprite or hang
  // the game. Access loaded state only through image()/drawable()/src().
  class AssetStore {
    constructor(list) {
      this.list = list;
      this.images = {};    // key -> HTMLImageElement (only if it loaded ok)
      this.fallbacks = {}; // key -> canvas, used when the image failed/absent
      this._ready = 0;
      this._total = list.length;
    }

    _fallbackCanvas(color) {
      var c = document.createElement("canvas");
      c.width = 64; c.height = 64;
      var cx = c.getContext("2d");
      cx.beginPath();
      cx.arc(32, 32, 30, 0, Math.PI * 2);
      cx.fillStyle = color;
      cx.fill();
      return c;
    }

    // A stalled request (neither load nor error ever fires - flaky mobile
    // networks do this) must not be able to hang the game forever: the rAF
    // loop only starts after all list entries "settle", so one dead request
    // would otherwise mean _ready never reaches _total, done() never runs,
    // and the board never starts moving even after the static Play button is
    // tapped. Give every image a hard deadline and fall back to the
    // colored-circle canvas if it hasn't settled by then.
    preload(done) {
      var self = this;
      this.list.forEach(function (a) {
        var img = new Image();
        var settled = false;
        var timeoutId = setTimeout(function () {
          self.fallbacks[a.key] = self._fallbackCanvas(a.fallback);
          finish();
        }, AssetStore.TIMEOUT_MS);
        function finish() {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          self._ready++;
          if (self._ready >= self._total) done();
        }
        img.onload = function () {
          // guard against a 200-response truncated/corrupt/zero-byte image:
          // onload can fire before naturalWidth is meaningful in some engines,
          // so only accept it as "loaded" when it actually has pixels.
          if (img.naturalWidth > 0) {
            self.images[a.key] = img;
          } else {
            self.fallbacks[a.key] = self._fallbackCanvas(a.fallback);
          }
          finish();
        };
        img.onerror = function () {
          self.fallbacks[a.key] = self._fallbackCanvas(a.fallback);
          finish();
        };
        img.src = a.src;
      });
    }

    // The loaded <img> for a key, or null - use where a REAL image is
    // required and the fallback circle is drawn some other way.
    image(key) {
      return this.images[key] || null;
    }

    // The image if loaded, else the colored-circle fallback canvas. Both are
    // valid CanvasRenderingContext2D.drawImage() sources.
    drawable(key) {
      return this.images[key] || this.fallbacks[key];
    }

    // A usable <img>-src string for a key: the real image src, else the
    // fallback canvas as a data URL, else a 1x1 transparent GIF so an
    // <img src> is never set to "" (which some browsers/embedders re-request
    // as the current document). Used for splash/level-banner/avatar <img>s.
    src(key) {
      if (this.images[key]) return this.images[key].src;
      if (this.fallbacks[key]) return this.fallbacks[key].toDataURL();
      return AssetStore.BLANK_PIXEL_SRC;
    }
  }
  AssetStore.TIMEOUT_MS = 4000;
  AssetStore.BLANK_PIXEL_SRC = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";

  var assetStore = new AssetStore(ASSET_LIST);

  // ---------- head cycle / per-level body tint (predefined, no getImageData) ----------
  var HEAD_KEYS = ["head1", "head2", "head3"];
  // Per-level tint pool, cycles with the heads. Per the grid/avatar/palette
  // spec, this is no longer a warm amber cluster (~20-25deg hue spread) - it's
  // three genuinely varied hues (green ~140deg, blue ~220deg, magenta ~330deg)
  // deliberately kept clear of the HUD accent cyan (~190deg, see #hud span b
  // and the avatar ring in CSS) so "stable UI chrome" (HUD/avatar) and
  // "per-level game state" (these tints) never share a color.
  var LEVEL_TINTS = [
    { core: "#00e676", edge: "#00693e" }, // vivid green
    { core: "#2979ff", edge: "#0d3f9e" }, // electric blue
    { core: "#ff3d81", edge: "#8f0046" }  // hot magenta
  ];
  // Ghost idle animation (Task A - port of new-assets/animations/solo-scenes.jsx):
  // each chaser floats/rotates/pulses/glows on its own phase, as a purely
  // visual sub-cell offset applied only at draw time in render(). Nothing
  // here ever touches ch.x/ch.y - chaserAt() and every hit test keep reading
  // the plain integer grid cell.
  // Raw dx/dy amplitudes below are ported verbatim from the reference, which
  // was tuned against a GS=130px sprite box on a 2.5s loop; they're rescaled
  // by (in-game ghost size / GS) at draw time so they read as sub-cell drift,
  // never raw pixels.
  var GHOST_IDLE_GS = 130;
  var GHOST_IDLE_PERIOD_MS = 2500;
  var GHOST_IDLE_TAU = Math.PI * 2;
  var GHOST_IDLE = [
    { // 1 Curly - blue
      color: "#4a9eff",
      glowBase: 0.30,
      // QA fix: writes onto the caller-supplied scratch object instead of
      // returning a new object literal, so render()'s per-frame ghost loop
      // (up to 3 ghosts * ~60fps) does no per-frame allocation - see
      // GHOST_IDLE_SCRATCH below.
      motion: function (a, b, out) {
        out.dx = Math.sin(a) * 30;
        out.dy = -Math.cos(a) * 20;
        out.rot = Math.sin(a) * 6;
        out.scaleOsc = Math.sin(b) * 0.05;
        out.glow = 0.30 + Math.sin(a) * 0.25;
        return out;
      }
    },
    { // 2 Smokey - red
      color: "#ff4444",
      glowBase: 0.30,
      motion: function (a, b, out) {
        out.dx = Math.sin(a) * 25;
        out.dy = Math.sin(b) * 22;
        out.rot = Math.sin(a) * 4;
        out.scaleOsc = Math.sin(a) * 0.06;
        out.glow = 0.30 + Math.cos(a) * 0.25;
        return out;
      }
    },
    { // 3 Screamer - green

    // (pre-avatar-growth) HUD height, with no second pass to compensate once
    // the avatar actually grew. Verified concretely at 593x646: cellPx
    // settled at 63px -> avatar/HUD height 189px -> #wrap needed ~787px in a

    // nothing guarantees a real static session (no resize/orientationchange/

    // smaller available -> smaller cellPx), so it stabilizes to (at, or very

        window.innerWidth - 16 - FRAME_HORIZONTAL_PX

      // viewport can actually fit that floor without forcing a scroll (i.e.
      // `available` - the real fit budget computed above - already meets or
      // exceeds it, so this is a no-op). When the fit budget is smaller than
      // the ideal floor, honor the fit budget itself (keeps the no-scroll
      // requirement intact) and only clamp up to the much smaller
      // SAFETY_MIN_BOARD_PX as an absolute last resort against a near-zero
      // board on a truly pathological viewport - the old unconditional
      // `Math.max(MIN_BOARD_PX, available)` is what forced scrolling on
      // short landscape phones that used to fit at the previous
      // GRID_N/floor tuning.

      // #boardWrap) so it cascades to #hud's --avatar-px calc() (see #hud

    // landscape boards where MIN_BOARD_PX forces the board below what the
    // old vmin-only sizing assumed.

  // never leave the grid (the head is inside it), and they deliberately
  // pass over the snake's body, the food, and each other - only exact
  // head contact matters. Per-index axis preference keeps multiple
  // chasers approaching from different directions instead of merging
  // into one stacked blob.
  //
  // A chaser NEVER steps onto the head's own cell. Before this rule, being
  // adjacent to a chaser on a move where it also stepped was an unavoidable
  // death: the player slipped safely PAST the ghost (into a different cell,
  // no overlap), and the ghost's own move in that same tick then landed on
  // top of them - so the effective hitbox was radius 1, not 0, and passing
  // beside a ghost read as a phantom hit. With the rule, death by chaser is
  // exactly "you moved into it", the same contract as walls and self
  // collision, and the ghosts act as pursuing blockers that corner you

  }

        // the chaser exclusion rather than mis-reporting a win.
        for (gy = 0; gy < GRID_N && !found; gy++) {
