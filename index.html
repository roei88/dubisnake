<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>dubisnake</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="משחק נחש בסגנון נוקיה, עם ראש שהוא תמונת פרופיל ומזון פופקורן.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none';">
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #14100e;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    /* touch-action left at its default (auto) here, not "none": pinch-zoom is
       already fully blocked page-wide by the viewport meta's
       maximum-scale=1/user-scalable=no (a gesture-level block, distinct from
       touch-action), so body doesn't need touch-action:none too. That matters
       because touch-action:none also blocks touch-driven *scrolling*, not
       just zooming - if it were set here it would break #wrap's
       overflow-y:auto safety net (small-viewport fallback), making it
       unreachable by touch (only a mouse wheel would still work). Game
       controls (canvas, #playBtn, #dpad button) additionally get
       touch-action:none of their own so a swipe/tap there can't be
       misinterpreted as a scroll gesture. */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f2e9dd;
  }
  #wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-height: 100vh;
    overflow-y: auto;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    width: 100%;
    font-size: clamp(13px, 2.6vmin, 18px);
    letter-spacing: 0.02em;
    padding: 0 2px;
    box-sizing: border-box;
    /* Defense-in-depth alongside #boardWrap's flex-shrink:0 (see comment
       above it): #hud/#footer/#dpad don't have overflow:hidden so they
       aren't vulnerable to the zero-automatic-min-size flex behavior that
       motivated that fix, but pinning them too means #wrap's overflow-y:auto
       is the fallback for *any* over-tall stack, not just ones caused by
       the board specifically. */
    flex-shrink: 0;
    /* --cell-px is written from JS in resizeCanvas() (the single existing
       place --board-px is already set) - the one source of truth every size
       constant, including the avatar below, derives from. --avatar-px is a
       declarative CSS custom property computed from it (3 cells). The 240px
       ceiling is a defensive fallback ONLY, not a real-world design cap: it
       must stay >= 3 * (MAX_BOARD_PX / GRID_N) = 3 * 80 = 240px (the JS-side
       bound on cellPx - see MAX_BOARD_PX/GRID_N below), otherwise it quietly
       overrides the "avatar is genuinely >=3 cells, in both dimensions, at
       every viewport size" requirement. A previous revision capped this at
       96px on the theory that it "doesn't dominate a compact HUD bar on
       larger screens" - that reasoning is exactly backwards for this
       requirement: it measurably broke down to as little as ~1.2-1.5 cells
       once cellPx exceeded 32px (confirmed live at a real 768x646 viewport:
       cellPx 63px -> avatar stuck at 96px -> 1.52 cells, not >=3). If
       MAX_BOARD_PX or GRID_N ever change, this 240px must be revisited
       together with them - it is not independently derived. */
    --avatar-px: min(calc(var(--cell-px, 16px) * 3), 240px);
  }
  #hud span b { color: #00e5ff; }
  /* Always-visible avatar HUD element (menu/playing/paused/dead/won - never
     gated to "after first play"). A genuine flex item now (NOT
     position:absolute). It used to be pinned top:0;left:0 on the theory that
     "top-left is the one corner not already claimed by the RTL-anchored
     score/level/hi-score text, which visually sits toward the right" - that
     theory only held for the FIRST of the three <span> children. Under
     dir="rtl" with justify-content:space-between, the LAST DOM span (the
     high-score "שיא" one) is the one flexbox pushes to the physical LEFT
     edge - the exact corner the avatar was pinned to. Confirmed by measuring
     real layout: avatar rect x:108-204/y:0-96 vs the "שיא" span's rect
     x:110-152/y:38-58 - a dead overlap, and not an edge case, since the
     avatar's own minimum width (48px, see --avatar-px above) already exceeds
     the ~2px inner padding where that span starts, at every achievable
     cellPx. Making #avatarHud a real flex item instead removes the collision
     structurally: flexbox distributes all 4 items (avatar + 3 spans) with
     guaranteed non-overlap, instead of trusting a manually reasoned absolute
     offset that only covered one of the three spans. #avatarHud is placed
     LAST in DOM source order (after the three spans) specifically because,
     under dir="rtl" row flex, the last DOM child lands at the physical LEFT
     edge (mirror image of LTR, where the last child lands on the right) -
     putting it first would land it at the physical top-RIGHT instead, which
     was tried and confirmed wrong. This ordering is what actually keeps the
     avatar in the intended top-left corner, with real gap between every
     item and no overlap. */
  #avatarHud {
    width: var(--avatar-px, 48px);
    height: var(--avatar-px, 48px);
    flex-shrink: 0;
    border-radius: 50%;
    /* small dark chip behind the image so it doesn't float directly against
       the light HUD text */
    background: #1c1815;
    box-shadow: 0 0 0 2px #00e5ff, 0 2px 8px rgba(0,0,0,0.4);
    overflow: hidden;
    pointer-events: none;
  }
  #avatarHud img {
    width: 100%;
    height: 100%;
    /* head-N.png are confirmed 512x512 square with content filling to the
       image edges (no transparent margin - checked via PIL getbbox() before
       implementation), so object-fit:cover is safe: it will not crop into
       transparent padding. */
    object-fit: cover;
    display: block;
  }
  /* flex-shrink:0 is load-bearing: #boardWrap has overflow:hidden, and per
     the flex spec an overflow:hidden item's automatic min-height becomes 0
     (instead of its content size), so without this the flex column in #wrap
     was free to squeeze #boardWrap (and the canvas/overlay/level-flash-card
     inside it) shorter than its actual content on cramped viewports, instead
     of #wrap's own overflow-y:auto kicking in as intended. That clipped the
     live canvas, the level-up head photo/blurb, and the overlay text at
     exactly the sizes resizeCanvas() had computed for --board-px. Pinning
     flex-shrink:0 here forces the *intended* fallback (scroll) instead of
     silent clipping in the rare cases the board still can't fully fit. */
  #boardWrap { flex-shrink: 0; }
  canvas {
    background: #1c1815;
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 12px 30px rgba(0,0,0,0.45);
    touch-action: none;
    display: block;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: rgba(10, 8, 7, 0.82);
    border-radius: 10px;
    padding: 20px;
    box-sizing: border-box;
    /* QA fix: the dead/won content stack (splash image + h1 + 2 stat lines +
       instructions + button) can be taller than #boardWrap on cramped/
       landscape viewports even after every child's own board-px-based clamp
       below - #boardWrap's own overflow:hidden then clips it, and since
       #overlay used to be vertically centered via justify-content:center,
       there was no way to scroll to the clipped part: #wrap's outer
       overflow-y:auto only moves the whole (already internally-clipped)
       #boardWrap block, it can't reveal more of #overlay's own clipped
       content. Verified live at a real 568x326 viewport: #boardWrap
       bottom~306-308px, #playBtn bottom~324.7-334.3px - ~60% of the "שחק שוב"
       button (its entire label) invisible and untappable, at scrollTop 0,
       with nothing to trigger a fix. Making #overlay itself the scrollable
       box (its own overflow-y:auto, independent of #boardWrap's) means any
       remaining overflow is always reachable by a normal scroll-down
       gesture - see .overlayInner below for how vertical centering still
       works in the common (non-overflowing) case. */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #overlay.hidden { display: none; }
  /* Centers vertically via margin:auto instead of justify-content:center on
     #overlay. This is the standard fix for "can't scroll to see overflowing
     centered flex content": auto margins consume any extra space when there
     is room (identical visual result to justify-content:center in the
     everyday case), but resolve to 0 - not negative - when there isn't,
     which is exactly flex-start: content starts flush at the top of #overlay
     and any overflow lands entirely at the bottom, inside the normal
     scroll-down direction #overlay's own overflow-y:auto (above) now
     provides. justify-content:center could not be scrolled past on the
     "before" side in any browser, which is exactly what made the button
     unreachable at 568x326 (see #overlay comment). */
  .overlayInner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: min(10px, calc(var(--board-px, 300px) * 0.03));
    margin: auto 0;
  }
  /* h1/p/.stat below are each clamped with the same min(vmin-clamp,
     --board-px-derived) pattern already used by #levelFlashCard's children
     (see the comment on #levelFlashCard). Without this, text sized purely
     from vmin ignores how narrow the *actual* #boardWrap container (which
     clips via overflow:hidden) can get once resizeCanvas() has to shrink the
     board below what vmin assumed (small/landscape viewports) - confirmed
     clipping the "dubisnake" <h1> (rendered ~181px wide inside a 104px-wide
     container) before this fix. */
  #overlay h1 {
    margin: 0;
    font-size: min(clamp(28px, 7vmin, 46px), calc(var(--board-px, 300px) * 0.16));
    color: #ffd27a;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  #overlay p {
    margin: 2px 0;
    font-size: min(clamp(13px, 2.6vmin, 16px), calc(var(--board-px, 300px) * 0.055));
    max-width: min(32ch, calc(var(--board-px, 300px) * 0.88));
    line-height: 1.4;
    color: #e8dcc8;
  }
  #overlay .stat { font-size: min(clamp(15px, 3vmin, 20px), calc(var(--board-px, 300px) * 0.065)); color: #fff; }
  #playBtn {
    /* QA fix: same board-px-based shrink pattern as the rest of #overlay's
       children (see comment above #overlay h1 and .splashPic) - these three
       were previously fixed px regardless of how small the board got, which
       contributed to the dead/won overlay overflowing #boardWrap. */
    margin-top: min(8px, calc(var(--board-px, 300px) * 0.025));
    padding: min(12px, calc(var(--board-px, 300px) * 0.035)) min(34px, calc(var(--board-px, 300px) * 0.1));
    font-size: min(clamp(16px, 3.2vmin, 20px), calc(var(--board-px, 300px) * 0.075));
    font-weight: 700;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff3d81, #c9006b);
    color: #2a0714;
    box-shadow: 0 6px 16px rgba(201,0,107,0.4);
    cursor: pointer;
    touch-action: none;
  }
  #playBtn:active { transform: translateY(1px); }
  #playBtn:disabled { opacity: 0.55; cursor: default; }
  /* Level-up "level details" screen: a short, colorful, non-blocking pop
     shown at every level-up (see #levelFlashCard below for the per-level
     color-pop background, set inline via JS from the level's warm tint).
     It overlays on top of the canvas (pointer-events:none, no click/tap
     needed to dismiss) and times out on its own; it never touches `state`,
     so actual gameplay/snake movement keeps running underneath it. */
  #levelFlash {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    border-radius: 10px;
    overflow: hidden;
  }
  #levelFlash.show { opacity: 1; }
  #levelFlashCard {
    display: flex;
    flex-direction: column;
    align-items: center;
    /* gap/padding/img/text/blurb below are each the smaller of a vmin-based
       value (the original design intent, and what wins on ordinary
       viewports where the board comfortably fits the window) and a value
       derived from --board-px (the actual canvas container's CSS pixel
       size, set from JS in resizeCanvas()). --board-px only "wins" (via
       min()) when the container itself has been squeezed below what vmin
       assumed - e.g. landscape phones with the on-screen d-pad, where
       resizeCanvas() intentionally floors the board at MIN_BOARD_PX - so
       the enlarged head photo/text/blurb shrink to fit the *actual*
       container instead of clipping against its overflow:hidden. */
    gap: min(8px, calc(var(--board-px, 300px) * 0.025));
    max-width: min(82%, calc(var(--board-px, 300px) * 0.94));
    padding: min(18px, calc(var(--board-px, 300px) * 0.04)) min(26px, calc(var(--board-px, 300px) * 0.08));
    border-radius: 20px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    text-align: center;
    box-sizing: border-box;
  }
  #levelFlashCard img {
    width: min(clamp(84px, 26vmin, 160px), calc(var(--board-px, 300px) * 0.36));
    height: min(clamp(84px, 26vmin, 160px), calc(var(--board-px, 300px) * 0.36));
    object-fit: contain;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.55);
  }
  .splashPic {
    /* QA fix: unlike #overlay's h1/p/.stat (which already min() against
       --board-px, see the comment above #overlay h1), this used to be
       vmin-only, so on a small/landscape board it did not shrink to match
       the actual (clipped-down) #boardWrap container - one of the
       contributors to the dead/won overlay overflowing #boardWrap's box
       (see #overlay comment). Now capped the same way as its siblings. */
    width: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));
    height: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45));
  }
  #levelFlashText {
    font-size: min(clamp(20px, 4.6vmin, 32px), calc(var(--board-px, 300px) * 0.09));
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
  }
  #levelFlashBlurb {
    margin: 0;
    font-size: min(clamp(13px, 2.7vmin, 17px), calc(var(--board-px, 300px) * 0.05));
    max-width: min(26ch, calc(var(--board-px, 300px) * 0.86));
    line-height: 1.35;
    color: #fffaf0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.45);
  }
  /* #dpad used to be position:fixed at the viewport bottom while
     resizeCanvas() tried to reserve matching space by subtracting a fixed
     px budget from window.innerHeight. That broke because body centers
     #wrap with align-items:center/justify-content:center: the "reserved"
     gap got split into equal top+bottom margins around #wrap instead of
     landing entirely below the content, so the fixed pad visually
     overlapped the canvas/footer on common phone sizes (verified ~30-60px
     overlap on iPhone SE/Android/landscape/iPad mini). Fix: put #dpad back
     in normal document flow as a sibling of #hud/canvas/#footer inside
     #wrap. The flexbox then sizes and centers everything as one block, so
     the pad can never sit on top of the canvas or footer - worst case on a
     very small viewport, #wrap's existing overflow-y:auto (see the touch-
     action comment above) lets the user scroll to it instead of it being
     clipped or overlapping. */
  #dpad {
    display: none;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
    margin-bottom: env(safe-area-inset-bottom);
    flex-shrink: 0; /* see #hud comment: never let flex compress the d-pad */
  }
  @media (pointer: coarse) {
    #dpad.enabled { display: grid; }
  }
  #dpad button {
    grid-area: auto;
    width: 56px;
    height: 56px;
    min-width: 44px;
    min-height: 44px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #f2e9dd;
    font-size: 20px;
    touch-action: none;
  }
  #dpad button:active { background: rgba(0,229,255,0.35); }
  #up { grid-column: 2; grid-row: 1; }
  #left { grid-column: 1; grid-row: 2; }
  #down { grid-column: 2; grid-row: 3; }
  #right { grid-column: 3; grid-row: 2; }
  #mid { grid-column: 2; grid-row: 2; visibility: hidden; }
  #footer {
    font-size: clamp(10px, 2vmin, 12px);
    color: #8a7c6b;
    flex-shrink: 0; /* see #hud comment: never let flex compress this below its text */
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>ניקוד <b id="scoreVal">0</b></span>
    <span>רמה <b id="levelVal">1</b></span>
    <span>שיא <b id="hiVal">0</b></span>
    <div id="avatarHud"><img id="avatarHudImg" alt=""></div>
  </div>
  <div id="boardWrap" style="position:relative; overflow:hidden;">
    <canvas id="game"></canvas>
    <div id="levelFlash">
      <div id="levelFlashCard">
        <img id="levelFlashImg" alt="">
        <span id="levelFlashText">רמה 2</span>
        <p id="levelFlashBlurb"></p>
      </div>
    </div>
    <div id="overlay">
      <div class="overlayInner">
        <h1>dubisnake</h1>
        <p>נווטו עם הראש ברשת, אכלו את הפופקורן, ואל תפגעו בקירות או בעצמכם. המהירות עולה כל 5 חתיכות.</p>
        <p class="stat">חצים/WASD, החלקה, או לוח הכיוונים. מקש הרווח משהה.</p>
        <button id="playBtn" type="button" disabled>טוען&hellip;</button>
      </div>
    </div>
  </div>
  <div id="footer">השיא נשמר מקומית במכשיר</div>
  <!-- dir="ltr" is deliberate and load-bearing: CSS Grid mirrors track order
       under an inherited dir="rtl" (like flex row does), which would swap the
       physical left/right button positions here even though only in-page
       *text* is meant to localize. Pinning this control widget to ltr keeps
       "left" physically left and "right" physically right, matching the
       ArrowLeft/swipe-left semantics exactly as before; only the (Hebrew)
       aria-label strings changed. -->
  <div id="dpad" dir="ltr">
    <button id="up" aria-label="למעלה">&#9650;</button>
    <button id="left" aria-label="שמאלה">&#9664;</button>
    <div id="mid"></div>
    <button id="right" aria-label="ימינה">&#9654;</button>
    <button id="down" aria-label="למטה">&#9660;</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- constants ----------
  // GRID_N was 19 (720px board => ~38px cells), then cut to 13 (~55px cells)
  // for readability. Per the Product-approved grid/avatar/palette spec, it is
  // now cut again to 9: a ~30.8% reduction from 13 (the closest odd integer
  // to the requested ~35%; 8 would be 38.5% but breaks the odd/center-cell
  // invariant this comment is about). It's odd so Math.floor(GRID_N/2) still
  // gives a true center cell for the snake's start position (unchanged spawn
  // logic), and on the same 720px board it gives ~80px cells - large, clearly
  // readable head/body circles, at the cost of a smaller grid to navigate.
  var GRID_N = 9;                 // fixed logical grid, both axes
  var BASE_STEP_MS = 160;         // level 1 step interval
  var MIN_STEP_MS = 70;           // floor
  var STEP_DECAY = 0.92;          // ~8% faster per level
  var POPCORN_PER_LEVEL = 5;
  var SWIPE_THRESHOLD = 35;       // px
  var HI_KEY = "dubisnake_hi";

  var DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 }
  };

  // ---------- DOM ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var wrap = document.getElementById("wrap");
  var boardWrapEl = document.getElementById("boardWrap");
  var hudScore = document.getElementById("scoreVal");
  var hudLevel = document.getElementById("levelVal");
  var hudHi = document.getElementById("hiVal");
  var avatarHudImg = document.getElementById("avatarHudImg");
  var overlay = document.getElementById("overlay");
  var playBtn = document.getElementById("playBtn");
  var levelFlash = document.getElementById("levelFlash");
  var levelFlashCard = document.getElementById("levelFlashCard");
  var levelFlashImg = document.getElementById("levelFlashImg");
  var levelFlashText = document.getElementById("levelFlashText");
  var levelFlashBlurb = document.getElementById("levelFlashBlurb");
  var dpad = document.getElementById("dpad");

  // ---------- image preload with colored-circle fallback ----------
  // No getImageData is used anywhere so this stays file:// safe.
  var ASSET_LIST = [
    { key: "head1", src: "./assets/head-1.png", fallback: "#e0a458" },
    { key: "head2", src: "./assets/head-2.png", fallback: "#c97b63" },
    { key: "head3", src: "./assets/head-3.png", fallback: "#a56a9e" },
    { key: "food", src: "./assets/food.png", fallback: "#ffd166" },
    { key: "splash", src: "./assets/splash.png", fallback: "#ffcf6b" }
  ];
  var assets = {};       // key -> HTMLImageElement (only if it loaded ok)
  var assetFallback = {};// key -> color string, used when image failed
  var assetsReady = 0;
  var assetsTotal = ASSET_LIST.length;

  function makeFallbackCanvas(color) {
    var c = document.createElement("canvas");
    c.width = 64; c.height = 64;
    var cx = c.getContext("2d");
    cx.beginPath();
    cx.arc(32, 32, 30, 0, Math.PI * 2);
    cx.fillStyle = color;
    cx.fill();
    return c;
  }

  // A stalled request (neither load nor error ever fires - flaky mobile
  // networks do this) must not be able to hang the game forever: the rAF
  // loop only starts after all ASSET_LIST entries "settle", so one dead
  // request would otherwise mean assetsReady never reaches assetsTotal,
  // done() never runs, and the board never starts moving even after the
  // static Play button is tapped. Give every image a hard deadline and fall
  // back to the colored-circle canvas if it hasn't settled by then.
  var ASSET_TIMEOUT_MS = 4000;

  function preloadAssets(done) {
    ASSET_LIST.forEach(function (a) {
      var img = new Image();
      var settled = false;
      var timeoutId = setTimeout(function () {
        assetFallback[a.key] = makeFallbackCanvas(a.fallback);
        finish();
      }, ASSET_TIMEOUT_MS);
      function finish() {
        if (settled) return;
        settled = true;
        clearTimeout(timeoutId);
        assetsReady++;
        if (assetsReady >= assetsTotal) done();
      }
      img.onload = function () {
        // guard against a 200-response truncated/corrupt/zero-byte image:
        // onload can fire before naturalWidth is meaningful in some engines,
        // so only accept it as "loaded" when it actually has pixels.
        if (img.naturalWidth > 0) {
          assets[a.key] = img;
        } else {
          assetFallback[a.key] = makeFallbackCanvas(a.fallback);
        }
        finish();
      };
      img.onerror = function () {
        assetFallback[a.key] = makeFallbackCanvas(a.fallback);
        finish();
      };
      img.src = a.src;
    });
  }

  function drawable(key) {
    return assets[key] || assetFallback[key];
  }

  // usable <img>-src string for a key, whether it's a real loaded image or
  // the colored-circle-canvas fallback - used for the splash.png shown on
  // the level-up flash and the game-over screen.
  // 1x1 transparent GIF - fail-closed placeholder so an <img src> is never
  // set to "" (which some browsers/embedders re-request as the current doc).
  var BLANK_PIXEL_SRC = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";

  function assetSrc(key) {
    if (assets[key]) return assets[key].src;
    if (assetFallback[key]) return assetFallback[key].toDataURL();
    return BLANK_PIXEL_SRC;
  }

  // ---------- head cycle / per-level body tint (predefined, no getImageData) ----------
  var HEAD_KEYS = ["head1", "head2", "head3"];
  // Per-level tint pool, cycles with the heads. Per the grid/avatar/palette
  // spec, this is no longer a warm amber cluster (~20-25deg hue spread) - it's
  // three genuinely varied hues (green ~140deg, blue ~220deg, magenta ~330deg)
  // deliberately kept clear of the HUD accent cyan (~190deg, see #hud span b
  // and the avatar ring in CSS) so "stable UI chrome" (HUD/avatar) and
  // "per-level game state" (these tints) never share a color.
  var LEVEL_TINTS = [
    { core: "#00e676", edge: "#00693e" }, // vivid green
    { core: "#2979ff", edge: "#0d3f9e" }, // electric blue
    { core: "#ff3d81", edge: "#8f0046" }  // hot magenta
  ];
  // Short, dry, PG snake/popcorn/speed one-liners for the level-details
  // screen (levelUp()) - one per head/tint in the cycle, in Hebrew per the
  // in-page localization spec. Index by (level - 1) % 3, same as the heads
  // and tints, so the joke changes every level but repeats every 3 levels
  // along with the head photo. Kept to ~4-6 words each (all three now
  // roughly the length of the old third line) so they're genuinely
  // skimmable within the flashTimer window below while gameplay keeps
  // running underneath - a 10-word line needs well over 1.5s of full-
  // opacity reading time at comfortable reading speed (~3.3-4.2 words/sec),
  // which the flash didn't budget.
  var LEVEL_BLURBS = [
    "מהירות מתונה, נחש רגוע.",
    "המהירות עולה, הזנב מודאג.",
    "עכשיו זה רציני. גם הפופקורן מזיע."
  ];

  // ---------- responsive canvas sizing ----------
  var dpr = 1;
  var boardCssPx = 0;
  var cellPx = 0;
  // Floor multiplier retuned from *4 to *8 alongside the GRID_N cut (19->13):
  // at *4 the worst-case cell would only be 4px regardless of grid size,
  // which defeats the point of moving to fewer/bigger cells for
  // readability. *8 guarantees at least an 8px cell whenever the viewport can
  // actually fit it. This is the *ideal* floor, not an absolute one any more -
  // see SAFETY_MIN_BOARD_PX and its use in resizeCanvas() below:
  // unconditionally forcing every viewport up to this floor (the old
  // behavior) is exactly what caused #wrap to have to scroll on short
  // landscape phones that used to fit at GRID_N=19/*4. GRID_N was cut again
  // to 9 per the grid/avatar/palette spec - MIN_BOARD_PX derives from GRID_N
  // so it now floors at 9*8=72px (was 104px at GRID_N=13); no parallel
  // constant to keep in sync.
  var MIN_BOARD_PX = GRID_N * 8;   // preferred floor (72px) for legible cells,
                                    // honored whenever the viewport fits it
                                    // without forcing scroll/clipping.
  // Absolute last-resort floor (same *4 multiplier the pre-13x13 build used)
  // so the board never collapses to ~0px on a pathological viewport. Unlike
  // MIN_BOARD_PX above, resizeCanvas() only falls back to this when honoring
  // MIN_BOARD_PX would itself force #wrap to scroll - i.e. it never
  // overrides a fit budget that's already between the two floors, it only
  // stops the board from going to zero when even that fit budget is
  // negative/near-zero. Derives from GRID_N (9*4=36px, was 52px at GRID_N=13).
  var SAFETY_MIN_BOARD_PX = GRID_N * 4;
  var MAX_BOARD_PX = 720;          // cap so 4K/8K desktops don't get a huge board;
                                    // unchanged - at GRID_N=9 this yields ~80px
                                    // cells, plenty large on desktop without
                                    // further tuning.

  // Reads env(safe-area-inset-bottom) via a hidden probe element, since JS
  // can't read CSS env() values directly.
  function getSafeAreaBottomPx() {
    var probe = document.createElement("div");
    probe.style.cssText = "position:fixed;left:0;bottom:0;width:0;height:0;" +
      "padding-bottom:env(safe-area-inset-bottom);visibility:hidden;pointer-events:none;";
    document.body.appendChild(probe);
    var v = parseFloat(getComputedStyle(probe).paddingBottom) || 0;
    document.body.removeChild(probe);
    return v;
  }

  // Measures the *actual* rendered height of everything in #wrap besides the
  // board (hud + footer + dpad, plus the flex gaps between all of #wrap's
  // children), instead of the old hardcoded DPAD_RESERVE_PX/
  // HUD_FOOTER_RESERVE_PX guesses. Those constants were padded well above
  // the real DOM heights (e.g. reserving 90px for hud+footer when they
  // actually render closer to 30px), which silently ate into the board's
  // height budget and was the root cause of the no-scroll regression on
  // short landscape viewports (568x320 etc.) once MIN_BOARD_PX grew from
  // GRID_N*4 to GRID_N*8 - the padded estimate left far less real headroom
  // than the numbers suggested. Measuring the live layout instead keeps this
  // accurate as the CSS changes, with no constant to drift out of sync.
  function measureReservePx(coarse) {
    var hudEl = document.getElementById("hud");
    var footerEl = document.getElementById("footer");
    var gap = parseFloat(getComputedStyle(wrap).rowGap);
    if (!gap && gap !== 0) gap = parseFloat(getComputedStyle(wrap).gap) || 8;
    var hudH = hudEl ? hudEl.getBoundingClientRect().height : 0;
    var footerH = footerEl ? footerEl.getBoundingClientRect().height : 0;
    // #wrap's children are hud, boardWrap, footer, and (when shown) dpad -
    // that's 3 gaps between 4 items, or 2 gaps between 3 when dpad is hidden.
    var gapCount = 2;
    var dpadH = 0;
    if (coarse) {
      dpadH = dpad.getBoundingClientRect().height;
      if (!dpadH) dpadH = 56 * 3 + 6 * 2; // dpad not laid out yet - fall back
                                          // to its known CSS grid size
      dpadH += getSafeAreaBottomPx();
      gapCount = 3;
    }
    return hudH + footerH + dpadH + gap * gapCount;
  }

  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    var margin = 24;
    var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

    // QA fix: the HUD's real rendered height depends on --avatar-px, a CSS
    // calc() driven by --cell-px (min(cellPx*3, 240px) - see #hud CSS), but
    // --cell-px is only known once *this function* has already picked a
    // board size - and measureReservePx() below reads the HUD's height
    // BEFORE that happens, so the board used to get sized against a stale
    // (pre-avatar-growth) HUD height, with no second pass to compensate once
    // the avatar actually grew. Verified concretely at 593x646: cellPx
    // settled at 63px -> avatar/HUD height 189px -> #wrap needed ~787px in a
    // 646px container, a persistent 141px forced scroll on first paint - and
    // nothing guarantees a real static session (no resize/orientationchange/
    // visibilitychange/DPR-change) ever gets a corrective second pass.
    // Fix: solve it as a small fixed-point iteration right here instead of
    // depending on some future external event. Each pass writes the
    // tentative --cell-px so the *next* measureReservePx() call reflects the
    // HUD height that cellPx would actually produce. The feedback loop is a
    // contraction (bigger cellPx -> bigger avatar -> bigger reserve ->
    // smaller available -> smaller cellPx), so it stabilizes to (at, or very
    // close to) a fixed point within a handful of iterations - the GRID_N
    // quantization of boardCssPx can make the very last step or two hunt by
    // one grid unit rather than land exactly, so the loop always uses
    // whichever value it lands on at the cap rather than assuming exact
    // equality is reached; the hard iteration cap is a defensive bound only,
    // in case a future CSS change ever broke the contraction outright.
    var available = 0;
    var prevBoardCssPx = -1;
    for (var iter = 0; iter < 8; iter++) {
      var reservePx = measureReservePx(coarse);

      available = Math.min(window.innerWidth, window.innerHeight) - margin;
      // Leave room for HUD + footer text, and for the D-pad when it will
      // actually be shown, so the whole stack (hud/canvas/footer/dpad) tends
      // to fit in one screen without scrolling. #dpad is a normal-flow
      // sibling (not position:fixed) so an under-estimate here just means
      // #wrap's own overflow-y:auto kicks in - it can no longer mean the pad
      // overlaps the canvas/footer.
      available = Math.min(
        available,
        window.innerHeight - reservePx,
        window.innerWidth - 16
      );
      available = Math.min(available, MAX_BOARD_PX);
      // Only pull the board up to the *ideal* readability floor when the
      // viewport can actually fit that floor without forcing a scroll (i.e.
      // `available` - the real fit budget computed above - already meets or
      // exceeds it, so this is a no-op). When the fit budget is smaller than
      // the ideal floor, honor the fit budget itself (keeps the no-scroll
      // requirement intact) and only clamp up to the much smaller
      // SAFETY_MIN_BOARD_PX as an absolute last resort against a near-zero
      // board on a truly pathological viewport - the old unconditional
      // `Math.max(MIN_BOARD_PX, available)` is what forced scrolling on
      // short landscape phones that used to fit at the previous
      // GRID_N/floor tuning.
      if (available < MIN_BOARD_PX) {
        available = Math.max(SAFETY_MIN_BOARD_PX, available);
      }

      boardCssPx = Math.floor(available / GRID_N) * GRID_N; // keep divisible by grid for crisp cells
      if (boardCssPx <= 0) boardCssPx = GRID_N * 4;
      cellPx = boardCssPx / GRID_N;
      // --cell-px is set on #wrap (the shared ancestor of #hud and
      // #boardWrap) so it cascades to #hud's --avatar-px calc() (see #hud
      // CSS) - written every iteration (not just once at the end) so the
      // *next* iteration's measureReservePx() sees the HUD height this
      // cellPx would actually produce, which is the whole point of the loop.
      if (wrap) wrap.style.setProperty("--cell-px", cellPx + "px");
      if (boardCssPx === prevBoardCssPx) break; // converged, stop early
      prevBoardCssPx = boardCssPx;
    }

    canvas.style.width = boardCssPx + "px";
    canvas.style.height = boardCssPx + "px";
    // Expose the *actual* achieved board size to CSS so the level-flash
    // card (absolutely positioned inside this same container, see
    // #levelFlashCard rules above) can size itself relative to the real
    // container instead of only the viewport - fixes clipping on small/
    // landscape boards where MIN_BOARD_PX forces the board below what the
    // old vmin-only sizing assumed.
    if (boardWrapEl) boardWrapEl.style.setProperty("--board-px", boardCssPx + "px");
    canvas.width = Math.round(boardCssPx * dpr);
    canvas.height = Math.round(boardCssPx * dpr);
    // Scale by the *actual* achieved backing-store ratio, not the raw dpr -
    // fractional DPRs (1.5, 1.75, 2.625...) don't survive Math.round() cleanly,
    // so this keeps drawing coordinates aligned to true device pixels.
    var sx = canvas.width / boardCssPx;
    var sy = canvas.height / boardCssPx;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(sx, sy);

    render(); // repaint immediately at new size, even if paused/menu
  }

  // ---------- game state ----------
  // "loading" is the real boot state (not "menu"): the rAF loop and the
  // first real render() only start once preloadAssets() finishes, so the
  // Play button must not be able to do anything before that - see the
  // disabled attribute on the static #playBtn and the guard at the top of
  // startOrResume(). Only preloadAssets()'s callback advances "loading" -> "menu".
  var state = "loading"; // loading | menu | playing | paused | dead | won
  var snake = null, dir = { x: 1, y: 0 }, queuedDir = null, food = null;
  var score = 0, popcornCount = 0, level = 1, stepMs = BASE_STEP_MS, hi = 0;
  var acc = 0;
  var lastTs = 0;
  var flashTimer = 0;

  // The level-up "level details" card is a large, full-bleed, vividly
  // tinted overlay now (unlike the old small centered "LEVEL n" banner), and
  // it is deliberately non-blocking, so flashTimer can still be counting
  // down when the player dies, wins, or pauses mid-flash. The dead/won/paused
  // overlay's background is only ~82% opaque (see #overlay rgba alpha), so
  // without clearing the card here its warm gradient visibly bleeds through
  // behind the "Game Over"/"Paused" text. Call this at every exit from
  // "playing" (not just newGame()) to prevent that bleed-through.
  function hideLevelFlash() {
    flashTimer = 0;
    levelFlash.classList.remove("show");
  }

  function newGame() {
    var cx = Math.floor(GRID_N / 2);
    var cy = Math.floor(GRID_N / 2);
    snake = [
      { x: cx, y: cy },
      { x: cx - 1, y: cy },
      { x: cx - 2, y: cy }
    ];
    dir = { x: 1, y: 0 };
    queuedDir = null;
    score = 0;
    popcornCount = 0;
    level = 1;
    stepMs = BASE_STEP_MS;
    acc = 0;
    hideLevelFlash(); // clear any card left "show" from a death/pause that
                       // interrupted a flash
    placeFood();
    updateHud();
    updateAvatarHud(); // level just reset to 1 - keep the avatar in sync
  }

  function cellFree(x, y) {
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === x && snake[i].y === y) return false;
    }
    return true;
  }

  function placeFood() {
    var attempts = 0;
    var x, y;
    do {
      x = Math.floor(Math.random() * GRID_N);
      y = Math.floor(Math.random() * GRID_N);
      attempts++;
    } while (!cellFree(x, y) && attempts < 500);
    if (!cellFree(x, y)) {
      // Random search failed (board is nearly full): fall back to a
      // deterministic scan instead of placing food on an occupied cell,
      // which would otherwise force a false self-collision death on the
      // next valid grow move.
      var found = false;
      for (var gy = 0; gy < GRID_N && !found; gy++) {
        for (var gx = 0; gx < GRID_N && !found; gx++) {
          if (cellFree(gx, gy)) { x = gx; y = gy; found = true; }
        }
      }
      if (!found) {
        // The board is completely full - there is nowhere left to place
        // food, so treat this as a win rather than a forced death.
        food = null;
        win();
        return;
      }
    }
    food = { x: x, y: y };
  }

  function currentHeadKey() {
    return HEAD_KEYS[(level - 1) % HEAD_KEYS.length];
  }

  function currentTint() {
    return LEVEL_TINTS[(level - 1) % LEVEL_TINTS.length];
  }

  function currentBlurb() {
    return LEVEL_BLURBS[(level - 1) % LEVEL_BLURBS.length];
  }

  // Always-visible avatar HUD (#avatarHud/#avatarHudImg): shows the same
  // head1/head2/head3 image already driving the snake head and
  // #levelFlashImg. Reuses assetSrc()'s existing fallback chain (real image
  // src, or the makeFallbackCanvas() colored-circle dataURL, or
  // BLANK_PIXEL_SRC) - no new naive <img src> that can hang/blank on a failed
  // load. Called at boot (once assets are ready) and from newGame()/levelUp()
  // so it can never drift out of sync with either the snake head or the
  // level-up flash image.
  function updateAvatarHud() {
    if (avatarHudImg) avatarHudImg.src = assetSrc(currentHeadKey());
  }

  function updateHud() {
    hudScore.textContent = String(score);
    hudLevel.textContent = String(level);
    hudHi.textContent = String(hi);
  }

  // hi is a module-level var, so an in-session high score still works even
  // when persistence is unavailable (private mode / quota / disabled
  // storage) - persistOk just tracks whether we can also survive a reload,
  // and surfaces a one-time notice in the footer when we can't.
  var persistOk = true;

  function notePersistFailure() {
    if (persistOk) return;
    var footerEl = document.getElementById("footer");
    if (footerEl && footerEl.dataset.persistNoted !== "1") {
      footerEl.textContent = "השיא לא נשמר הפעם (האחסון אינו זמין)";
      footerEl.dataset.persistNoted = "1";
    }
  }

  function loadHi() {
    try {
      var v = parseInt(localStorage.getItem(HI_KEY), 10);
      hi = isNaN(v) ? 0 : v;
    } catch (e) {
      hi = 0;
      persistOk = false;
      notePersistFailure();
    }
  }

  function saveHi() {
    if (score > hi) {
      hi = score;
      try {
        localStorage.setItem(HI_KEY, String(hi));
      } catch (e) {
        persistOk = false;
        notePersistFailure();
      }
    }
  }

  // ---------- input: queue at most one turn per step, forbid 180 into neck ----------
  function requestTurn(name) {
    var d = DIRS[name];
    if (!d) return;
    // Compare against the direction that will actually be committed next:
    // if a turn is already queued this tick, check against *that*, not the
    // stale committed dir - otherwise two opposite key presses within the
    // same step interval can both individually pass the anti-reversal check
    // and the second overwrites queuedDir, reversing the snake into its neck.
    var ref = queuedDir || dir;
    if (d.x === -ref.x && d.y === -ref.y) return;
    queuedDir = d;
  }

  function applyQueuedTurn() {
    if (queuedDir) {
      // guard again in case dir changed since queuing (shouldn't, but safe)
      if (!(queuedDir.x === -dir.x && queuedDir.y === -dir.y)) {
        dir = queuedDir;
      }
      queuedDir = null;
    }
  }

  // ---------- step / update ----------
  function step() {
    applyQueuedTurn();

    var head = snake[0];
    var nx = head.x + dir.x;
    var ny = head.y + dir.y;

    if (nx < 0 || nx >= GRID_N || ny < 0 || ny >= GRID_N) {
      return die();
    }
    // self collision: check against body (excluding tail cell, which will move away
    // unless we just ate - handled by only excluding when not growing)
    var willGrow = (nx === food.x && ny === food.y);
    var bodyToCheck = willGrow ? snake : snake.slice(0, snake.length - 1);
    for (var i = 0; i < bodyToCheck.length; i++) {
      if (bodyToCheck[i].x === nx && bodyToCheck[i].y === ny) {
        return die();
      }
    }

    snake.unshift({ x: nx, y: ny });
    if (willGrow) {
      score += 1;
      popcornCount += 1;
      if (popcornCount % POPCORN_PER_LEVEL === 0) {
        levelUp();
      }
      updateHud();
      placeFood();
    } else {
      snake.pop();
    }
  }

  function levelUp() {
    level += 1;
    stepMs = Math.max(MIN_STEP_MS, stepMs * STEP_DECAY);
    // ~1.6s "level details" screen: readable but still brief, and - crucially -
    // non-blocking. It only drives flashTimer/CSS opacity, never `state`, so
    // the fixed-timestep loop in frame() keeps calling step() underneath it
    // at the same new stepMs; nothing here pauses actual gameplay.
    // 1900ms total (~1650ms at full opacity after the 250ms fade-in): with
    // the trimmed ~4-6-word LEVEL_BLURBS above, that's a comfortable read
    // even at conservative reading speed, while staying within the spec's
    // ~1.5-2s non-blocking window.
    flashTimer = 1900; // ms
    var tint = currentTint();
    // Enlarged circular head photo for the level being entered (cycles
    // head-1/2/3.png with the level, same image already used for the
    // snake's own head this level) - splash.png stays reserved for the
    // game-over/win screens only, per spec.
    levelFlashImg.src = assetSrc(currentHeadKey());
    // Update the always-visible avatar HUD at this exact same point (same
    // currentHeadKey() call site) so it and #levelFlashImg can never drift
    // out of sync with each other.
    updateAvatarHud();
    levelFlashText.textContent = "רמה " + level;
    levelFlashBlurb.textContent = currentBlurb();
    // Color-pop background accent tinted to the level's tint color, so each
    // level-up reads as visually distinct, not just a text change.
    levelFlashCard.style.background =
      "linear-gradient(160deg, " + tint.core + "e6, " + tint.edge + "e6)";
    levelFlash.classList.add("show");
  }

  function die() {
    state = "dead";
    hideLevelFlash(); // don't let a mid-flash level card bleed through the
                       // translucent game-over overlay
    saveHi();
    updateHud();
    showOverlayDead();
  }

  function win() {
    // Reachable only when the snake fills every cell of the grid.
    state = "won";
    hideLevelFlash(); // same bleed-through guard as die()
    saveHi();
    updateHud();
    showOverlayWon();
  }

  // ---------- overlay screens ----------
  function showOverlayMenu() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>dubisnake</h1>' +
      '<p>נווטו עם הראש ברשת, אכלו את הפופקורן, ואל תפגעו בקירות או בעצמכם. המהירות עולה כל 5 חתיכות.</p>' +
      '<p class="stat">חצים/WASD, החלקה, או לוח הכיוונים. מקש הרווח משהה.</p>' +
      '<button id="playBtn" type="button">שחק</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayDead() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetSrc("splash") + '" alt="">' +
      '<h1>המשחק נגמר</h1>' +
      '<p class="stat">ניקוד: ' + score + '</p>' +
      '<p class="stat">שיא: ' + hi + '</p>' +
      '<p>הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לנסות שוב.</p>' +
      '<button id="playBtn" type="button">שחק שוב</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayWon() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetSrc("splash") + '" alt="">' +
      '<h1>ניצחת!</h1>' +
      '<p class="stat">הלוח מלא - ניקוד: ' + score + '</p>' +
      '<p class="stat">שיא: ' + hi + '</p>' +
      '<p>הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לשחק שוב.</p>' +
      '<button id="playBtn" type="button">שחק שוב</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayPaused() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>מושהה</h1>' +
      '<p class="stat">ניקוד: ' + score + '</p>' +
      '<p>רווח / הקישו המשך כדי להמשיך.</p>' +
      '<button id="playBtn" type="button">המשך</button>' +
      '</div>';
    bindPlayBtn();
  }

  function bindPlayBtn() {
    var btn = document.getElementById("playBtn");
    if (!btn) return;
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      startOrResume();
    });
  }

  function hideOverlay() {
    overlay.classList.add("hidden");
  }

  function startOrResume() {
    // Assets aren't ready yet: #playBtn is disabled in this state so a real
    // click can't normally reach here, but the board/canvas tap-to-start
    // handlers call this too, so guard explicitly rather than relying only
    // on the disabled attribute.
    if (state === "loading") return;
    if (state === "menu" || state === "dead" || state === "won") {
      newGame();
      state = "playing";
      hideOverlay();
      render(); // paint the fresh snake immediately, don't wait for the next rAF tick
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  function togglePause() {
    if (state === "playing") {
      state = "paused";
      hideLevelFlash(); // same bleed-through guard as die()/win()
      showOverlayPaused();
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  // ---------- rendering ----------
  function render() {
    var w = boardCssPx, h = boardCssPx;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#1c1815";
    ctx.fillRect(0, 0, w, h);

    // subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.035)";
    ctx.lineWidth = 1;
    for (var g = 1; g < GRID_N; g++) {
      var p = Math.round(g * cellPx) + 0.5;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
    }

    if (!snake) return;

    // food, slightly larger than a cell, soft shadow
    // (food can legitimately be null once the board is completely full - win())
    if (food) {
      var foodImg = drawable("food");
      var fSize = cellPx * 1.3;
      var fx = food.x * cellPx + cellPx / 2;
      var fy = food.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = cellPx * 0.4;
      ctx.shadowOffsetY = cellPx * 0.12;
      if (assets.food) {
        ctx.drawImage(foodImg, fx - fSize / 2, fy - fSize / 2, fSize, fSize);
      } else {
        ctx.beginPath();
        ctx.arc(fx, fy, fSize / 2, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd166";
        ctx.fill();
      }
      ctx.restore();
    }

    // body, warm per-level tint circles, fading toward tail, smaller than head
    var tint = currentTint();
    var bodyLen = snake.length - 1;
    for (var i = snake.length - 1; i >= 1; i--) {
      var seg = snake[i];
      var t = bodyLen > 1 ? (i - 1) / (bodyLen - 1) : 0; // 0 near head, 1 near tail
      var size = cellPx * (0.82 - 0.22 * t);
      var alpha = 0.95 - 0.45 * t;
      var cxp = seg.x * cellPx + cellPx / 2;
      var cyp = seg.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cxp, cyp, size / 2, 0, Math.PI * 2);
      ctx.fillStyle = tint.core;
      ctx.fill();
      ctx.lineWidth = Math.max(1, cellPx * 0.05);
      ctx.strokeStyle = tint.edge;
      ctx.stroke();
      ctx.restore();
    }

    // head: circular photo rotated toward travel direction
    var headSeg = snake[0];
    var hx = headSeg.x * cellPx + cellPx / 2;
    var hy = headSeg.y * cellPx + cellPx / 2;
    var hSize = cellPx * 0.95;
    var angle = Math.atan2(dir.y, dir.x);
    var headKey = currentHeadKey();
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, hSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.save();
    ctx.clip();
    if (assets[headKey]) {
      ctx.drawImage(assets[headKey], -hSize / 2, -hSize / 2, hSize, hSize);
    } else {
      ctx.fillStyle = tint.core;
      ctx.fillRect(-hSize / 2, -hSize / 2, hSize, hSize);
    }
    ctx.restore();
    ctx.lineWidth = Math.max(1, cellPx * 0.06);
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.stroke();
    ctx.restore();
  }

  // ---------- fixed-timestep rAF loop ----------
  function frame(ts) {
    if (!lastTs) lastTs = ts;
    var dt = ts - lastTs;
    lastTs = ts;
    if (dt > 250) dt = 250; // clamp huge gaps (tab backgrounded)

    if (flashTimer > 0) {
      flashTimer -= dt;
      if (flashTimer <= 0) {
        flashTimer = 0;
        levelFlash.classList.remove("show");
      }
    }

    if (state === "playing") {
      acc += dt;
      // Snapshot stepMs for this frame: step() can call levelUp(), which
      // mutates stepMs mid-loop. Without the snapshot, a single frame could
      // execute an extra step at the newly-faster rate right at a level
      // boundary (an uncommanded burst of movement).
      var stepSnapshot = stepMs;
      while (acc >= stepSnapshot) {
        acc -= stepSnapshot;
        if (state === "playing") step();
        else break;
      }
    }

    render();
    requestAnimationFrame(frame);
  }

  // ---------- keyboard ----------
  var KEY_DIR = {
    ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
    w: "up", s: "down", a: "left", d: "right",
    W: "up", S: "down", A: "left", D: "right"
  };

  window.addEventListener("keydown", function (e) {
    if (KEY_DIR[e.key]) {
      e.preventDefault();
      if (state === "playing") requestTurn(KEY_DIR[e.key]);
      return;
    }
    if (e.key === " ") {
      e.preventDefault();
      if (state === "playing" || state === "paused") togglePause();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      startOrResume();
    }
  }, { passive: false });

  // ---------- touch: swipe on canvas + D-pad ----------
  var touchStart = null;

  canvas.addEventListener("touchstart", function (e) {
    if (e.touches.length !== 1) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchmove", function (e) {
    e.preventDefault(); // block scroll/zoom even where touch-action is imperfect
  }, { passive: false });

  canvas.addEventListener("touchend", function (e) {
    e.preventDefault();
    if (state === "menu" || state === "dead" || state === "won") {
      startOrResume();
      touchStart = null;
      return;
    }
    if (!touchStart) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      requestTurn(dx > 0 ? "right" : "left");
    } else {
      requestTurn(dy > 0 ? "down" : "up");
    }
  }, { passive: false });

  // block long-press context menu / selection on canvas
  canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  function bindDpadButton(id, name) {
    var el = document.getElementById(id);
    // Some engines still synthesize a click after touchstart/touchend even
    // when preventDefault was called, which could double-fire requestTurn
    // for one physical tap. Guard the click handler with a short-lived flag
    // set by the touch handlers so only one input source wins per press.
    var touchHandledUntil = 0;
    el.addEventListener("touchstart", function (e) {
      e.preventDefault();
      touchHandledUntil = Date.now() + 500;
      if (state === "playing") requestTurn(name);
      else startOrResume();
    }, { passive: false });
    // also allow mouse for coarse-pointer devices that report click (defensive)
    el.addEventListener("click", function (e) {
      e.preventDefault();
      if (Date.now() < touchHandledUntil) return; // suppress synthesized click
      if (state === "playing") requestTurn(name);
      else startOrResume();
    });
  }
  bindDpadButton("up", "up");
  bindDpadButton("down", "down");
  bindDpadButton("left", "left");
  bindDpadButton("right", "right");

  // show D-pad only on coarse pointer (touch) devices
  function updateDpadVisibility() {
    var coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (coarse) dpad.classList.add("enabled");
    else dpad.classList.remove("enabled");
  }

  // tap board to restart/resume when overlay hidden but state not playing (defensive)
  wrap.addEventListener("click", function () {
    if (state === "menu" || state === "dead" || state === "won") startOrResume();
  });

  playBtn.addEventListener("click", function (e) {
    e.preventDefault();
    startOrResume();
  });

  // ---------- boot ----------
  loadHi();
  updateHud();

  // Coalesce resize/orientationchange bursts (e.g. iOS Safari's chrome
  // auto-hide/show firing repeated resize events) into one rAF-scheduled
  // pass, and keep the D-pad's visibility in sync with layout changes too
  // (docking/undocking a mouse on 2-in-1s and iPads can change pointer
  // capability at runtime without a page reload).
  var resizeScheduled = false;
  function scheduleResize() {
    if (resizeScheduled) return;
    resizeScheduled = true;
    requestAnimationFrame(function () {
      resizeScheduled = false;
      updateDpadVisibility();
      resizeCanvas();
    });
  }
  window.addEventListener("resize", scheduleResize);
  window.addEventListener("orientationchange", scheduleResize);

  // rAF is paused/throttled while a tab is backgrounded, so a resize that
  // fires while hidden can leave scheduleResize()'s queued rAF callback
  // sitting unresolved (resizeScheduled stays true, so a synthetic resize
  // dispatched in the meantime is silently ignored) until the tab is
  // foregrounded again. Recompute directly - bypassing the rAF gate - the
  // moment the tab becomes visible, instead of waiting on whatever resize
  // event happens to arrive next.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      resizeScheduled = false;
      updateDpadVisibility();
      resizeCanvas();
    }
  });

  if (window.matchMedia) {
    var coarseMq = window.matchMedia("(pointer: coarse)");
    if (coarseMq.addEventListener) coarseMq.addEventListener("change", scheduleResize);
    else if (coarseMq.addListener) coarseMq.addListener(scheduleResize); // older Safari
  }

  // Re-check devicePixelRatio when it changes (moving a window between
  // displays with different DPR, or OS-level scale changes) - these don't
  // fire a window resize event, so without this the canvas stays blurry
  // until some unrelated resize happens.
  function watchDprChange() {
    if (!window.matchMedia) return;
    var mq = window.matchMedia("(resolution: " + (window.devicePixelRatio || 1) + "dppx)");
    function handler() {
      scheduleResize();
      watchDprChange(); // re-subscribe at the new dpr
    }
    if (mq.addEventListener) mq.addEventListener("change", handler, { once: true });
    else if (mq.addListener) mq.addListener(handler); // older Safari fallback
  }
  watchDprChange();

  updateDpadVisibility();
  resizeCanvas();

  preloadAssets(function () {
    // Guard rather than unconditionally reset: state can only still be
    // "loading" here in the current code (Play is disabled/no-op until this
    // fires), but this keeps a future change from silently reintroducing a
    // bug where finishing asset load stomps an already-started game back to
    // the menu and pops the overlay over live play.
    if (state === "loading") {
      state = "menu";
      showOverlayMenu();
    }
    updateAvatarHud(); // always-visible avatar HUD: show it as soon as assets
                        // are ready, even before the first game starts
    render();
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
