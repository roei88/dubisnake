  body {
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    /* iOS: suppress the long-press callout sheet (copy/share) anywhere on
       the page - a long-press mid-swipe on the board or a held button must
       never pop system UI over the game. Purely additive on Android. */
    -webkit-touch-callout: none;
    /* touch-action left at its default (auto) here, not "none": pinch-zoom is
       already fully blocked page-wide by the viewport meta's
       maximum-scale=1/user-scalable=no (a gesture-level block, distinct from
       touch-action), so body doesn't need touch-action:none too. That matters
       because touch-action:none also blocks touch-driven *scrolling*, not
       just zooming - if it were set here it would break #wrap's
       overflow-y:auto safety net (small-viewport fallback), making it
       unreachable by touch (only a mouse wheel would still work). Game
       controls (canvas, #playBtn) additionally get touch-action:none of
       their own so a swipe/tap there can't be misinterpreted as a scroll
       gesture. */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f2e9dd;
  }
  /* Nostalgic "candybar phone" frame around the existing #wrap - deliberately
     decorating the element already used for the flex-centering/sizing math
     (not a NEW wrapping element) so the fixed, known border/padding added
     here is trivial to account for in resizeCanvas()'s margin constant (see
     that comment), rather than introducing a fresh box whose size could feed
     back into the layout the way #hud's own avatar sizing once did. Border/
     padding are small fixed px values, not derived from cellPx or anything
     else computed - no circular dependency risk. */
  #wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-height: 100vh;
    /* iOS Safari: 100vh includes the space behind the collapsible toolbar,
       so the frame could exceed the actually-visible viewport and force a
       small scroll while the toolbar is expanded. dvh tracks the *dynamic*
       visible height; browsers without dvh support ignore this line and
       keep the 100vh above (progressive enhancement, no risk). */
    max-height: 100dvh;
    overflow-y: auto;
    padding-top: 22px;
    padding-bottom: 12px;
    padding-left: calc(14px + env(safe-area-inset-left));
    padding-right: calc(14px + env(safe-area-inset-right));
    box-sizing: border-box;
    border: 3px solid #2f271f;
    border-radius: 28px;
    background: linear-gradient(165deg, #221b16, #14100e 65%);
    box-shadow:
      0 24px 55px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.07),
      inset 0 -2px 8px rgba(0,0,0,0.55);
  }
  /* Small decorative "earpiece speaker" dots, evoking the grille above an
     old candybar phone's screen - position:absolute inside #wrap (already
     position:relative) so it adds zero flow height/width and can never be
     measured by measureReservePx() or affect the board's sizing budget. */
  #speakerGrille {
    position: absolute;
    top: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #0a0806;
    box-shadow:
      -14px 0 0 #0a0806,
      -7px 0 0 #0a0806,
      7px 0 0 #0a0806,
      14px 0 0 #0a0806;
    opacity: 0.6;
    pointer-events: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    width: 100%;
    font-size: clamp(13px, 2.6vmin, 18px);
    letter-spacing: 0.02em;
    padding: 0 2px;
    box-sizing: border-box;
    /* Defense-in-depth alongside #boardWrap's flex-shrink:0 (see comment
       above it): #hud/#footer don't have overflow:hidden so they
       aren't vulnerable to the zero-automatic-min-size flex behavior that
       motivated that fix, but pinning them too means #wrap's overflow-y:auto
       is the fallback for *any* over-tall stack, not just ones caused by
       the board specifically. */
    flex-shrink: 0;
    /* --cell-px is written from JS in resizeCanvas() (the single existing
       place --board-px is already set) - the one source of truth every size
       constant, including the avatar below, derives from. --avatar-px is a
       declarative CSS custom property computed from it. Originally 3 cells
       (a hard "at least 3 game squares" requirement) - reduced 25% to 2.25
       cells per explicit follow-up request, which does supersede that
       requirement; noting the tension here rather than silently dropping it
       so it isn't lost. The 180px ceiling is a defensive fallback ONLY, not
       a real-world design cap: it must stay >= 2.25 * (MAX_BOARD_PX /
       GRID_N) = 2.25 * 80 = 180px (the JS-side bound on cellPx - see
       MAX_BOARD_PX/GRID_N below), same reasoning as the ratio's own history
       (see git blame on this comment): a cap set below the true max cellPx
       silently breaks the avatar's own size ratio at large viewports rather
       than just capping absolute size, which is easy to miss since it only
       shows up once cellPx is large enough to hit the cap. If MAX_BOARD_PX
       or GRID_N ever change, this 180px must be revisited together with
       them - it is not independently derived. */
    --avatar-px: min(calc(var(--cell-px, 16px) * 2.25), 180px);
  }
  #hud span b { color: #00e5ff; }
  /* Always-visible avatar HUD element (menu/playing/paused/dead/won - never
     gated to "after first play"). A genuine flex item now (NOT
     position:absolute). It used to be pinned top:0;left:0 on the theory that
     "top-left is the one corner not already claimed by the RTL-anchored
     score/level/hi-score text, which visually sits toward the right" - that
     theory only held for the FIRST of the three <span> children. Under
     dir="rtl" with justify-content:space-between, the LAST DOM span (the
     high-score "שיא" one) is the one flexbox pushes to the physical LEFT
     edge - the exact corner the avatar was pinned to. Confirmed by measuring
     real layout: avatar rect x:108-204/y:0-96 vs the "שיא" span's rect
     x:110-152/y:38-58 - a dead overlap, and not an edge case, since the
     avatar's own minimum width (48px, see --avatar-px above) already exceeds
     the ~2px inner padding where that span starts, at every achievable
     cellPx. Making #avatarHud a real flex item instead removes the collision
     structurally: flexbox distributes all 4 items (avatar + 3 spans) with
     guaranteed non-overlap, instead of trusting a manually reasoned absolute
     offset that only covered one of the three spans. #avatarHud is placed
     LAST in DOM source order (after the three spans) specifically because,
     under dir="rtl" row flex, the last DOM child lands at the physical LEFT
     edge (mirror image of LTR, where the last child lands on the right) -
     putting it first would land it at the physical top-RIGHT instead, which
     was tried and confirmed wrong. This ordering is what actually keeps the
     avatar in the intended top-left corner, with real gap between every
     item and no overlap. */
  #avatarHud {
    width: var(--avatar-px, 36px);
    height: var(--avatar-px, 36px);
    flex-shrink: 0;
    border-radius: 50%;
    /* small dark chip behind the image so it doesn't float directly against
       the light HUD text */
    background: #1c1815;
    box-shadow: 0 0 0 2px #00e5ff, 0 2px 8px rgba(0,0,0,0.4);
    overflow: hidden;
    pointer-events: none;
  }
  #avatarHud img {
    width: 100%;
    height: 100%;
    /* head-N.png are confirmed 512x512 square with content filling to the
       image edges (no transparent margin - checked via PIL getbbox() before
       implementation), so object-fit:cover is safe: it will not crop into
       transparent padding. */
    object-fit: cover;
    display: block;
  }
  /* flex-shrink:0 is load-bearing: #boardWrap has overflow:hidden, and per
     the flex spec an overflow:hidden item's automatic min-height becomes 0
     (instead of its content size), so without this the flex column in #wrap
     was free to squeeze #boardWrap (and the canvas/overlay/level-flash-card
     inside it) shorter than its actual content on cramped viewports, instead
     of #wrap's own overflow-y:auto kicking in as intended. That clipped the
     live canvas, the level-up head photo/blurb, and the overlay text at
     exactly the sizes resizeCanvas() had computed for --board-px. Pinning
     flex-shrink:0 here forces the *intended* fallback (scroll) instead of
     silent clipping in the rare cases the board still can't fully fit. */
  #boardWrap {
    flex-shrink: 0;
    /* 3D "recessed screen" framing. Everything here is box-shadow/radius
       only - zero layout participation, so it cannot feed back into
       measureReservePx()/resizeCanvas() (the recurring sizing-budget bug
       class in this file). The outer ring shadows form the raised bezel
       frame; the matching inner shadows live on #boardBezel (an absolute,
       pointer-events:none overlay) because INSET shadows on this element
       would paint underneath the canvas child. */
    border-radius: 14px;
    box-shadow:
      0 0 0 3px #3a3128,
      0 0 0 5px #57492f,
      0 3px 0 5px rgba(0, 0, 0, 0.35),
      0 14px 30px rgba(0, 0, 0, 0.40);
  }
  #boardBezel {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none; /* MUST stay - it covers the canvas, and swipes have to fall through to it */
    box-shadow:
      inset 0 5px 12px rgba(20, 26, 8, 0.38),
      inset 0 -3px 8px rgba(255, 255, 250, 0.30),
      inset 3px 0 8px rgba(20, 26, 8, 0.18),
      inset -3px 0 8px rgba(20, 26, 8, 0.18);
  }
  canvas {
    background: transparent; /* board tone comes from render()'s translucent fill */
    /* no own border-radius: #boardWrap's overflow:hidden + 14px radius does
       the corner clipping - a smaller radius here would leave notches */
    touch-action: none;
    display: block;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: rgba(10, 8, 7, 0.82);
    border-radius: 10px;
    padding: 20px;
    box-sizing: border-box;
    /* QA fix: the dead/won content stack (splash image + h1 + 2 stat lines +
       instructions + button) can be taller than #boardWrap on cramped/
       landscape viewports even after every child's own board-px-based clamp
       below - #boardWrap's own overflow:hidden then clips it, and since
       #overlay used to be vertically centered via justify-content:center,
       there was no way to scroll to the clipped part: #wrap's outer
       overflow-y:auto only moves the whole (already internally-clipped)
       #boardWrap block, it can't reveal more of #overlay's own clipped
       content. Verified live at a real 568x326 viewport: #boardWrap
       bottom~306-308px, #playBtn bottom~324.7-334.3px - ~60% of the "שחק שוב"
       button (its entire label) invisible and untappable, at scrollTop 0,
       with nothing to trigger a fix. Making #overlay itself the scrollable
       box (its own overflow-y:auto, independent of #boardWrap's) means any
       remaining overflow is always reachable by a normal scroll-down
       gesture - see .overlayInner below for how vertical centering still
       works in the common (non-overflowing) case. */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #overlay.hidden { display: none; }
  /* Centers vertically via margin:auto instead of justify-content:center on
     #overlay. This is the standard fix for "can't scroll to see overflowing
     centered flex content": auto margins consume any extra space when there
     is room (identical visual result to justify-content:center in the
     everyday case), but resolve to 0 - not negative - when there isn't,
     which is exactly flex-start: content starts flush at the top of #overlay
     and any overflow lands entirely at the bottom, inside the normal
     scroll-down direction #overlay's own overflow-y:auto (above) now
     provides. justify-content:center could not be scrolled past on the
     "before" side in any browser, which is exactly what made the button
     unreachable at 568x326 (see #overlay comment). */
  .overlayInner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: min(10px, calc(var(--board-px, 300px) * 0.03));
    margin: auto 0;
  }
  /* h1/p/.stat below are each clamped with the same min(vmin-clamp,
     --board-px-derived) pattern already used by #levelFlashCard's children
     (see the comment on #levelFlashCard). Without this, text sized purely
     from vmin ignores how narrow the *actual* #boardWrap container (which
     clips via overflow:hidden) can get once resizeCanvas() has to shrink the
     board below what vmin assumed (small/landscape viewports) - confirmed
     clipping the "dubisnake" <h1> (rendered ~181px wide inside a 104px-wide
     container) before this fix. */
  #overlay h1 {
    margin: 0;
    font-size: min(clamp(28px, 7vmin, 46px), calc(var(--board-px, 300px) * 0.16));
    color: #ffd27a;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  #overlay p {
    margin: 2px 0;
    font-size: min(clamp(13px, 2.6vmin, 16px), calc(var(--board-px, 300px) * 0.055));
    max-width: min(32ch, calc(var(--board-px, 300px) * 0.88));
    line-height: 1.4;
    color: #e8dcc8;
  }
  #overlay .stat { font-size: min(clamp(15px, 3vmin, 20px), calc(var(--board-px, 300px) * 0.065)); color: #fff; }
  /* The menu screen's one-line tagline (not the retry-instruction <p> on the
     dead/won/paused screens, which stay on the plain #overlay p rule above) -
     bigger and bolder than body copy, in the cyan accent already used for
     the HUD/avatar ring, for a punchier "cool" read rather than plain
     instructional text. Same board-px-clamp pattern as its siblings so it
     still shrinks correctly on small/landscape viewports (see the comment
     above #overlay h1). */
  #overlay .tagline {
    margin: 4px 0;
    font-size: min(clamp(20px, 4.4vmin, 30px), calc(var(--board-px, 300px) * 0.1));
    font-weight: 800;
    letter-spacing: 0.02em;
    color: #00e5ff;
    text-shadow: 0 2px 10px rgba(0,229,255,0.35);
  }
  #playBtn {
    /* QA fix: same board-px-based shrink pattern as the rest of #overlay's
       children (see comment above #overlay h1 and .splashPic) - these three
       were previously fixed px regardless of how small the board got, which
       contributed to the dead/won overlay overflowing #boardWrap. */
    margin-top: min(8px, calc(var(--board-px, 300px) * 0.025));
    padding: min(12px, calc(var(--board-px, 300px) * 0.035)) min(34px, calc(var(--board-px, 300px) * 0.1));
    font-size: min(clamp(16px, 3.2vmin, 20px), calc(var(--board-px, 300px) * 0.075));
    font-weight: 700;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff3d81, #c9006b);
    color: #2a0714;
    box-shadow: 0 6px 16px rgba(201,0,107,0.4);
    cursor: pointer;
    touch-action: none;
  }
  #playBtn:active { transform: translateY(1px); }
  #playBtn:disabled { opacity: 0.55; cursor: default; }
  /* Level-up "level details" screen: a short, colorful, non-blocking pop
     shown at every level-up (see #levelFlashCard below for the per-level
     color-pop background, set inline via JS from the level's warm tint).
     It overlays on top of the canvas (pointer-events:none, no click/tap
     needed to dismiss) and times out on its own; it never touches `state`,
     so actual gameplay/snake movement keeps running underneath it. */
  #levelFlash {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    border-radius: 10px;
    overflow: hidden;
  }
  #levelFlash.show { opacity: 1; }
  #levelFlashCard {
    display: flex;
    flex-direction: column;
    align-items: center;
    /* gap/padding/img/text/blurb below are each the smaller of a vmin-based
       value (the original design intent, and what wins on ordinary
       viewports where the board comfortably fits the window) and a value
       derived from --board-px (the actual canvas container's CSS pixel
       size, set from JS in resizeCanvas()). --board-px only "wins" (via
       min()) when the container itself has been squeezed below what vmin
       assumed - e.g. landscape phones with the on-screen d-pad, where
       resizeCanvas() intentionally floors the board at MIN_BOARD_PX - so
       the enlarged head photo/text/blurb shrink to fit the *actual*
       container instead of clipping against its overflow:hidden. */
    gap: min(8px, calc(var(--board-px, 300px) * 0.025));
    max-width: min(82%, calc(var(--board-px, 300px) * 0.94));
    padding: min(18px, calc(var(--board-px, 300px) * 0.04)) min(26px, calc(var(--board-px, 300px) * 0.08));
    border-radius: 20px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    text-align: center;
    box-sizing: border-box;
  }
  #levelFlashCard img {
    width: min(clamp(84px, 26vmin, 160px), calc(var(--board-px, 300px) * 0.36));
    height: min(clamp(84px, 26vmin, 160px), calc(var(--board-px, 300px) * 0.36));
    object-fit: contain;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 6px 18px rgba(0,0,0,0.55);
  }
  .splashPic {
    /* QA fix: unlike #overlay's h1/p/.stat (which already min() against
       --board-px, see the comment above #overlay h1), this used to be
       vmin-only, so on a small/landscape board it did not shrink to match
       the actual (clipped-down) #boardWrap container - one of the
       contributors to the dead/won overlay overflowing #boardWrap's box
       (see #overlay comment). Now capped the same way as its siblings. */
    width: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));
    height: min(clamp(56px, 14vmin, 96px), calc(var(--board-px, 300px) * 0.3));
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45));
  }
  #levelFlashText {
    font-size: min(clamp(20px, 4.6vmin, 32px), calc(var(--board-px, 300px) * 0.09));
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.04em;
  }
  #levelFlashBlurb {
    margin: 0;
    font-size: min(clamp(13px, 2.7vmin, 17px), calc(var(--board-px, 300px) * 0.05));
    max-width: min(26ch, calc(var(--board-px, 300px) * 0.86));
    line-height: 1.35;
    color: #fffaf0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.45);
  }
  /* On-screen D-pad intentionally removed per spec - touch devices use
     swipe-on-canvas only now (see the mobileHelp popup below for the
     swipe-direction hint shown to touch users). Removing it also means
     #wrap always has exactly 3 flex children (hud/boardWrap/footer), so
     measureReservePx()/resizeCanvas() no longer need a coarse-pointer
     branch for a 4th child's reserved height. */
  #footer {
    font-size: clamp(10px, 2vmin, 12px);
    color: #8a7c6b;
    flex-shrink: 0; /* see #hud comment: never let flex compress this below its text */
  }
  /* Language toggle: deliberately position:fixed to the physical viewport
     corner, OUTSIDE #wrap's normal flow entirely - not a flex child of #hud,
     not measured by measureReservePx(). This file has twice already broken
     the board's no-scroll/sizing budget by adding something into #wrap's
     flow that fed back into resizeCanvas()'s size calculations (the avatar
     HUD chip, then its own sizing loop); a fixed-position element outside
     #wrap can never do that. "right" is a physical (not logical/dir-aware)
     CSS property, so this stays in the SAME physical corner whether the
     current language is he (rtl) or en (ltr) - it doesn't jump to the other
     side every time you toggle it. */
  #langToggle {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: max(10px, env(safe-area-inset-right));
    z-index: 20;
    min-height: 44px;
    padding: 0 16px;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    background: rgba(28,22,19,0.78);
    color: #f2e9dd;
    font-size: 13px;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    cursor: pointer;
    touch-action: none;
  }
  #langToggle:active { background: rgba(0,229,255,0.35); }

  /* Mobile-only "how to play" hint: fixed/full-viewport, outside #wrap's
     flow (same reasoning as #langToggle above) so it can never feed back
     into resizeCanvas()'s size budget. Shown once (first visit, gated by
     localStorage) only on coarse-pointer devices - see maybeShowMobileHelp()
     in the script below. Deliberately icon-first/text-minimal per spec:
     the arrow+hand glyph cross conveys "swipe any direction" faster than
     a sentence would. */
  #mobileHelp {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(11,8,6,0.62);
    padding: 20px;
    box-sizing: border-box;
    touch-action: none;
  }
  #mobileHelp.show { display: flex; }
  #mobileHelpCard {
    width: 100%;
    max-width: 260px;
    text-align: center;
    background: linear-gradient(165deg, #241d18, #14100e 70%);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 20px;
    padding: 22px 20px 18px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.55);
  }
  #mobileHelpArrows {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px;
    width: 136px;
    height: 136px;
    margin: 0 auto 14px;
  }
  .mh-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #00e5ff;
    text-shadow: 0 0 10px rgba(0,229,255,0.5);
  }
  .mh-hand { font-size: 34px; color: #f2e9dd; text-shadow: none; }
  .mh-up { grid-column: 2; grid-row: 1; }
  .mh-left { grid-column: 1; grid-row: 2; }
  .mh-right { grid-column: 3; grid-row: 2; }
  .mh-down { grid-column: 2; grid-row: 3; }
  #mobileHelpText {
    margin: 0 0 16px;
    font-size: 13px;
    font-weight: 600;
    color: #cbb89a;
  }
  #mobileHelpClose {
    min-width: 44px;
    min-height: 44px;
    padding: 0 26px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff2e63, #c81854);
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    touch-action: none;
  }
</style>
</head>
<body>
<button id="langToggle" type="button">English</button>
<div id="wrap">
  <div id="speakerGrille" aria-hidden="true"></div>
  <div id="hud">
    <span><span class="hud-label" id="scoreLabel">ניקוד</span> <b id="scoreVal">0</b></span>
    <span><span class="hud-label" id="levelLabel">רמה</span> <b id="levelVal">1</b></span>
    <span><span class="hud-label" id="hiLabel">שיא</span> <b id="hiVal">0</b></span>
    <div id="avatarHud"><img id="avatarHudImg" alt=""></div>
  </div>
  <div id="boardWrap" style="position:relative; overflow:hidden;">
    <canvas id="game"></canvas>
    <div id="boardBezel" aria-hidden="true"></div>
    <div id="levelFlash">
      <div id="levelFlashCard">
        <img id="levelFlashImg" alt="">
        <span id="levelFlashText">רמה 2</span>
        <p id="levelFlashBlurb"></p>
      </div>
    </div>
    <div id="overlay">
      <div class="overlayInner">
        <h1>דוביסנייק</h1>
        <p class="tagline">אכלו את הפופקורן!</p>
        <p class="stat">חצים, החלקה, או לוח הכיוונים. לחץ ספייס כדי לעצור.</p>
        <button id="playBtn" type="button" disabled>טוען&hellip;</button>
      </div>
    </div>
  </div>
  <div id="footer">השיא נשמר מקומית במכשיר</div>
</div>

<!-- dir="ltr" is deliberate and load-bearing here for the same reason it
     was on the old #dpad: CSS Grid mirrors track order under an inherited
     dir="rtl" (like flex row does), which would swap the physical
     left/right arrow positions even though only in-page *text* is meant
     to localize. Fixed/full-viewport and outside #wrap (see the CSS
     comment) so it's never measured by measureReservePx(). -->
<div id="mobileHelp" role="dialog" aria-modal="true">
  <div id="mobileHelpCard">
    <div id="mobileHelpArrows" dir="ltr">
      <span class="mh-cell mh-up" aria-hidden="true">&#8593;</span>
      <span class="mh-cell mh-left" aria-hidden="true">&#8592;</span>
      <span class="mh-cell mh-hand" aria-hidden="true">&#128070;</span>
      <span class="mh-cell mh-right" aria-hidden="true">&#8594;</span>
      <span class="mh-cell mh-down" aria-hidden="true">&#8595;</span>
    </div>
    <p id="mobileHelpText">החליקו כדי לזוז</p>
    <button id="mobileHelpClose" type="button">&#10003;</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- constants ----------
  // GRID_N was 19 (720px board => ~38px cells), then cut to 13 (~55px cells)
  // for readability. Per the Product-approved grid/avatar/palette spec, it is
  // now cut again to 9: a ~30.8% reduction from 13 (the closest odd integer
  // to the requested ~35%; 8 would be 38.5% but breaks the odd/center-cell
  // invariant this comment is about). It's odd so Math.floor(GRID_N/2) still
  // gives a true center cell for the snake's start position (unchanged spawn
  // logic), and on the same 720px board it gives ~80px cells - large, clearly
  // readable head/body circles, at the cost of a smaller grid to navigate.
  var GRID_N = 9;                 // fixed logical grid, both axes
  // Both endpoints scaled by 1.3x (160->208, 70->91) to slow the whole
  // level 1..max progression by ~30% uniformly, per request. STEP_DECAY
  // (the relative per-level ramp) is untouched - it's a ratio, not an
  // absolute speed, so scaling the endpoints alone already slows every
  // level in the curve by the same 30%.
  var BASE_STEP_MS = 208;         // level 1 step interval
  var MIN_STEP_MS = 91;           // floor
  var STEP_DECAY = 0.92;          // ~8% faster per level
  var POPCORN_PER_LEVEL = 5;
  var SWIPE_THRESHOLD = 35;       // px
  var HI_KEY = "dubisnake_hi";

  var DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 }
  };

  // ---------- DOM ----------
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var wrap = document.getElementById("wrap");
  var boardWrapEl = document.getElementById("boardWrap");
  var hudScore = document.getElementById("scoreVal");
  var hudLevel = document.getElementById("levelVal");
  var hudHi = document.getElementById("hiVal");
  var avatarHudImg = document.getElementById("avatarHudImg");
  var overlay = document.getElementById("overlay");
  var playBtn = document.getElementById("playBtn");
  var levelFlash = document.getElementById("levelFlash");
  var levelFlashCard = document.getElementById("levelFlashCard");
  var levelFlashImg = document.getElementById("levelFlashImg");
  var levelFlashText = document.getElementById("levelFlashText");
  var levelFlashBlurb = document.getElementById("levelFlashBlurb");
  var langToggleBtn = document.getElementById("langToggle");
  var scoreLabelEl = document.getElementById("scoreLabel");
  var levelLabelEl = document.getElementById("levelLabel");
  var hiLabelEl = document.getElementById("hiLabel");
  var mobileHelp = document.getElementById("mobileHelp");
  var mobileHelpText = document.getElementById("mobileHelpText");
  var mobileHelpClose = document.getElementById("mobileHelpClose");
  var MOBILE_HELP_SEEN_KEY = "dubisnake_mobilehelp_seen";

  // ---------- i18n: every visible string, keyed by language, switchable at
  // runtime with no page reload. The "dubisnake" brand name is intentionally
  // NOT in here - it's a proper noun/brand and stays as-is in both
  // languages, matching the existing convention for "WASD"-style keycap
  // labels elsewhere in this file (now moot, see KEY_DIR below - arrow keys
  // only, WASD removed as a movement input per spec). ----------
  var STRINGS = {
    he: {
      dir: "rtl",
      metaDescription: "Customized retro snake game.",
      scoreLabel: "ניקוד",
      levelLabel: "רמה",
      hiLabel: "שיא",
      footerHi: "השיא נשמר מקומית במכשיר",
      footerHiFail: "השיא לא נשמר הפעם (האחסון אינו זמין)",
      // Brand name gets a Hebrew form specifically in Hebrew mode (English
      // mode keeps the Latin "dubisnake" - see brandTitle below).
      brandTitle: "דוביסנייק",
      // Deliberately just the one punchy line now (was a full mechanics
      // explainer) - rendered bigger/bolder via the .tagline class, not the
      // plain #overlay p style; the controls line below is unchanged.
      menuInstructions: "אכלו את הפופקורן!",
      // WASD removed as a movement input - see KEY_DIR - so it's no longer
      // mentioned here; on-screen D-pad also removed (touch = swipe only),
      // corrected space-key phrasing per explicit spec.
      menuControls: "חצים או החלקה. לחץ ספייס כדי לעצור.",
      mobileHelpText: "החליקו כדי לזוז",
      loadingBtn: "טוען…",
      playBtn: "שחק",
      playAgainBtn: "שחק שוב",
      deadTitle: "המשחק נגמר",
      wonTitle: "ניצחת!",
      scoreStat: function (n) { return "ניקוד: " + n; },
      hiStat: function (n) { return "שיא: " + n; },
      wonBoardFull: function (n) { return "הלוח מלא - ניקוד: " + n; },
      deadRetry: "הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לנסות שוב.",
      wonRetry: "הקישו שחק, לחצו Enter, או הקישו על הלוח כדי לשחק שוב.",
      pausedTitle: "מושהה",
      pausedResume: "רווח / הקישו המשך כדי להמשיך.",
      resumeBtn: "המשך",
      levelFlashLabel: function (n) { return "רמה " + n; },
      blurbs: [
        "מהירות מתונה, רודף אחד בשטח.",
        "המהירות עולה, שני רודפים.",
        "שלושה רודפים. גם הפופקורן מזיע."
      ],
      toggleLabel: "English",
      toggleAria: "Switch to English"
    },
    en: {
      dir: "ltr",
      metaDescription: "Customized retro snake game.",
      scoreLabel: "Score",
      levelLabel: "Level",
      hiLabel: "High",
      footerHi: "High score saved locally on this device",
      footerHiFail: "High score not saved this time (storage unavailable)",
      // English keeps the Latin brand name as-is.
      brandTitle: "dubisnake",
      // Matches the simplified Hebrew tagline - see the "he" entry above.
      menuInstructions: "Eat the popcorn!",
      menuControls: "Arrows or swipe. Press space to pause.",
      mobileHelpText: "Swipe to move",
      loadingBtn: "Loading…",
      playBtn: "Play",
      playAgainBtn: "Play Again",
      deadTitle: "Game Over",
      wonTitle: "You Win!",
      scoreStat: function (n) { return "Score: " + n; },
      hiStat: function (n) { return "High score: " + n; },
      wonBoardFull: function (n) { return "Board full - score: " + n; },
      deadRetry: "Tap Play, press Enter, or tap the board to try again.",
      wonRetry: "Tap Play, press Enter, or tap the board to play again.",
      pausedTitle: "Paused",
      pausedResume: "Space / tap Resume to continue.",
      resumeBtn: "Resume",
      levelFlashLabel: function (n) { return "Level " + n; },
      blurbs: [
        "Chill speed. One chaser out there.",
        "Speed's climbing. Two chasers now.",
        "Three chasers. Even the popcorn is sweating."
      ],
      toggleLabel: "עברית",
      toggleAria: "עבור לעברית"
    }
  };
  var LANG_KEY = "dubisnake_lang";
  var currentLang = "he";
  try {
    var storedLang = localStorage.getItem(LANG_KEY);
    if (storedLang === "he" || storedLang === "en") currentLang = storedLang;
  } catch (e) { /* private mode / storage disabled - default stands */ }

  function S() { return STRINGS[currentLang]; }

  // ---------- image preload with colored-circle fallback ----------
  // No getImageData is used anywhere so this stays file:// safe.
  var ASSET_LIST = [
    { key: "head1", src: "./assets/head-1.png", fallback: "#e0a458" },
    { key: "head2", src: "./assets/head-2.png", fallback: "#c97b63" },
    { key: "head3", src: "./assets/head-3.png", fallback: "#a56a9e" },
    { key: "food", src: "./assets/food.png", fallback: "#ffd166" },
    { key: "splash", src: "./assets/splash.png", fallback: "#ffcf6b" },
    { key: "ghost1", src: "./assets/ghost-1.png", fallback: "#ff4b3a" },
    { key: "ghost2", src: "./assets/ghost-2.png", fallback: "#ff7bd5" },
    { key: "ghost3", src: "./assets/ghost-3.png", fallback: "#3ed6e0" }

  // request would otherwise mean assetsReady never reaches assetsTotal,
  // done() never runs, and the board never starts moving even after the

  var ASSET_TIMEOUT_MS = 4000;

  // ---------- head cycle / per-level body tint (predefined, no getImageData) ----------

  // Per-level tint pool, cycles with the heads. Per the grid/avatar/palette

  // deliberately kept clear of the HUD accent cyan (~190deg, see #hud span b

  // "per-level game state" (these tints) never share a color.
  var LEVEL_TINTS = [
    { core: "#00e676", edge: "#00693e" }, // vivid green
    { core: "#2979ff", edge: "#0d3f9e" }, // electric blue
    { core: "#ff3d81", edge: "#8f0046" }  // hot magenta
  ];
  // Short, dry, PG snake/popcorn/speed one-liners for the level-details
  // screen (levelUp()) - one per head/tint in the cycle, per-language (see
  // STRINGS.he/en.blurbs above). Index by (level - 1) % 3, same as the heads
  // and tints, so the joke changes every level but repeats every 3 levels
  // along with the head photo. Kept to ~4-6 words each so they're genuinely
  // skimmable within the flashTimer window below while gameplay keeps
  // running underneath - a 10-word line needs well over 1.5s of full-
  // opacity reading time at comfortable reading speed (~3.3-4.2 words/sec),
  // which the flash didn't budget.

  // ---------- responsive canvas sizing ----------
  var dpr = 1;
  var boardCssPx = 0;
  var cellPx = 0;
  // Floor multiplier retuned from *4 to *8 alongside the GRID_N cut (19->13):
  // at *4 the worst-case cell would only be 4px regardless of grid size,
  // which defeats the point of moving to fewer/bigger cells for
  // readability. *8 guarantees at least an 8px cell whenever the viewport can
  // actually fit it. This is the *ideal* floor, not an absolute one any more -
  // see SAFETY_MIN_BOARD_PX and its use in resizeCanvas() below:
  // unconditionally forcing every viewport up to this floor (the old
  // behavior) is exactly what caused #wrap to have to scroll on short
  // landscape phones that used to fit at GRID_N=19/*4. GRID_N was cut again
  // to 9 per the grid/avatar/palette spec - MIN_BOARD_PX derives from GRID_N
  // so it now floors at 9*8=72px (was 104px at GRID_N=13); no parallel
  // constant to keep in sync.
  var MIN_BOARD_PX = GRID_N * 8;   // preferred floor (72px) for legible cells,
                                    // honored whenever the viewport fits it
                                    // without forcing scroll/clipping.
  // Absolute last-resort floor (same *4 multiplier the pre-13x13 build used)
  // so the board never collapses to ~0px on a pathological viewport. Unlike
  // MIN_BOARD_PX above, resizeCanvas() only falls back to this when honoring
  // MIN_BOARD_PX would itself force #wrap to scroll - i.e. it never
  // overrides a fit budget that's already between the two floors, it only
  // stops the board from going to zero when even that fit budget is
  // negative/near-zero. Derives from GRID_N (9*4=36px, was 52px at GRID_N=13).
  var SAFETY_MIN_BOARD_PX = GRID_N * 4;
  var MAX_BOARD_PX = 720;          // cap so 4K/8K desktops don't get a huge board;
                                    // unchanged - at GRID_N=9 this yields ~80px
                                    // cells, plenty large on desktop without
                                    // further tuning.
  // The #wrap "phone frame" (border + padding, see its CSS) adds fixed,
  // KNOWN px overhead beyond what measureReservePx() measures (that function
  // only measures hud/footer - not #wrap's own border/padding). Unlike
  // the avatar-sizing fixed-point loop above, these are plain constants, not
  // derived from cellPx or anything else computed here, so there is no
  // circular-dependency risk - just add them once. Vertical: border-top(3) +
  // padding-top(22) + padding-bottom(12) + border-bottom(3) = 40. Horizontal:
  // border-left(3) + padding-left(14) + padding-right(14) + border-right(3)
  // = 34 (the env(safe-area-inset-*) part of that padding is the OS's own
  // reserved inset, already outside the viewport dimensions JS reads, so it
  // needs no separate accounting here).
  var FRAME_VERTICAL_PX = 40;
  var FRAME_HORIZONTAL_PX = 34;

  // Measures the *actual* rendered height of everything in #wrap besides the
  // board (hud + footer, plus the 2 flex gaps between #wrap's 3 children -
  // hud/boardWrap/footer), instead of a hardcoded guess. A hardcoded guess
  // was padded well above the real DOM heights (e.g. reserving 90px for
  // hud+footer when they actually render closer to 30px), which silently ate
  // into the board's height budget and was the root cause of the no-scroll
  // regression on short landscape viewports (568x320 etc.) once MIN_BOARD_PX
  // grew from GRID_N*4 to GRID_N*8 - the padded estimate left far less real
  // headroom than the numbers suggested. Measuring the live layout instead
  // keeps this accurate as the CSS changes, with no constant to drift out of
  // sync. (Used to also account for the on-screen D-pad's height on coarse-
  // pointer devices; that control was removed - touch is swipe-only now -
  // so #wrap always has exactly these 3 children/2 gaps.)
  function measureReservePx() {
    var hudEl = document.getElementById("hud");
    var footerEl = document.getElementById("footer");
    var gap = parseFloat(getComputedStyle(wrap).rowGap);
    if (!gap && gap !== 0) gap = parseFloat(getComputedStyle(wrap).gap) || 8;
    var hudH = hudEl ? hudEl.getBoundingClientRect().height : 0;

    // --cell-px is only known once *this function* has already picked a
    // board size - and measureReservePx() below reads the HUD's height
    // BEFORE that happens, so the board used to get sized against a stale
    // (pre-avatar-growth) HUD height, with no second pass to compensate once
    // the avatar actually grew. Verified concretely at 593x646: cellPx
    // settled at 63px -> avatar/HUD height 189px -> #wrap needed ~787px in a
    // 646px container, a persistent 141px forced scroll on first paint - and
    // nothing guarantees a real static session (no resize/orientationchange/
    // visibilitychange/DPR-change) ever gets a corrective second pass.
    // Fix: solve it as a small fixed-point iteration right here instead of
    // depending on some future external event. Each pass writes the
    // tentative --cell-px so the *next* measureReservePx() call reflects the
    // HUD height that cellPx would actually produce. The feedback loop is a
    // contraction (bigger cellPx -> bigger avatar -> bigger reserve ->
    // smaller available -> smaller cellPx), so it stabilizes to (at, or very
    // close to) a fixed point within a handful of iterations - the GRID_N
    // quantization of boardCssPx can make the very last step or two hunt by
    // one grid unit rather than land exactly, so the loop always uses
    // whichever value it lands on at the cap rather than assuming exact
    // equality is reached; the hard iteration cap is a defensive bound only,
    // in case a future CSS change ever broke the contraction outright.
    var available = 0;
    var prevBoardCssPx = -1;
    for (var iter = 0; iter < 8; iter++) {
      var reservePx = measureReservePx();

      available = Math.min(window.innerWidth, window.innerHeight) - margin;
      // Leave room for HUD + footer text so the whole stack
      // (hud/canvas/footer) tends to fit in one screen without scrolling.
      // An under-estimate here just means #wrap's own overflow-y:auto
      // kicks in instead of anything overlapping.
      available = Math.min(
        available,
        window.innerHeight - reservePx - FRAME_VERTICAL_PX,
        window.innerWidth - 16 - FRAME_HORIZONTAL_PX
      );
      available = Math.min(available, MAX_BOARD_PX);
      // Only pull the board up to the *ideal* readability floor when the
      // viewport can actually fit that floor without forcing a scroll (i.e.
      // `available` - the real fit budget computed above - already meets or
      // exceeds it, so this is a no-op). When the fit budget is smaller than
      // the ideal floor, honor the fit budget itself (keeps the no-scroll
      // requirement intact) and only clamp up to the much smaller
      // SAFETY_MIN_BOARD_PX as an absolute last resort against a near-zero
      // board on a truly pathological viewport - the old unconditional
      // `Math.max(MIN_BOARD_PX, available)` is what forced scrolling on
      // short landscape phones that used to fit at the previous
      // GRID_N/floor tuning.
      if (available < MIN_BOARD_PX) {
        available = Math.max(SAFETY_MIN_BOARD_PX, available);
      }

      boardCssPx = Math.floor(available / GRID_N) * GRID_N; // keep divisible by grid for crisp cells
      if (boardCssPx <= 0) boardCssPx = GRID_N * 4;
      cellPx = boardCssPx / GRID_N;
      // --cell-px is set on #wrap (the shared ancestor of #hud and
      // #boardWrap) so it cascades to #hud's --avatar-px calc() (see #hud
      // CSS) - written every iteration (not just once at the end) so the
      // *next* iteration's measureReservePx() sees the HUD height this
      // cellPx would actually produce, which is the whole point of the loop.
      if (wrap) wrap.style.setProperty("--cell-px", cellPx + "px");
      if (boardCssPx === prevBoardCssPx) break; // converged, stop early
      prevBoardCssPx = boardCssPx;

    canvas.style.height = boardCssPx + "px";

    // card (absolutely positioned inside this same container, see
    // #levelFlashCard rules above) can size itself relative to the real
    // container instead of only the viewport - fixes clipping on small/
    // landscape boards where MIN_BOARD_PX forces the board below what the
    // old vmin-only sizing assumed.
    if (boardWrapEl) boardWrapEl.style.setProperty("--board-px", boardCssPx + "px");

    canvas.height = Math.round(boardCssPx * dpr);

  // disabled attribute on the static #playBtn and the guard at the top of

  var snake = null, dir = { x: 1, y: 0 }, queuedDir = null, food = null;

  // food, and kill only on exact head-cell contact.
  var chasers = [];
  var chaserTick = 0;

  var acc = 0;
  var lastTs = 0;

  // down when the player dies, wins, or pauses mid-flash. The dead/won/paused
  // overlay's background is only ~82% opaque (see #overlay rgba alpha), so

  // behind the "Game Over"/"Paused" text. Call this at every exit from

  function hideLevelFlash() {

      { x: cx - 1, y: cy },

    score = 0;
    popcornCount = 0;
    level = 1;

  }

  function cellFree(x, y) {

  function chaserAt(x, y) {
    for (var i = 0; i < chasers.length; i++) {
      if (chasers[i].x === x && chasers[i].y === y) return true;
    }
    return false;
  }

  // Spawn a chaser on a free cell far from the snake's head, relaxing the
  // distance requirement in passes (5 -> 3 -> 1 Manhattan) so spawning
  // still works on a crowded late-game board instead of looping forever.
  // If literally no valid cell exists, skip the spawn silently.
  function spawnChaser() {
    var head = snake[0];
    var candidates = [];
    var passes = [5, 3, 1];
    for (var p = 0; p < passes.length && !candidates.length; p++) {
      for (var gy = 0; gy < GRID_N; gy++) {
        for (var gx = 0; gx < GRID_N; gx++) {
          if (Math.abs(gx - head.x) + Math.abs(gy - head.y) < passes[p]) continue;
          if (!cellFree(gx, gy)) continue;
          if (food && gx === food.x && gy === food.y) continue;
          if (chaserAt(gx, gy)) continue;

    }

  // never leave the grid (the head is inside it), and they deliberately
  // pass over the snake's body, the food, and each other - only exact
  // head contact matters. Per-index axis preference keeps multiple
  // chasers approaching from different directions instead of merging
  // into one stacked blob.
  function moveChasers() {
    var head = snake[0];

  function placeFood() {
    var attempts = 0;

      y = Math.floor(Math.random() * GRID_N);
      attempts++;
    } while ((!cellFree(x, y) || chaserAt(x, y)) && attempts < 500);
    if (!cellFree(x, y) || chaserAt(x, y)) {
      // Random search failed (board is nearly full): fall back to a
      // deterministic scan instead of placing food on an occupied cell,
      // which would otherwise force a false self-collision death on the
      // next valid grow move.
      var found = false;
      for (var gy = 0; gy < GRID_N && !found; gy++) {
        for (var gx = 0; gx < GRID_N && !found; gx++) {

        }

        // move constantly, so this is transient, not "board full". Relax
        // the chaser exclusion rather than mis-reporting a win.
        for (gy = 0; gy < GRID_N && !found; gy++) {
          for (gx = 0; gx < GRID_N && !found; gx++) {

          }

    return LEVEL_TINTS[(level - 1) % LEVEL_TINTS.length];

    var blurbs = S().blurbs;

  }

  // #levelFlashImg. Reuses assetSrc()'s existing fallback chain (real image
  // src, or the makeFallbackCanvas() colored-circle dataURL, or
  // BLANK_PIXEL_SRC) - no new naive <img src> that can hang/blank on a failed
  // load. Called at boot (once assets are ready) and from newGame()/levelUp()

  function updateAvatarHud() {
    if (avatarHudImg) avatarHudImg.src = assetSrc(currentHeadKey());
  }

  function updateHud() {
    hudScore.textContent = String(score);
    hudLevel.textContent = String(level);
    hudHi.textContent = String(hi);
  }

  // ---------- language switch: everything below is re-derived from S(),
  // never a page reload. Gameplay control DIRECTIONS are untouched by this -
  // switching `dir` only affects text layout (see the #avatarHud CSS comment
  // and #mobileHelpArrows's dir="ltr" markup for why the physical left/right

    if (metaDesc) metaDesc.setAttribute("content", s.metaDescription);

    if (scoreLabelEl) scoreLabelEl.textContent = s.scoreLabel;
    if (levelLabelEl) levelLabelEl.textContent = s.levelLabel;
    if (hiLabelEl) hiLabelEl.textContent = s.hiLabel;

    var footerEl = document.getElementById("footer");
    if (footerEl) {
      footerEl.textContent = persistOk ? s.footerHi : s.footerHiFail;

      langToggleBtn.setAttribute("aria-label", s.toggleAria);

    // run yet - directly correct the static markup's own elements in place.
    if (state === "menu") showOverlayMenu();
    else if (state === "dead") showOverlayDead();
    else if (state === "won") showOverlayWon();
    else if (state === "paused") showOverlayPaused();

  var persistOk = true;

      persistOk = false;
      notePersistFailure();
    }
  }

  function saveHi() {
    if (score > hi) {

      } catch (e) {
        persistOk = false;
        notePersistFailure();
      }
    }
  }

  // ---------- input: queue at most one turn per step, forbid 180 into neck ----------
  function requestTurn(name) {
    var d = DIRS[name];
    if (!d) return;
    // Compare against the direction that will actually be committed next:
    // if a turn is already queued this tick, check against *that*, not the
    // stale committed dir - otherwise two opposite key presses within the
    // same step interval can both individually pass the anti-reversal check
    // and the second overwrites queuedDir, reversing the snake into its neck.
    var ref = queuedDir || dir;
    if (d.x === -ref.x && d.y === -ref.y) return;
    queuedDir = d;
  }

  function applyQueuedTurn() {
    if (queuedDir) {
      // guard again in case dir changed since queuing (shouldn't, but safe)
      if (!(queuedDir.x === -dir.x && queuedDir.y === -dir.y)) {
        dir = queuedDir;
      }
      queuedDir = null;
    }
  }

  // ---------- step / update ----------
  function step() {
    applyQueuedTurn();

    var head = snake[0];
    var nx = head.x + dir.x;
    var ny = head.y + dir.y;

    if (nx < 0 || nx >= GRID_N || ny < 0 || ny >= GRID_N) {
      return die();
    }
    // self collision: check against body (excluding tail cell, which will move away
    // unless we just ate - handled by only excluding when not growing)
    var willGrow = (nx === food.x && ny === food.y);
    var bodyToCheck = willGrow ? snake : snake.slice(0, snake.length - 1);
    for (var i = 0; i < bodyToCheck.length; i++) {
      if (bodyToCheck[i].x === nx && bodyToCheck[i].y === ny) {
        return die();
      }
    }

    snake.unshift({ x: nx, y: ny });
    if (willGrow) {
      score += 1;
      popcornCount += 1;
      if (popcornCount % POPCORN_PER_LEVEL === 0) {
        levelUp();
      }
      updateHud();
      placeFood();
    } else {
      snake.pop();
    }

    // chasers: dying by walking INTO a ghost, then their own half-speed
    // pursuit move (once per two snake steps), which can also catch the head
    if (chaserAt(nx, ny)) return die();
    chaserTick = 1 - chaserTick;
    if (chaserTick === 0) {
      moveChasers();
      if (chaserAt(snake[0].x, snake[0].y)) return die();
    }
  }

  function levelUp() {
    level += 1;
    stepMs = Math.max(MIN_STEP_MS, stepMs * STEP_DECAY);
    if (chasers.length < 3) spawnChaser(); // level 2 -> two chasers, 3+ -> three
    // ~1.6s "level details" screen: readable but still brief, and - crucially -
    // non-blocking. It only drives flashTimer/CSS opacity, never `state`, so
    // the fixed-timestep loop in frame() keeps calling step() underneath it
    // at the same new stepMs; nothing here pauses actual gameplay.
    // 1900ms total (~1650ms at full opacity after the 250ms fade-in): with
    // the trimmed ~4-6-word LEVEL_BLURBS above, that's a comfortable read
    // even at conservative reading speed, while staying within the spec's
    // ~1.5-2s non-blocking window.
    flashTimer = 1900; // ms
    var tint = currentTint();
    // Enlarged circular head photo for the level being entered (cycles
    // head-1/2/3.png with the level, same image already used for the
    // snake's own head this level) - splash.png stays reserved for the
    // game-over/win screens only, per spec.
    levelFlashImg.src = assetSrc(currentHeadKey());
    // Update the always-visible avatar HUD at this exact same point (same
    // currentHeadKey() call site) so it and #levelFlashImg can never drift
    // out of sync with each other.
    updateAvatarHud();
    levelFlashText.textContent = S().levelFlashLabel(level);
    levelFlashBlurb.textContent = currentBlurb();
    // Color-pop background accent tinted to the level's tint color, so each
    // level-up reads as visually distinct, not just a text change.
    levelFlashCard.style.background =
      "linear-gradient(160deg, " + tint.core + "e6, " + tint.edge + "e6)";
    levelFlash.classList.add("show");
  }

  function die() {
    state = "dead";
    hideLevelFlash(); // don't let a mid-flash level card bleed through the
                       // translucent game-over overlay
    saveHi();
    updateHud();
    showOverlayDead();
  }

  function win() {
    // Reachable only when the snake fills every cell of the grid.
    state = "won";
    hideLevelFlash(); // same bleed-through guard as die()
    saveHi();
    updateHud();
    showOverlayWon();
  }

  // ---------- overlay screens ----------
  // Every string below comes from S() (the current-language STRINGS entry),
  // so re-invoking whichever of these matches the current `state` is exactly
  // what applyLanguage() needs to do to re-render the visible overlay in the
  // new language, with no separate template to keep in sync.
  function showOverlayMenu() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>' + S().brandTitle + '</h1>' +
      '<p class="tagline">' + S().menuInstructions + '</p>' +
      '<p class="stat">' + S().menuControls + '</p>' +
      '<button id="playBtn" type="button">' + S().playBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayDead() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetSrc("splash") + '" alt="">' +
      '<h1>' + S().deadTitle + '</h1>' +
      '<p class="stat">' + S().scoreStat(score) + '</p>' +
      '<p class="stat">' + S().hiStat(hi) + '</p>' +
      '<p>' + S().deadRetry + '</p>' +
      '<button id="playBtn" type="button">' + S().playAgainBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayWon() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetSrc("splash") + '" alt="">' +
      '<h1>' + S().wonTitle + '</h1>' +
      '<p class="stat">' + S().wonBoardFull(score) + '</p>' +
      '<p class="stat">' + S().hiStat(hi) + '</p>' +
      '<p>' + S().wonRetry + '</p>' +
      '<button id="playBtn" type="button">' + S().playAgainBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayPaused() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>' + S().pausedTitle + '</h1>' +
      '<p class="stat">' + S().scoreStat(score) + '</p>' +
      '<p>' + S().pausedResume + '</p>' +
      '<button id="playBtn" type="button">' + S().resumeBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function bindPlayBtn() {
    var btn = document.getElementById("playBtn");
    if (!btn) return;
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      startOrResume();
    });
  }

  function hideOverlay() {
    overlay.classList.add("hidden");
  }

  function startOrResume() {
    // Assets aren't ready yet: #playBtn is disabled in this state so a real
    // click can't normally reach here, but the board/canvas tap-to-start
    // handlers call this too, so guard explicitly rather than relying only
    // on the disabled attribute.
    if (state === "loading") return;
    if (state === "menu" || state === "dead" || state === "won") {
      newGame();
      state = "playing";
      hideOverlay();
      render(); // paint the fresh snake immediately, don't wait for the next rAF tick
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  function togglePause() {
    if (state === "playing") {
      state = "paused";
      hideLevelFlash(); // same bleed-through guard as die()/win()
      showOverlayPaused();
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  // ---------- rendering ----------
  function render() {
    var w = boardCssPx, h = boardCssPx;
    ctx.clearRect(0, 0, w, h);
    // light Nokia-LCD board, deliberately semi-transparent (alpha 0.82) so a
    // hint of the dark phone body underneath shows through - per request.
    // clearRect above wipes each frame, so the translucent fill can never
    // accumulate across frames.
    ctx.fillStyle = "rgba(204, 217, 163, 0.82)";
    ctx.fillRect(0, 0, w, h);

    // grid: kept for guidance but dimmed well down - per request
    ctx.strokeStyle = "rgba(46, 61, 26, 0.09)";
    ctx.lineWidth = 1;
    for (var g = 1; g < GRID_N; g++) {
      var p = Math.round(g * cellPx) + 0.5;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
    }

    if (!snake) return;

    // food, slightly larger than a cell, soft shadow
    // (food can legitimately be null once the board is completely full - win())
    if (food) {
      var foodImg = drawable("food");
      var fSize = cellPx * 1.3;
      var fx = food.x * cellPx + cellPx / 2;
      var fy = food.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = cellPx * 0.4;
      ctx.shadowOffsetY = cellPx * 0.12;
      if (assets.food) {
        ctx.drawImage(foodImg, fx - fSize / 2, fy - fSize / 2, fSize, fSize);
      } else {
        ctx.beginPath();
        ctx.arc(fx, fy, fSize / 2, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd166";
        ctx.fill();
      }
      ctx.restore();
    }

    // body, warm per-level tint circles, fading toward tail, smaller than head
    var tint = currentTint();
    var bodyLen = snake.length - 1;
    for (var i = snake.length - 1; i >= 1; i--) {
      var seg = snake[i];
      var t = bodyLen > 1 ? (i - 1) / (bodyLen - 1) : 0; // 0 near head, 1 near tail
      var size = cellPx * (0.82 - 0.22 * t);
      var alpha = 0.95 - 0.45 * t;
      var cxp = seg.x * cellPx + cellPx / 2;
      var cyp = seg.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cxp, cyp, size / 2, 0, Math.PI * 2);
      ctx.fillStyle = tint.core;
      ctx.fill();
      ctx.lineWidth = Math.max(1, cellPx * 0.05);
      ctx.strokeStyle = tint.edge;
      ctx.stroke();
      ctx.restore();
    }

    // head: circular photo rotated toward travel direction
    var headSeg = snake[0];
    var hx = headSeg.x * cellPx + cellPx / 2;
    var hy = headSeg.y * cellPx + cellPx / 2;
    var hSize = cellPx * 0.95;
    var angle = Math.atan2(dir.y, dir.x);
    var headKey = currentHeadKey();
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, hSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.save();
    ctx.clip();
    if (assets[headKey]) {
      ctx.drawImage(assets[headKey], -hSize / 2, -hSize / 2, hSize, hSize);
    } else {
      ctx.fillStyle = tint.core;
      ctx.fillRect(-hSize / 2, -hSize / 2, hSize, hSize);
    }
    ctx.restore();
    ctx.lineWidth = Math.max(1, cellPx * 0.06);
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.stroke();
    ctx.restore();

    // chasers: drawn last so the threat is always visible on top. Sprite
    // per index (ghost1/2/3 = red/pink/cyan), same soft shadow as the food.
    // drawable() returns either the loaded ghost image or the colored-
    // circle fallback canvas - drawImage accepts both.
    for (var ci = 0; ci < chasers.length; ci++) {
      var ch = chasers[ci];
      var gImg = drawable("ghost" + ((ci % 3) + 1));
      var gSize = cellPx * 1.14;
      var gx2 = ch.x * cellPx + cellPx / 2;
      var gy2 = ch.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.45)";
      ctx.shadowBlur = cellPx * 0.3;
      ctx.shadowOffsetY = cellPx * 0.1;
      ctx.drawImage(gImg, gx2 - gSize / 2, gy2 - gSize / 2, gSize, gSize);
      ctx.restore();
    }
  }

  // ---------- fixed-timestep rAF loop ----------
  function frame(ts) {
    if (!lastTs) lastTs = ts;
    var dt = ts - lastTs;
    lastTs = ts;
    if (dt > 250) dt = 250; // clamp huge gaps (tab backgrounded)

    if (flashTimer > 0) {
      flashTimer -= dt;
      if (flashTimer <= 0) {
        flashTimer = 0;
        levelFlash.classList.remove("show");
      }
    }

    if (state === "playing") {
      acc += dt;
      // Snapshot stepMs for this frame: step() can call levelUp(), which
      // mutates stepMs mid-loop. Without the snapshot, a single frame could
      // execute an extra step at the newly-faster rate right at a level
      // boundary (an uncommanded burst of movement).
      var stepSnapshot = stepMs;
      while (acc >= stepSnapshot) {
        acc -= stepSnapshot;
        if (state === "playing") step();
        else break;
      }
    }

    render();
    requestAnimationFrame(frame);
  }

  // ---------- keyboard ----------
  // WASD intentionally removed per spec - arrow keys only. (Was previously
  // mapped alongside ArrowUp/Down/Left/Right.)
  var KEY_DIR = {
    ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right"
  };

  window.addEventListener("keydown", function (e) {
    if (KEY_DIR[e.key]) {
      e.preventDefault();
      if (state === "playing") requestTurn(KEY_DIR[e.key]);
      return;
    }
    if (e.key === " ") {
      e.preventDefault();
      if (state === "playing" || state === "paused") togglePause();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      startOrResume();
    }
  }, { passive: false });

  // ---------- touch: swipe on canvas ----------
  var touchStart = null;

  // Shared by the touchmove and touchend handlers below: if the drag from
  // `touchStart` to (x,y) crosses SWIPE_THRESHOLD, request the turn and
  // re-anchor touchStart to (x,y) so a continued drag (finger still down)
  // can chain further turns without lifting. Returns nothing useful - the
  // re-anchor IS the state change. requestTurn() already owns queueing and
  // anti-reversal, exactly as for repeated keyboard input.
  function maybeSwipeTurn(x, y) {
    if (!touchStart) return;
    var dx = x - touchStart.x;
    var dy = y - touchStart.y;
    if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      requestTurn(dx > 0 ? "right" : "left");
    } else {
      requestTurn(dy > 0 ? "down" : "up");
    }
    touchStart = { x: x, y: y };
  }

  canvas.addEventListener("touchstart", function (e) {
    if (e.touches.length !== 1) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchmove", function (e) {
    e.preventDefault(); // block scroll/zoom even where touch-action is imperfect
    // Mobile responsiveness: recognize the swipe the moment the finger
    // crosses the threshold, DURING the drag - not only on touchend. The
    // old lift-to-turn behavior added the whole remaining finger-down time
    // as input latency on every single turn, which is the main reason
    // touch controls felt sluggish next to a keyboard's instant keydown.
    if (state === "playing" && e.touches.length === 1) {
      maybeSwipeTurn(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });

  canvas.addEventListener("touchend", function (e) {
    e.preventDefault();
    if (state === "menu" || state === "dead" || state === "won") {
      startOrResume();
      touchStart = null;
      return;
    }
    // Tail segment of the drag (post-last-re-anchor): still honored, so a
    // short flick that never fired during touchmove turns on release just
    // like before - touchmove recognition above is additive, not replacing.
    if (touchStart) {
      var t = e.changedTouches[0];
      maybeSwipeTurn(t.clientX, t.clientY);
    }
    touchStart = null;
  }, { passive: false });

  // block long-press context menu / selection on canvas
  canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // On-screen D-pad removed per spec - touch devices are swipe-on-canvas
  // only now (see the canvas touchstart/touchmove/touchend handlers above).
  function isCoarsePointer() {
    return !!(window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
  }

  // ---------- mobile-only "how to play" popup ----------
  // Shown once (localStorage-gated) the first time a coarse-pointer (touch)
  // device reaches the menu, since swipe-to-move isn't otherwise self-
  // explanatory the way visible D-pad arrows were. Icon-first/text-minimal
  // per spec. Never shown on mouse/trackpad devices.
  function maybeShowMobileHelp() {
    if (!mobileHelp) return;
    if (!isCoarsePointer()) return;
    var seen = false;
    try { seen = localStorage.getItem(MOBILE_HELP_SEEN_KEY) === "1"; } catch (e) { /* storage unavailable - fall through, show it */ }
    if (seen) return;
    mobileHelp.classList.add("show");
  }
  function dismissMobileHelp() {
    if (!mobileHelp) return;
    mobileHelp.classList.remove("show");
    try { localStorage.setItem(MOBILE_HELP_SEEN_KEY, "1"); } catch (e) { /* best-effort only */ }
  }
  if (mobileHelpClose) {
    mobileHelpClose.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      dismissMobileHelp();
    });
  }
  if (mobileHelp) {
    // Tapping the dimmed backdrop also dismisses it; tapping the card itself
    // must not (stopPropagation below), so a stray tap while reading it
    // doesn't close it prematurely.
    mobileHelp.addEventListener("click", function (e) {
      if (e.target === mobileHelp) dismissMobileHelp();
    });
    var mobileHelpCardEl = document.getElementById("mobileHelpCard");
    if (mobileHelpCardEl) {
      mobileHelpCardEl.addEventListener("click", function (e) { e.stopPropagation(); });
    }
  }

  // tap board to restart/resume when overlay hidden but state not playing (defensive)
  wrap.addEventListener("click", function () {
    if (state === "menu" || state === "dead" || state === "won") startOrResume();
  });

  playBtn.addEventListener("click", function (e) {
    e.preventDefault();
    startOrResume();
  });

  // ---------- language toggle ----------
  if (langToggleBtn) {
    langToggleBtn.addEventListener("click", function (e) {
      e.preventDefault();
      applyLanguage(currentLang === "he" ? "en" : "he");
    });
    // The global keydown handler below (Space -> pause, Enter -> start/
    // resume) is bound on `window` and fires on ANY keypress regardless of
    // focus, including a native Space/Enter activation of this button - that
    // would pause/resume the game as an unwanted side effect of toggling the
    // language. stopPropagation() here (bubble phase, before the event
    // reaches window) isolates this button's own keyboard activation from
    // that global handler, without touching the handler itself.
    langToggleBtn.addEventListener("keydown", function (e) {
      if (e.key === " " || e.key === "Enter") e.stopPropagation();
    });
  }

  // ---------- boot ----------
  loadHi();
  updateHud();
  applyLanguage(currentLang); // corrects the static pre-boot markup (loading
                               // label, mobile-help caption, meta description,
                               // HUD labels, footer) to match a previously-
                               // stored language choice before first paint

  // Coalesce resize/orientationchange bursts (e.g. iOS Safari's chrome
  // auto-hide/show firing repeated resize events) into one rAF-scheduled
  // pass.
  var resizeScheduled = false;
  function scheduleResize() {
    if (resizeScheduled) return;
    resizeScheduled = true;
    requestAnimationFrame(function () {
      resizeScheduled = false;
      resizeCanvas();
    });
  }
  window.addEventListener("resize", scheduleResize);
  window.addEventListener("orientationchange", scheduleResize);
  // iOS Safari's toolbar collapse/expand and Android Chrome's URL-bar hide
  // change the *visual* viewport without always firing a window resize (or
  // firing it with stale innerHeight on older iOS). visualViewport's own
  // resize event is the authoritative signal there; scheduleResize is
  // rAF-coalesced so the extra listener costs nothing when both fire.
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", scheduleResize);
  }

  // rAF is paused/throttled while a tab is backgrounded, so a resize that
  // fires while hidden can leave scheduleResize()'s queued rAF callback
  // sitting unresolved (resizeScheduled stays true, so a synthetic resize
  // dispatched in the meantime is silently ignored) until the tab is
  // foregrounded again. Recompute directly - bypassing the rAF gate - the
  // moment the tab becomes visible, instead of waiting on whatever resize
  // event happens to arrive next.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      resizeScheduled = false;
      resizeCanvas();
    }
  });

  // Re-check devicePixelRatio when it changes (moving a window between
  // displays with different DPR, or OS-level scale changes) - these don't
  // fire a window resize event, so without this the canvas stays blurry
  // until some unrelated resize happens.
  function watchDprChange() {
    if (!window.matchMedia) return;
    var mq = window.matchMedia("(resolution: " + (window.devicePixelRatio || 1) + "dppx)");
    function handler() {
      scheduleResize();
      watchDprChange(); // re-subscribe at the new dpr
    }
    if (mq.addEventListener) mq.addEventListener("change", handler, { once: true });
    else if (mq.addListener) mq.addListener(handler); // older Safari fallback
  }
  watchDprChange();

  resizeCanvas();

  preloadAssets(function () {
    // Guard rather than unconditionally reset: state can only still be
    // "loading" here in the current code (Play is disabled/no-op until this
    // fires), but this keeps a future change from silently reintroducing a
    // bug where finishing asset load stomps an already-started game back to
    // the menu and pops the overlay over live play.
    if (state === "loading") {
      state = "menu";
      showOverlayMenu();
      maybeShowMobileHelp();
    }
    updateAvatarHud(); // always-visible avatar HUD: show it as soon as assets
                        // are ready, even before the first game starts
    render();
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
