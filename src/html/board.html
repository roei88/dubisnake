  <div id="boardWrap" style="position:relative; overflow:hidden;">
    <canvas id="game"></canvas>
    <div id="boardBezel" aria-hidden="true"></div>
    <div id="levelFlash">
      <div id="levelFlashCard">
        <div id="levelFlashTitle">רמה 1</div>
        <!-- filled from JS: one <img> per monster in play at this level -->
        <div id="levelMonsters"></div>
        <button id="levelOkBtn" type="button">OK</button>
      </div>
    </div>
    <div id="overlay">
      <div class="overlayInner">
        <h1>דוביסנייק</h1>
        <p class="tagline">אכלו את הפופקורן!</p>
        <!-- dir="ltr" is load-bearing: .htSnake is a flex row, and flex rows
             reverse under an inherited dir="rtl" - that would put the snake's
             head on the wrong end and contradict the rotation keyframes. Same
             reasoning as the #mobileHelp arrows. -->
        <div class="howto howtoTouch" dir="ltr" aria-hidden="true"><span class="htArrow htUp">&#8593;</span><span class="htArrow htRight">&#8594;</span><span class="htArrow htDown">&#8595;</span><span class="htArrow htLeft">&#8592;</span><span class="htSnake"><i></i><i></i><i></i></span><span class="htHand">&#128070;</span></div>
        <div class="howto howtoKeys" dir="ltr" aria-hidden="true"><span class="htSnake"><i></i><i></i><i></i></span><span class="htKeys"><b class="htKey htkUp">&#8593;</b><b class="htKey htkLeft">&#8592;</b><b class="htKey htkDown">&#8595;</b><b class="htKey htkRight">&#8594;</b></span></div>
        <button id="playBtn" type="button" disabled>טוען&hellip;</button>
      </div>
    </div>
  </div>
