    // brief pre-asset "loading" state, before any showOverlay* function has
    // run yet - directly correct the static markup's own elements in place.
    if (state === "menu") showOverlayMenu();
    else if (state === "dead") showOverlayDead();
    else if (state === "won") showOverlayWon();
    else if (state === "paused") showOverlayPaused();
    else if (state === "loading") {
      var loadingH1 = overlay.querySelector("h1");
      var loadingTagline = overlay.querySelector(".tagline");
      var loadingBtn = document.getElementById("playBtn");
      if (loadingH1) loadingH1.textContent = s.brandTitle;
      if (loadingTagline) loadingTagline.textContent = s.menuInstructions;
      // (no controls line any more - the .howto demo is icon-only, so there
      // is nothing here to re-translate)
      if (loadingBtn) loadingBtn.textContent = s.loadingBtn;
    }

    // The level banner can be the thing currently on screen - re-label it
    // too rather than leaving the old language up until the next level.
    if (state === "levelbanner") {
      levelFlashTitle.textContent = s.levelFlashLabel(level);
    }

    try {
      localStorage.setItem(LANG_KEY, currentLang);
    } catch (e) { /* private mode / storage disabled - in-session switch still works */ }
  }

  // hi is a module-level var, so an in-session high score still works even
  // when persistence is unavailable (private mode / quota / disabled
  // storage) - persistOk just tracks whether we can also survive a reload,
  // and surfaces a one-time notice in the footer when we can't.
  var persistOk = true;

  function notePersistFailure() {
    if (persistOk) return;
    var footerEl = document.getElementById("footer");
    if (footerEl && footerEl.dataset.persistNoted !== "1") {
      footerEl.textContent = S().footerHiFail;
      footerEl.dataset.persistNoted = "1";
    }
  }

  function loadHi() {
    try {
      var v = parseInt(localStorage.getItem(HI_KEY), 10);
      hi = isNaN(v) ? 0 : v;
    } catch (e) {
      hi = 0;
      persistOk = false;
      notePersistFailure();
    }
  }

  function saveHi() {
    if (score > hi) {
      hi = score;
      try {
        localStorage.setItem(HI_KEY, String(hi));
      } catch (e) {
        persistOk = false;
        notePersistFailure();
      }
    }
  }

  // ---------- input: queue at most one turn per step, forbid 180 into neck ----------
  function requestTurn(name) {
    var d = DIRS[name];
    if (!d) return;
    // Compare against the direction that will actually be committed next:
    // if a turn is already queued this tick, check against *that*, not the
    // stale committed dir - otherwise two opposite key presses within the
    // same step interval can both individually pass the anti-reversal check
    // and the second overwrites queuedDir, reversing the snake into its neck.
    var ref = queuedDir || dir;
    if (d.x === -ref.x && d.y === -ref.y) return;
    queuedDir = d;
  }

  function applyQueuedTurn() {
    if (queuedDir) {
      // guard again in case dir changed since queuing (shouldn't, but safe)
      if (!(queuedDir.x === -dir.x && queuedDir.y === -dir.y)) {
        dir = queuedDir;
      }
      queuedDir = null;
    }
  }

  // ---------- step / update ----------
  function step() {
    applyQueuedTurn();

    var head = snake[0];
    var nx = head.x + dir.x;
    var ny = head.y + dir.y;

    if (nx < 0 || nx >= GRID_N || ny < 0 || ny >= GRID_N) {
      return die();
    }
    // self collision: check against body (excluding tail cell, which will move away
    // unless we just ate - handled by only excluding when not growing)
    var willGrow = (nx === food.x && ny === food.y);
    var bodyToCheck = willGrow ? snake : snake.slice(0, snake.length - 1);
    for (var i = 0; i < bodyToCheck.length; i++) {
      if (bodyToCheck[i].x === nx && bodyToCheck[i].y === ny) {
        return die();
      }
    }

    snake.unshift({ x: nx, y: ny });
    // Set when this step triggers a level-up: positionForLevel() (inside
    // levelUp()) re-centres the snake AND resets/respawns the chasers, so
    // nx/ny below (this step's pre-reset head) and the pre-reset chasers no
    // longer describe the current board at all - the chaser checks further
    // down must be skipped for this tick rather than compare stale
    // coordinates against a brand-new layout.
    var leveledUp = false;
    if (willGrow) {
      score += 1;
      popcornCount += 1;
      if (popcornCount % POPCORN_PER_LEVEL === 0) {
        levelUp();
        leveledUp = true;
      } else {
        placeFood();
      }
      updateHud();
    } else {
      snake.pop();
    }

    if (leveledUp) return;

    // chasers: you die by walking INTO a ghost - and only that. Their own
    // slowed pursuit move (CHASER_MOVE_RATE moves per snake step, accumulated
    // below) can close in and block, but never lands on the head, so it
    // needs no death check of its own. See moveChasers() for why that rule
    // exists.
    if (chaserAt(nx, ny)) return die();
    chaserMoveAccum += CHASER_MOVE_RATE;
    if (chaserMoveAccum >= 1) {
      chaserMoveAccum -= 1;
      moveChasers();
      if (chaserAt(snake[0].x, snake[0].y)) return die();
    }
  }

  function levelUp() {
    level += 1;
    stepMs = Math.max(MIN_STEP_MS, stepMs * STEP_DECAY);
    // Re-centre the snake and reset/respawn the chasers for the new level
    // (level 2 -> two chasers, 3+ -> three) INSTEAD OF the old incremental
    // spawnChaser() - positionForLevel() now owns both, and as a side effect
    // the new chasers always spawn far from the (re-centred) head, fixing
    // "monsters too close at level start" without special-casing it.
    positionForLevel();
    // Keep the always-visible avatar HUD in sync with the new level's head
    // photo at this exact point, so the two can never drift apart.
    updateAvatarHud();
    // Blocking retro banner (was a ~1.9s non-blocking flash card): the snake
    // holds still until the player presses OK, so a level change can no
    // longer sneak movement past them while they read it. OK now leads into
    // the countdown (Change 2), not straight back to "playing".
    showLevelBanner();
  }

  function die() {
    state = "dead";
    hideLevelBanner(); // don't let a stale banner bleed through the
                        // translucent game-over overlay
    saveHi();
    updateHud();
    showOverlayDead();
  }

  function win() {
    // Reachable only when the snake fills every cell of the grid.
    state = "won";
    hideLevelBanner(); // same bleed-through guard as die()
    saveHi();
    updateHud();
    showOverlayWon();
  }

  // ---------- overlay screens ----------
  // Every string below comes from S() (the current-language STRINGS entry),
  // so re-invoking whichever of these matches the current `state` is exactly
  // what applyLanguage() needs to do to re-render the visible overlay in the
  // new language, with no separate template to keep in sync.
  function showOverlayMenu() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>' + S().brandTitle + '</h1>' +
      '<p class="tagline">' + S().menuInstructions + '</p>' +
      // Language-independent (icons only), so it needs no S() lookup and
      // survives applyLanguage()'s rebuild unchanged. dir="ltr" pins the
      // flex-row snake against RTL reversal - see the static markup comment.
      '<div class="howto howtoTouch" dir="ltr" aria-hidden="true"><span class="htArrow htUp">&#8593;</span><span class="htArrow htRight">&#8594;</span><span class="htArrow htDown">&#8595;</span><span class="htArrow htLeft">&#8592;</span><span class="htSnake"><i></i><i></i><i></i></span><span class="htHand">&#128070;</span></div>' +
      '<div class="howto howtoKeys" dir="ltr" aria-hidden="true"><span class="htSnake"><i></i><i></i><i></i></span><span class="htKeys"><b class="htKey htkUp">&#8593;</b><b class="htKey htkLeft">&#8592;</b><b class="htKey htkDown">&#8595;</b><b class="htKey htkRight">&#8594;</b></span></div>' +
      '<button id="playBtn" type="button">' + S().playBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayDead() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetStore.src("splash") + '" alt="">' +
      '<h1>' + S().deadTitle + '</h1>' +
      '<p class="stat">' + S().scoreStat(score) + '</p>' +
      '<p class="stat">' + S().hiStat(hi) + '</p>' +
      '<p>' + S().deadRetry + '</p>' +
      '<button id="playBtn" type="button">' + S().playAgainBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayWon() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<img class="splashPic" src="' + assetStore.src("splash") + '" alt="">' +
      '<h1>' + S().wonTitle + '</h1>' +
      '<p class="stat">' + S().wonBoardFull(score) + '</p>' +
      '<p class="stat">' + S().hiStat(hi) + '</p>' +
      '<p>' + S().wonRetry + '</p>' +
      '<button id="playBtn" type="button">' + S().playAgainBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function showOverlayPaused() {
    overlay.classList.remove("hidden");
    overlay.innerHTML =
      '<div class="overlayInner">' +
      '<h1>' + S().pausedTitle + '</h1>' +
      '<p class="stat">' + S().scoreStat(score) + '</p>' +
      '<p>' + S().pausedResume + '</p>' +
      '<button id="playBtn" type="button">' + S().resumeBtn + '</button>' +
      '</div>';
    bindPlayBtn();
  }

  function bindPlayBtn() {
    var btn = document.getElementById("playBtn");
    if (!btn) return;
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      startOrResume();
    });
  }

  function hideOverlay() {
    overlay.classList.add("hidden");
  }

  if (levelOkBtn) {
    levelOkBtn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation(); // don't also reach the backdrop handler below
      dismissLevelBanner();
    });
  }
  if (levelFlash) {
    // Tapping anywhere on the banner dismisses it too - on a phone, aiming
    // for the button is needless friction. Guarded to the backdrop itself so
    // this stays additive to the button rather than racing it.
    levelFlash.addEventListener("click", function (e) {
      if (e.target === levelFlash || e.target === levelFlashCard) dismissLevelBanner();
    });
  }

  function startOrResume() {
    // Assets aren't ready yet: #playBtn is disabled in this state so a real
    // click can't normally reach here, but the board/canvas tap-to-start
    // handlers call this too, so guard explicitly rather than relying only
    // on the disabled attribute.
    if (state === "loading") return;
    if (state === "menu" || state === "dead" || state === "won") {
      // newGame() ends by showing the level-1 banner, which sets state to
      // "levelbanner" - do NOT force "playing" here or the banner would be
      // skipped straight past on the very first level.
      newGame();
      hideOverlay();
      render(); // paint the fresh snake immediately, don't wait for the next rAF tick
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  function togglePause() {
    if (state === "playing") {
      state = "paused";
      hideLevelBanner(); // same bleed-through guard as die()/win()
      showOverlayPaused();
    } else if (state === "paused") {
      state = "playing";
      hideOverlay();
    }
  }

  // ---------- opening intro scene (Task C - adapted port of
  // new-assets/animations/opener-scenes.jsx) ----------
  // Plays once, automatically, right after assetStore.preload() finishes and
  // before the normal "menu" state - see startOpening() (called from the
  // assetStore.preload() callback near the bottom of this file) and endOpening().
  // Entirely canvas-driven from the SAME fixed-timestep frame()/render()
  // pair the rest of the game already uses: no second rAF loop, no
  // setInterval, no Date.now()-based timing (openingStartTs/animTs are both
  // captured from the rAF timestamp frame() already receives). Reuses the
  // already-loaded ghost1/2/3, head1/2/3 and food sprites - no new assets.
  // The reference stage (720x1080 portrait, separate banner+board) doesn't
  // map 1:1 onto this game's square board, so every coordinate below is
  // expressed in board-relative fractions/cellPx, not copied from the
  // reference pixel values (see local/NEWASSETS_SPEC.md, Task C: "adapt,
  // don't copy coordinates").
  var OPENING_REVEAL_MS = 3000;
  var OPENING_CHASE_MS = 3500;
  var OPENING_READY_MS = 2500;
  var OPENING_TOTAL_MS = OPENING_REVEAL_MS + OPENING_CHASE_MS + OPENING_READY_MS; // ~9s, per spec

  // Cheap ease-out-back / ease-out-cubic helpers for the scene's motion -
  // plain math, no library.
  function openingEaseOutBack(t) {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  function openingEaseOutCubic(t) {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return 1 - Math.pow(1 - t, 3);
  }

  // Starts the intro: called once, from the assetStore.preload() callback,
  // instead of jumping straight "loading" -> "menu". frame() only ever calls
  // step() while state === "playing" (see frame() below), so this new state
  // needs no extra guard there - it simply never matches that branch.
  function startOpening() {
    state = "opening";
    openingStartTs = null; // set on frame()'s first tick while opening (rAF ts)
    suppressTapStartOnce = false;
    overlay.classList.add("hidden"); // the scene is drawn on canvas, not in #overlay
  }

  // Ends the intro - naturally (auto-advance, ~9s, see frame()) or via
  // requestOpeningDismiss() below (any key/pointer/touch) - either way it
  // lands on exactly the same normal "menu" state the old "loading"->"menu"
  // jump used to.
  function endOpening() {
    if (state !== "opening") return;
    state = "menu";
    showOverlayMenu();
    maybeShowMobileHelp();
  }

  // Any key press, or any pointer/touch press ANYWHERE (wired below, near
  // the existing keyboard/touch handlers), dismisses straight to the menu.
  // suppressTapStartOnce swallows the SAME physical tap/click once more (the
  // browser still fires the trailing click/touchend for it) so it can't also
  // fall through to the existing "tap the board to start" convenience and
  // skip straight into a new game, bypassing the menu screen the dismissal
  // is supposed to land on. NOTE: a tap that happens to land exactly where
  // the freshly-shown #playBtn renders can still reach that button's own
  // click listener directly (target-phase, before bubbling reaches the
  // suppress check) and start a game one gesture early - a narrow, harmless
  // edge case (one tap = dismiss AND start), not worth the extra plumbing to
  // fully close off.
  function requestOpeningDismiss() {
    if (state !== "opening") return;
    endOpening();
    suppressTapStartOnce = true;
  }

  function openingElapsedMs() {
    if (openingStartTs === null) return 0;
    return Math.max(0, animTs - openingStartTs);
  }

  // Same lazy-capture pattern as openingElapsedMs() above, for the
  // "get ready" countdown (Change 2). Returns 0 (renders as "3") for the one
  // render() pass that can happen before frame() has captured
  // countdownStartTs on its first "countdown" tick.
  function countdownElapsedMs() {
    if (countdownStartTs === null) return 0;
    return Math.max(0, animTs - countdownStartTs);
  }

  // Reveal (0-3s): the head sprite pops in at board center (ease-out-back),
  // then a few food sprites fade in around it.
  function renderOpeningReveal(p) {
    var cx = boardCssPx / 2, cy = boardCssPx / 2;
    var headP = Math.min(1, p / 0.6);
    var headScale = openingEaseOutBack(headP);
    var hSize = cellPx * 2.4 * Math.max(0, headScale);
    if (hSize > 0.5) {
      var headImg = assetStore.drawable(currentHeadKey());
      ctx.save();
      ctx.globalAlpha = Math.min(1, headP * 1.4);
      ctx.beginPath();
      ctx.arc(cx, cy, hSize / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(headImg, cx - hSize / 2, cy - hSize / 2, hSize, hSize);
      ctx.restore();
    }
    var foodP = Math.max(0, (p - 0.5) / 0.5);
    if (foodP > 0) {
      var foodImg = assetStore.drawable("food");
      var fSize = cellPx * 0.9;
      var spots = [
        { x: cx - cellPx * 2.6, y: cy - cellPx * 1.8 },
        { x: cx + cellPx * 2.6, y: cy - cellPx * 1.4 },
        { x: cx + cellPx * 1.8, y: cy + cellPx * 2.4 }
      ];
      for (var i = 0; i < spots.length; i++) {
        var a = Math.max(0, Math.min(1, foodP * 3 - i));
        if (a <= 0) continue;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.drawImage(foodImg, spots[i].x - fSize / 2, spots[i].y - fSize / 2, fSize, fSize);
        ctx.restore();
      }
    }
  }

  // Chase (3-6.5s): the head glides left->right along a gentle sine curve
  // (a stand-in for the reference's smooth curved path, adapted to a square
  // board instead of the portrait stage), a short body trail follows, and
  // the three ghosts descend from above the board and converge into a chase
  // line behind it.
  function renderOpeningChase(p) {
    var travel = p;
    var hx = travel * boardCssPx;
    var hy = boardCssPx * 0.5 + Math.sin(travel * Math.PI * 2) * boardCssPx * 0.12;
    var headImg = assetStore.drawable(currentHeadKey());
    var hSize = cellPx * 1.3;
    var heading = Math.atan2(Math.cos(travel * Math.PI * 2) * 0.7, 1);
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(heading);
    ctx.beginPath();
    ctx.arc(0, 0, hSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(headImg, -hSize / 2, -hSize / 2, hSize, hSize);
    ctx.restore();

    var tint = currentTint();
    for (var i = 1; i <= 4; i++) {
      var bt = Math.max(0, travel - i * 0.05);
      var bx = bt * boardCssPx;
      var by = boardCssPx * 0.5 + Math.sin(bt * Math.PI * 2) * boardCssPx * 0.12;
      var bSize = Math.max(0, cellPx * (0.8 - i * 0.08));
      ctx.save();
      ctx.globalAlpha = Math.max(0, 0.9 - i * 0.15);
      ctx.beginPath();
      ctx.arc(bx, by, bSize / 2, 0, Math.PI * 2);
      ctx.fillStyle = tint.core;
      ctx.fill();
      ctx.restore();
    }

    for (var ci = 0; ci < 3; ci++) {
      var descend = Math.min(1, Math.max(0, (p - ci * 0.12) / 0.7));
      var targetX = hx - (ci + 1.4) * cellPx * 1.1;
      var targetY = hy + (ci - 1) * cellPx * 0.9;
      var startY = -cellPx * 2;
      var gx = targetX;
      var gy = startY + (targetY - startY) * openingEaseOutBack(descend);
      var gImg = assetStore.drawable("ghost" + (ci + 1));
      var gSize = cellPx * 1.14;
      ctx.save();
      ctx.globalAlpha = Math.min(1, descend * 2);
      ctx.drawImage(gImg, gx - gSize / 2, gy - gSize / 2, gSize, gSize);
      ctx.restore();
    }
  }

  // Ready (6.5-9s): everything settles into the exact formation newGame()
  // itself spawns (3-segment snake centered, facing right), with the ghosts
  // parked in their far corners and (motion allowing) a gentle idle bob
  // reusing the Task A GHOST_IDLE motion - a literal "get ready" preview of
  // the real board.
  function renderOpeningReady(p) {
    var cx = Math.floor(GRID_N / 2), cy = Math.floor(GRID_N / 2);
    var settle = openingEaseOutCubic(Math.min(1, p / 0.5));
    var startCells = [
      { x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }
    ];
    var fromX = boardCssPx, fromY = boardCssPx * 0.5;

    var headImg = assetStore.drawable(currentHeadKey());
    var hSize = cellPx * 0.95;
    var toX = startCells[0].x * cellPx + cellPx / 2, toY = startCells[0].y * cellPx + cellPx / 2;
    var hx = fromX + (toX - fromX) * settle;
    var hy = fromY + (toY - fromY) * settle;
    ctx.save();
    ctx.translate(hx, hy);
    ctx.beginPath();
    ctx.arc(0, 0, hSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(headImg, -hSize / 2, -hSize / 2, hSize, hSize);
    ctx.restore();

    var tint = currentTint();
    for (var i = 1; i < startCells.length; i++) {
      var seg = startCells[i];
      var segToX = seg.x * cellPx + cellPx / 2, segToY = seg.y * cellPx + cellPx / 2;
      var sx = fromX + (segToX - fromX) * settle;
      var sy = fromY + (segToY - fromY) * settle;
      var size = cellPx * (0.82 - 0.22 * (i / (startCells.length - 1)));
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.beginPath();
      ctx.arc(sx, sy, size / 2, 0, Math.PI * 2);
      ctx.fillStyle = tint.core;
      ctx.fill();
      ctx.lineWidth = Math.max(1, cellPx * 0.05);
      ctx.strokeStyle = tint.edge;
      ctx.stroke();
      ctx.restore();
    }

    // QA fix: the two bottom ghosts used to sit at the literal grid corners
    // ((GRID_N-1,GRID_N-1) and (0,GRID_N-1)), which put their glow directly
    // over the first/last letters of the "PRESS ANY KEY" band drawn at
    // boardCssPx*0.88 (renderPressAnyKey()). Inset them up and inward so the
    // sprite (plus its idle glow) clears the text band while still reading
    // as "parked near the corner". Top-right is untouched - it's far enough
    // from the bottom text band already.
    var restSpots = [
      { x: GRID_N - 1, y: 0 }, { x: GRID_N - 2.3, y: GRID_N - 2.9 }, { x: 1.3, y: GRID_N - 2.9 }
    ];
    for (var ci = 0; ci < 3; ci++) {
      var spot = restSpots[ci];
      var rx = spot.x * cellPx + cellPx / 2, ry = spot.y * cellPx + cellPx / 2;
      var idle = GHOST_IDLE[ci % 3];
      var gSize = cellPx * 1.14;
      var ox = 0, oy = 0, glow = idle.glowBase;
      if (!GHOST_IDLE_STILL) {
        var pp = ((animTs / GHOST_IDLE_PERIOD_MS) + ci / 3) % 1;
        var m = idle.motion(pp * GHOST_IDLE_TAU, pp * 2 * GHOST_IDLE_TAU, GHOST_IDLE_SCRATCH[ci]);
        var norm = gSize / GHOST_IDLE_GS;
        ox = m.dx * norm * settle;
        oy = m.dy * norm * settle;
        glow = m.glow;
      }
      var gImg = assetStore.drawable("ghost" + (ci + 1));
      ctx.save();
      ctx.globalAlpha = settle;
      ctx.shadowColor = idle.color;
      ctx.shadowBlur = cellPx * Math.max(0, glow) * 0.6;
      ctx.drawImage(gImg, rx + ox - gSize / 2, ry + oy - gSize / 2, gSize, gSize);
      ctx.restore();
    }
  }

  // prefers-reduced-motion fallback: a single static composed frame (the
  // fully-settled "ready" formation, no idle bob since GHOST_IDLE_STILL
  // already zeroes it above) plus the still (non-pulsing) PRESS ANY KEY text
  // - see renderPressAnyKey(). No motion is ever computed in this branch.
  function renderOpeningStill() {
    renderOpeningReady(1);
  }

  // Retro pulsing "PRESS ANY KEY" text (Hebrew equivalent via STRINGS),
  // drawn directly on the board canvas rather than as a DOM overlay so it
  // shares the exact same coordinate space/scaling as the rest of the scene
  // and needs no extra element in #wrap's flow (measureReservePx()/
  // resizeCanvas()'s sizing budget stays untouched). ctx.direction follows
  // the current language's reading direction, same as document.dir
  // elsewhere.
  function renderPressAnyKey(elapsed) {
    var text = S().pressAnyKey;
    if (!text) return;
    var alpha;
    if (OPENING_STILL) {
      alpha = 0.9; // static - no pulsing under prefers-reduced-motion
    } else {
      var fadeIn = Math.min(1, elapsed / 1000);
      alpha = fadeIn * (0.55 + 0.45 * Math.sin(elapsed / 260));
      alpha = Math.max(0.15 * fadeIn, alpha);
    }
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "rgba(0,229,255,0.65)";
    ctx.shadowBlur = cellPx * 0.5;
    var fontPx = Math.round(cellPx * 1.05);
    var fontStack = "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
    ctx.font = "900 " + fontPx + fontStack;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.direction = S().dir;
    // QA fix: the Hebrew string measures ~100% of the board width at this
    // font size (vs ~90% for English), clipping its leftmost letter at the
    // board edge. Measure the actual string and shrink the font to fit a
    // safe max width instead of assuming English's narrower proportions -
    // this keeps a real margin for every language/board size, not just the
    // one QA happened to measure.
    var maxTextWidth = boardCssPx * 0.86;
    var textWidth = ctx.measureText(text).width;
    if (textWidth > maxTextWidth && textWidth > 0) {
      fontPx = Math.max(1, Math.floor(fontPx * (maxTextWidth / textWidth)));
      ctx.font = "900 " + fontPx + fontStack;
    }
    ctx.fillText(text, boardCssPx / 2, boardCssPx * 0.88);
    ctx.restore();
  }

  // Top-level opening render dispatch, called from render() while
  // state === "opening". Draws the same board backdrop/grid as the real
  // game (drawBoardBackdrop(), shared with render() below) so the
  // transition into "menu"/"playing" reads as one continuous board rather
  // than a jump cut.
  function renderOpening(elapsed) {
    drawBoardBackdrop();
    if (OPENING_STILL) {
      renderOpeningStill();
    } else if (elapsed < OPENING_REVEAL_MS) {
      renderOpeningReveal(elapsed / OPENING_REVEAL_MS);
    } else if (elapsed < OPENING_REVEAL_MS + OPENING_CHASE_MS) {
      renderOpeningChase((elapsed - OPENING_REVEAL_MS) / OPENING_CHASE_MS);
    } else {
      renderOpeningReady(Math.min(1, (elapsed - OPENING_REVEAL_MS - OPENING_CHASE_MS) / OPENING_READY_MS));
    }
    renderPressAnyKey(elapsed);
  }

  // ---------- rendering ----------
  // Shared by the normal in-game render() below and renderOpening() above -
  // the translucent Nokia-LCD board fill plus the dimmed guide grid, exactly
  // as before this was factored out (Task C) - no visual change.
  function drawBoardBackdrop() {
    var w = boardCssPx, h = boardCssPx;
    ctx.clearRect(0, 0, w, h);
    // light Nokia-LCD board, deliberately semi-transparent (alpha 0.82) so a
    // hint of the dark phone body underneath shows through - per request.
    // clearRect above wipes each frame, so the translucent fill can never
    // accumulate across frames.
    ctx.fillStyle = "rgba(204, 217, 163, 0.82)";
    ctx.fillRect(0, 0, w, h);

    // grid: kept for guidance but dimmed well down - per request
    ctx.strokeStyle = "rgba(46, 61, 26, 0.09)";
    ctx.lineWidth = 1;
    for (var g = 1; g < GRID_N; g++) {
      var p = Math.round(g * cellPx) + 0.5;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(w, p); ctx.stroke();
    }
  }

  function render() {
    if (state === "opening") {
      renderOpening(openingElapsedMs());
      return;
    }
    drawBoardBackdrop();

    if (!snake) return;

    // food, slightly larger than a cell, soft shadow
    // (food can legitimately be null once the board is completely full - win())
    if (food) {
      var foodImg = assetStore.drawable("food");
      var fSize = cellPx * 1.3;
      var fx = food.x * cellPx + cellPx / 2;
      var fy = food.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = cellPx * 0.4;
      ctx.shadowOffsetY = cellPx * 0.12;
      if (assetStore.image("food")) {
        ctx.drawImage(foodImg, fx - fSize / 2, fy - fSize / 2, fSize, fSize);
      } else {
        ctx.beginPath();
        ctx.arc(fx, fy, fSize / 2, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd166";
        ctx.fill();
      }
      ctx.restore();
    }

    // body, warm per-level tint circles, fading toward tail, smaller than head
    var tint = currentTint();
    var bodyLen = snake.length - 1;
    for (var i = snake.length - 1; i >= 1; i--) {
      var seg = snake[i];
      var t = bodyLen > 1 ? (i - 1) / (bodyLen - 1) : 0; // 0 near head, 1 near tail
      var size = cellPx * (0.82 - 0.22 * t);
      var alpha = 0.95 - 0.45 * t;
      var cxp = seg.x * cellPx + cellPx / 2;
      var cyp = seg.y * cellPx + cellPx / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cxp, cyp, size / 2, 0, Math.PI * 2);
      ctx.fillStyle = tint.core;
      ctx.fill();
      ctx.lineWidth = Math.max(1, cellPx * 0.05);
      ctx.strokeStyle = tint.edge;
      ctx.stroke();
      ctx.restore();
    }

    // head: circular photo rotated toward travel direction
    var headSeg = snake[0];
    var hx = headSeg.x * cellPx + cellPx / 2;
    var hy = headSeg.y * cellPx + cellPx / 2;
    var hSize = cellPx * 0.95;
    var angle = Math.atan2(dir.y, dir.x);
    var headKey = currentHeadKey();
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, hSize / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.save();
    ctx.clip();
    if (assetStore.image(headKey)) {
      ctx.drawImage(assetStore.image(headKey), -hSize / 2, -hSize / 2, hSize, hSize);
    } else {
      ctx.fillStyle = tint.core;
      ctx.fillRect(-hSize / 2, -hSize / 2, hSize, hSize);
    }
    ctx.restore();
    ctx.lineWidth = Math.max(1, cellPx * 0.06);
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.stroke();
    ctx.restore();

    // chasers: drawn last so the threat is always visible on top. Sprite
    // per index (ghost1/2/3 = red/pink/cyan), same soft shadow as the food.
    // assetStore.drawable() returns either the loaded ghost image or the colored-
    // circle fallback canvas - drawImage accepts both.
    // Idle float/rotate/pulse/glow (Task A) is layered on with a canvas
    // transform around this draw only - ch.x/ch.y (the values chaserAt() and
    // every hit test read) are never touched.
    for (var ci = 0; ci < chasers.length; ci++) {
      var ch = chasers[ci];
      var idle = GHOST_IDLE[ci % 3];
      var gImg = assetStore.drawable("ghost" + ((ci % 3) + 1));
      var gSize = cellPx * 1.14;
      var gx2 = ch.x * cellPx + cellPx / 2;
      var gy2 = ch.y * cellPx + cellPx / 2;
      var ox = 0, oy = 0, rotRad = 0, scaleMul = 1, glow = idle.glowBase;
      if (!GHOST_IDLE_STILL) {
        // own phase per chaser index so the three never pulse in lockstep
        var p = ((animTs / GHOST_IDLE_PERIOD_MS) + ci / 3) % 1;
        var m = idle.motion(p * GHOST_IDLE_TAU, p * 2 * GHOST_IDLE_TAU, GHOST_IDLE_SCRATCH[ci % 3]);
        var norm = gSize / GHOST_IDLE_GS; // raw amplitudes were tuned to a 130px reference sprite
        ox = m.dx * norm;
        oy = m.dy * norm;
        rotRad = m.rot * Math.PI / 180;
        // reference baseline scale is 1.15; only the oscillating part is kept
        // so mean scale stays 1.0 and the collision-read draw size never changes
        scaleMul = 1 + m.scaleOsc;
        glow = m.glow;
      }
      ctx.save();
      ctx.translate(gx2 + ox, gy2 + oy);
      ctx.rotate(rotRad);
      ctx.scale(scaleMul, scaleMul);
      ctx.shadowColor = idle.color;
      ctx.shadowBlur = cellPx * Math.max(0, glow) * 0.6; // kept subtle - never enough to smear the board
      ctx.shadowOffsetY = cellPx * 0.1;
      ctx.drawImage(gImg, -gSize / 2, -gSize / 2, gSize, gSize);
      ctx.restore();
    }

    // "get ready" countdown (Change 2): drawn on top of the fully-frozen
    // board (snake/food/chasers already drawn above at their positionForLevel()
    // positions) so the player can see exactly where everything is before
    // play starts.
    if (state === "countdown") renderCountdown(countdownElapsedMs());
  }

  // Big 3 -> 2 -> 1, one second each, reusing the PRESS-ANY-KEY/level-banner
  // retro text conventions (system font, board-relative size, cyan glow).
  // GHOST_IDLE_STILL doubles as the countdown's reduced-motion flag - same
  // boot-time media-query cache as the rest of the file - so under
  // prefers-reduced-motion the number still shows and the full 3s still
  // elapses, just without the per-tick scale/fade.
  //
  // Deliberately NOT drawn at board-center: positionForLevel() always
  // re-centres the snake head at grid (floor(GRID_N/2), floor(GRID_N/2)),
  // which on the odd-sized GRID_N=9 board IS board-center in pixel space, so
  // a centred number would sit directly on top of the head for the full 3s
  // freeze - exactly the orientation window the countdown exists to protect.
  // Rendered in the upper third of the board instead, well clear of the
  // centred head's row (and its body trailing left of it on the same row),
  // independent of board size.
  var COUNTDOWN_NUMBER_Y_FRAC = 0.22; // fraction of boardCssPx down from top
  function renderCountdown(elapsed) {
    // elapsed in [0,1000) -> 3, [1000,2000) -> 2, [2000,3000) -> 1; clamp to
    // 1 so a frame landing exactly on/after 3000 (the tick frame() flips to
    // "playing" on) never renders a stray 0.
    var n = Math.max(1, 3 - Math.floor(elapsed / 1000));
    var tickElapsed = elapsed % 1000; // ms into the current number, for the pulse
    var scale = 1, alpha = 1;
    if (!GHOST_IDLE_STILL) {
      var p = tickElapsed / 1000; // 0..1 within this number's one-second slot
      scale = 1.15 - 0.15 * p;    // pops in slightly large, settles to 1
      alpha = Math.min(1, p * 4); // quick fade-in, avoids a hard pop on entry
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(boardCssPx / 2, boardCssPx * COUNTDOWN_NUMBER_Y_FRAC);
    ctx.scale(scale, scale);
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "rgba(0,229,255,0.65)";
    ctx.shadowBlur = cellPx * 0.9;
    ctx.font = "900 " + Math.round(cellPx * 2.6) + "px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(n), 0, 0);
    ctx.restore();
  }

  // ---------- fixed-timestep rAF loop ----------
  function frame(ts) {
    if (!lastTs) lastTs = ts;
    var dt = ts - lastTs;
    lastTs = ts;
    animTs = ts;
    if (dt > 250) dt = 250; // clamp huge gaps (tab backgrounded)

    if (state === "opening") {
      // Auto-advance to the menu if the player never dismisses it (see
      // requestOpeningDismiss() for the dismiss path) - timed from this same
      // rAF timestamp, never Date.now(), so it stays consistent with the
      // rest of the file's animation conventions (see animTs above). step()
      // is never called here, same as every other non-"playing" state.
      if (openingStartTs === null) openingStartTs = ts;
      if (ts - openingStartTs >= OPENING_TOTAL_MS) endOpening();
    } else if (state === "countdown") {
      // Blocking "get ready" freeze (Change 2): advances nothing but its own
      // timer - no step(), no snake/chaser movement - so the board stays
      // exactly as positionForLevel() left it for the whole 3s. Same lazy
      // rAF-ts capture as openingStartTs above, never Date.now().
      if (countdownStartTs === null) countdownStartTs = ts;
      if (ts - countdownStartTs >= COUNTDOWN_MS) {
        state = "playing";
        acc = 0; // no catch-up burst: the freeze must not bank real time
      }
    } else if (state === "playing") {
      acc += dt;
      // Snapshot stepMs for this frame: step() can call levelUp(), which
      // mutates stepMs mid-loop. Without the snapshot, a single frame could
      // execute an extra step at the newly-faster rate right at a level
      // boundary (an uncommanded burst of movement).
      var stepSnapshot = stepMs;
      while (acc >= stepSnapshot) {
        acc -= stepSnapshot;
        if (state === "playing") step();
        else break;
      }
    }

    render();
    requestAnimationFrame(frame);
  }

  // ---------- keyboard ----------
  // WASD intentionally removed per spec - arrow keys only. (Was previously
  // mapped alongside ArrowUp/Down/Left/Right.)
  var KEY_DIR = {
    ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right"
  };

  window.addEventListener("keydown", function (e) {
    if (state === "opening") {
      requestOpeningDismiss();
      return;
    }
    if (KEY_DIR[e.key]) {
      e.preventDefault();
      // Countdown may still buffer a turn for when play starts (Pac-Man-
      // style input readiness) - requestTurn() only ever sets queuedDir, it
      // never touches `state`, so this can't shorten or skip the freeze.
      if (state === "playing" || state === "countdown") requestTurn(KEY_DIR[e.key]);
      return;
    }
    // Non-skippable (Change 2): Space/Enter must do nothing during the
    // countdown, not even fall through to pause/resume/start below.
    if (state === "countdown") return;
    if (state === "levelbanner" && (e.key === " " || e.key === "Enter")) {
      e.preventDefault();
      dismissLevelBanner();
      return;
    }
    if (e.key === " ") {
      e.preventDefault();
      if (state === "playing" || state === "paused") togglePause();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      startOrResume();
    }
  }, { passive: false });

  // Any pointer press or touch, ANYWHERE in the document (not just the
  // board/canvas), also dismisses the opening scene straight to the menu -
  // see requestOpeningDismiss(). Registered on the initiating press event
  // (not a later "click"/"touchend") so it fires and flips `state` before
  // any trailing click/touchend for the same physical gesture can reach the
  // existing "tap to start" handlers further below - see the comment on
  // requestOpeningDismiss() and suppressTapStartOnce for why that ordering
  // matters. Both listeners are idempotent no-ops once state isn't
  // "opening" any more (requestOpeningDismiss() checks that itself), so
  // having both pointerdown and touchstart wired is harmless belt-and-
  // suspenders, not a double-fire risk.
  document.addEventListener("pointerdown", function () {
    requestOpeningDismiss();
  });
  document.addEventListener("touchstart", function () {
    requestOpeningDismiss();
  }, { passive: true });

  // ---------- touch: swipe on canvas ----------
  var touchStart = null;

  // Shared by the touchmove and touchend handlers below: if the drag from
  // `touchStart` to (x,y) crosses SWIPE_THRESHOLD, request the turn and
  // re-anchor touchStart to (x,y) so a continued drag (finger still down)
  // can chain further turns without lifting. Returns nothing useful - the
  // re-anchor IS the state change. requestTurn() already owns queueing and
  // anti-reversal, exactly as for repeated keyboard input.
  function maybeSwipeTurn(x, y) {
    if (!touchStart) return;
    var dx = x - touchStart.x;
    var dy = y - touchStart.y;
    if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      requestTurn(dx > 0 ? "right" : "left");
    } else {
      requestTurn(dy > 0 ? "down" : "up");
    }
    touchStart = { x: x, y: y };
  }

  canvas.addEventListener("touchstart", function (e) {
    if (e.touches.length !== 1) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchmove", function (e) {
    e.preventDefault(); // block scroll/zoom even where touch-action is imperfect
    // Mobile responsiveness: recognize the swipe the moment the finger
    // crosses the threshold, DURING the drag - not only on touchend. The
    // old lift-to-turn behavior added the whole remaining finger-down time
    // as input latency on every single turn, which is the main reason
    // touch controls felt sluggish next to a keyboard's instant keydown.
    // Countdown may also buffer a swipe turn for when play starts, same
    // reasoning as the keydown handler above - maybeSwipeTurn()/requestTurn()
    // never touch `state`, so this can't shorten or skip the freeze.
    if ((state === "playing" || state === "countdown") && e.touches.length === 1) {
      maybeSwipeTurn(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });

  canvas.addEventListener("touchend", function (e) {
    e.preventDefault();
    if (suppressTapStartOnce) {
      // This touchend belongs to the SAME tap that just dismissed the
      // opening scene (see requestOpeningDismiss()) - consume the flag and
      // stop here instead of also starting a new game.
      suppressTapStartOnce = false;
      touchStart = null;
      return;
    }
    if (state === "menu" || state === "dead" || state === "won") {
      startOrResume();
      touchStart = null;
      return;
    }
    // Tail segment of the drag (post-last-re-anchor): still honored, so a
    // short flick that never fired during touchmove turns on release just
    // like before - touchmove recognition above is additive, not replacing.
    if (touchStart) {
      var t = e.changedTouches[0];
      maybeSwipeTurn(t.clientX, t.clientY);
    }
    touchStart = null;
  }, { passive: false });

  // block long-press context menu / selection on canvas
  canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // On-screen D-pad removed per spec - touch devices are swipe-on-canvas
  // only now (see the canvas touchstart/touchmove/touchend handlers above).
  function isCoarsePointer() {
    return !!(window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
  }

  // ---------- mobile-only "how to play" popup ----------
  // Shown once (localStorage-gated) the first time a coarse-pointer (touch)
  // device reaches the menu, since swipe-to-move isn't otherwise self-
  // explanatory the way visible D-pad arrows were. Icon-first/text-minimal
  // per spec. Never shown on mouse/trackpad devices.
  function maybeShowMobileHelp() {
    if (!mobileHelp) return;
    if (!isCoarsePointer()) return;
    var seen = false;
    try { seen = localStorage.getItem(MOBILE_HELP_SEEN_KEY) === "1"; } catch (e) { /* storage unavailable - fall through, show it */ }
    if (seen) return;
    mobileHelp.classList.add("show");
  }
  function dismissMobileHelp() {
    if (!mobileHelp) return;
    mobileHelp.classList.remove("show");
    try { localStorage.setItem(MOBILE_HELP_SEEN_KEY, "1"); } catch (e) { /* best-effort only */ }
  }
  if (mobileHelpClose) {
    mobileHelpClose.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      dismissMobileHelp();
    });
  }
  if (mobileHelp) {
    // Tapping the dimmed backdrop also dismisses it; tapping the card itself
    // must not (stopPropagation below), so a stray tap while reading it
    // doesn't close it prematurely.
    mobileHelp.addEventListener("click", function (e) {
      if (e.target === mobileHelp) dismissMobileHelp();
    });
    var mobileHelpCardEl = document.getElementById("mobileHelpCard");
    if (mobileHelpCardEl) {
      mobileHelpCardEl.addEventListener("click", function (e) { e.stopPropagation(); });
    }
  }

  // tap board to restart/resume when overlay hidden but state not playing (defensive)
  wrap.addEventListener("click", function () {
    if (suppressTapStartOnce) {
      // This click belongs to the SAME tap/click that just dismissed the
      // opening scene (see requestOpeningDismiss()) - consume the flag and
      // stop here instead of also starting a new game.
      suppressTapStartOnce = false;
      return;
    }
    if (state === "menu" || state === "dead" || state === "won") startOrResume();
  });

  playBtn.addEventListener("click", function (e) {
    e.preventDefault();
    startOrResume();
  });

  // ---------- language toggle ----------
  if (langToggleBtn) {
    langToggleBtn.addEventListener("click", function (e) {
      e.preventDefault();
      applyLanguage(currentLang === "he" ? "en" : "he");
    });
    // The global keydown handler below (Space -> pause, Enter -> start/
    // resume) is bound on `window` and fires on ANY keypress regardless of
    // focus, including a native Space/Enter activation of this button - that
    // would pause/resume the game as an unwanted side effect of toggling the
    // language. stopPropagation() here (bubble phase, before the event
    // reaches window) isolates this button's own keyboard activation from
    // that global handler, without touching the handler itself.
    langToggleBtn.addEventListener("keydown", function (e) {
      if (e.key === " " || e.key === "Enter") e.stopPropagation();
    });
  }

  // ---------- boot ----------
  loadHi();
  updateHud();
  applyLanguage(currentLang); // corrects the static pre-boot markup (loading
                               // label, mobile-help caption, meta description,
                               // HUD labels, footer) to match a previously-
                               // stored language choice before first paint

  // Coalesce resize/orientationchange bursts (e.g. iOS Safari's chrome
  // auto-hide/show firing repeated resize events) into one rAF-scheduled
  // pass.
  var resizeScheduled = false;
  function scheduleResize() {
    if (resizeScheduled) return;
    resizeScheduled = true;
    requestAnimationFrame(function () {
      resizeScheduled = false;
      resizeCanvas();
    });
  }
  window.addEventListener("resize", scheduleResize);
  window.addEventListener("orientationchange", scheduleResize);
  // iOS Safari's toolbar collapse/expand and Android Chrome's URL-bar hide
  // change the *visual* viewport without always firing a window resize (or
  // firing it with stale innerHeight on older iOS). visualViewport's own
  // resize event is the authoritative signal there; scheduleResize is
  // rAF-coalesced so the extra listener costs nothing when both fire.
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", scheduleResize);
  }

  // rAF is paused/throttled while a tab is backgrounded, so a resize that
  // fires while hidden can leave scheduleResize()'s queued rAF callback
  // sitting unresolved (resizeScheduled stays true, so a synthetic resize
  // dispatched in the meantime is silently ignored) until the tab is
  // foregrounded again. Recompute directly - bypassing the rAF gate - the
  // moment the tab becomes visible, instead of waiting on whatever resize
  // event happens to arrive next.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      resizeScheduled = false;
      resizeCanvas();
    }
  });

  // Re-check devicePixelRatio when it changes (moving a window between
  // displays with different DPR, or OS-level scale changes) - these don't
  // fire a window resize event, so without this the canvas stays blurry
  // until some unrelated resize happens.
  function watchDprChange() {
    if (!window.matchMedia) return;
    var mq = window.matchMedia("(resolution: " + (window.devicePixelRatio || 1) + "dppx)");
    function handler() {
      scheduleResize();
      watchDprChange(); // re-subscribe at the new dpr
    }
    if (mq.addEventListener) mq.addEventListener("change", handler, { once: true });
    else if (mq.addListener) mq.addListener(handler); // older Safari fallback
  }
  watchDprChange();

  resizeCanvas();

  assetStore.preload(function () {
    // Guard rather than unconditionally reset: state can only still be
    // "loading" here in the current code (Play is disabled/no-op until this
    // fires), but this keeps a future change from silently reintroducing a
    // bug where finishing asset load stomps an already-started game back to
    // the menu and pops the overlay over live play. Goes to the "opening"
    // intro scene (Task C) rather than straight to "menu" - see
    // startOpening()/endOpening() above.
    if (state === "loading") {
      startOpening();
    }
    updateAvatarHud(); // always-visible avatar HUD: show it as soon as assets
                        // are ready, even before the first game starts
    render();
    requestAnimationFrame(frame);
  });
})();
</script>
</body>
</html>
